spec_version: "1.1"
task_id: "scafld-review-scope-drift-path-normalization"
created: "2026-04-26T12:48:36Z"
updated: "2026-04-26T12:52:00Z"
status: "draft"
harden_status: "in_progress"

task:
  title: "Fix review scope drift for sibling repo paths"
  summary: >
    Dogfooding on runx exposed two review-gate rough edges. First, the
    `scope_drift` automated review pass can report sibling-repo changes such as
    `../cloud/...` as undeclared even when those paths are explicitly listed in
    `task.context.files_impacted` and phase `changes`. This makes multi-repo
    specs fail review for the exact paths they declared. Second, boundary
    acceptance criteria that mean "no matches" are easy to write in a way that
    passes normal review semantics only after operators wrap `rg` with shell
    negation; scafld already has `expected: "no matches"` support, but review
    output should make this behavior obvious and tests should lock it down.

    Fix the review/audit path normalization and add a regression smoke that
    recreates the sibling-repo failure mode without weakening scope drift for
    genuinely undeclared files.
  size: "small"
  risk_level: "medium"
  context:
    packages:
      - "scafld"
      - "tests"
      - "docs"
    files_impacted:
      - path: "scafld/audit_scope.py"
        lines: "task-selected"
        reason: "Owns declared-change path collection and active-overlap normalization used by audit and review."
      - path: "scafld/commands/audit.py"
        lines: "task-selected"
        reason: "Compares declared paths against working-tree changed paths and emits scope-drift diagnostics."
      - path: "scafld/review_workflow.py"
        lines: "task-selected"
        reason: "Runs `scafld audit` as the `scope_drift` automated review pass and truncates diagnostics."
      - path: "scafld/acceptance.py"
        lines: "task-selected"
        reason: "Already implements `expected: no matches`; may need clearer behavior around rg exit codes and empty output."
      - path: "tests/review_gate_smoke.sh"
        lines: "task-selected"
        reason: "Best existing end-to-end surface for automated review pass behavior."
      - path: "tests/json_contract_smoke.sh"
        lines: "task-selected"
        reason: "Audit JSON behavior is already asserted here and should cover path normalization."
      - path: "docs/scope-auditing.md"
        lines: "task-selected"
        reason: "Operator docs should explain sibling-repo declarations and no-match criteria."
    invariants:
      - "scope_drift_must_still_fail_real_undeclared_changes"
      - "multi_repo_specs_must_be_auditable"
      - "review_gate_result_semantics_do_not_change"
      - "no_match_acceptance_must_be_explicit_and_reproducible"
    related_docs:
      - "docs/scope-auditing.md"
      - ".ai/specs/archive/2026-04/git-bound-task-origins.yaml"
      - ".ai/specs/archive/2026-04/review-gate-reviewed-state-match.yaml"
    cwd: "."
  objectives:
    - "Normalize declared and actual paths consistently when specs intentionally reference sibling repos with `../...` paths."
    - "Keep `scope_drift` strict for changed files that are neither in the current spec nor covered by another active spec."
    - "Improve automated review diagnostics so the failing undeclared paths include enough context to debug path-base mismatches."
    - "Lock down `expected: no matches` acceptance behavior for commands like `rg`, including exit code 1 with empty output."
    - "Document the recommended shape for multi-repo specs and no-match boundary criteria."
  scope:
    in_scope:
      - "Audit/review path normalization for sibling-repo declarations."
      - "Scope-drift smoke coverage for declared sibling repo paths and real undeclared paths."
      - "Acceptance/no-match smoke coverage if existing semantics are not already protected."
      - "Operator docs for sibling paths and no-match criteria."
    out_of_scope:
      - "Changing how scafld discovers the root workspace."
      - "Making scafld manage multiple git repositories as one transaction."
      - "Relaxing scope drift globally or ignoring sibling repo changes."
      - "Reworking review artifact format."
  assumptions:
    - "A spec rooted in one repo may legitimately declare sibling repo files with relative paths such as `../cloud/packages/api/src/foo.ts`."
    - "The current audit code compares changed paths from the current git root against declared strings without enough cross-root canonicalization."
    - "Acceptance `expected: no matches` should mean empty output or non-zero no-match exit, not generic command failure with diagnostics."
  touchpoints:
    - area: "scope audit"
      description: "Path collection and classification should use a single normalized representation for declared and actual paths."
    - area: "review automation"
      description: "Automated `scope_drift` should call audit in a mode that preserves useful path diagnostics."
    - area: "acceptance expectations"
      description: "Boundary checks should support `expected: no matches` without shell-negation workarounds."
  risks:
    - description: "Over-normalizing paths could hide genuine scope drift."
      impact: "high"
      mitigation: "Add a negative smoke where an undeclared sibling file remains reported."
    - description: "Tests may require a temporary multi-repo fixture and become brittle."
      impact: "medium"
      mitigation: "Use isolated temp git repos with minimal scafld specs and explicit changed files."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "`scafld review` no longer flags declared `../sibling/...` files as undeclared solely because they live outside the spec repo."
        status: "pending"
      - id: "dod2"
        description: "A changed sibling file that is not declared by the current or another active spec still fails scope drift."
        status: "pending"
      - id: "dod3"
        description: "`expected: no matches` behavior is tested for `rg`-style no-match output and remains compatible with existing acceptance checks."
        status: "pending"
      - id: "dod4"
        description: "Docs explain sibling-repo `files_impacted` declarations and no-match boundary criteria."
        status: "pending"
    validation:
      - id: "v1"
        type: "compile"
        description: "Python sources compile after audit/review changes."
        command: "python3 -m compileall scafld cli scripts"
        expected: "exit code 0"
      - id: "v2"
        type: "integration"
        description: "Review gate smoke covers declared sibling repo paths and real undeclared sibling drift."
        command: "bash tests/review_gate_smoke.sh scope-drift-sibling-path-normalization"
        expected: "exit code 0"
      - id: "v3"
        type: "integration"
        description: "Audit JSON smoke confirms declared/matched/undeclared counts for normalized paths."
        command: "bash tests/json_contract_smoke.sh scope-drift-sibling-path-normalization"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Focused acceptance unit coverage proves `expected: no matches` handling."
        command: "python3 -m unittest tests.test_command_runtime"
        expected: "exit code 0"

planning_log:
  - timestamp: "2026-04-26T12:48:36Z"
    actor: "user"
    summary: "Spec created via scafld plan after dogfooding exposed review scope drift on the runx GitHub App claim implementation."
  - timestamp: "2026-04-26T12:52:00Z"
    actor: "agent"
    summary: "Replaced placeholder with a concrete fix plan for sibling-repo path normalization, no-match acceptance ergonomics, tests, and docs."
    notes: >
      Verified relevant surfaces in `scafld/commands/audit.py`,
      `scafld/review_workflow.py`, and `scafld/acceptance.py`. The current
      runx review failure reports declared sibling cloud paths as undeclared.

phases:
  - id: "phase1"
    name: "Reproduce and normalize sibling scope"
    objective: "Add a fixture that reproduces the sibling-repo false positive and fix declared/actual path normalization without relaxing true drift."
    changes:
      - file: "scafld/audit_scope.py"
        action: "update"
        content_spec: |
          Centralize path normalization for declared spec paths, actual git
          changed paths, and other-active-spec declarations. Preserve relative
          paths inside the current repo, but canonicalize sibling paths so
          `../repo/path` declarations compare against the same representation
          used by audit/review.
      - file: "scafld/commands/audit.py"
        action: "update"
        content_spec: |
          Use the normalized declaration map for matched/missing/undeclared
          computation. JSON and text diagnostics should show the operator-facing
          declared path, and include enough detail to distinguish current-root
          files from sibling-root files.
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        content_spec: |
          Add `scope-drift-sibling-path-normalization`: create isolated sibling
          git repos, declare a changed sibling path in a spec, assert review
          scope_drift passes, then mutate an undeclared sibling path and assert
          scope_drift fails with that path.
    acceptance_criteria:
      - id: "ac1_1"
        type: "integration"
        description: "Review scope drift passes for changed sibling files that are declared by the spec."
        command: "bash tests/review_gate_smoke.sh scope-drift-sibling-path-normalization"
        expected: "exit code 0"
      - id: "ac1_2"
        type: "boundary"
        description: "The same smoke proves an undeclared sibling file still fails scope drift."
        command: "bash tests/review_gate_smoke.sh scope-drift-sibling-path-normalization"
        expected: "exit code 0"
    status: "pending"

  - id: "phase2"
    name: "Acceptance no-match ergonomics"
    objective: "Make the no-match boundary expectation explicit and protected, so specs do not need shell negation for `rg` checks."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/acceptance.py"
        action: "update"
        content_spec: |
          Keep `expected: no matches` semantics strict: pass when output is
          empty, including `rg` exit code 1; fail when output contains matches
          or command diagnostics. If existing code already satisfies this,
          tighten tests rather than changing behavior.
      - file: "tests/test_command_runtime.py"
        action: "update"
        content_spec: |
          Add direct tests for `check_expected` with `expected: no matches`,
          covering exit 1 + empty output, exit 0 + empty output, exit 0 +
          match output, and exit 2 + diagnostic output.
      - file: "docs/scope-auditing.md"
        action: "update"
        content_spec: |
          Document `expected: no matches` for boundary grep checks and when to
          prefer it over shell negation.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "`expected: no matches` passes for rg-style no-match and fails for matches/diagnostics."
        command: "python3 -m unittest tests.test_command_runtime"
        expected: "exit code 0"
      - id: "ac2_2"
        type: "boundary"
        description: "Docs mention both sibling path declarations and no-match criteria."
        command: "rg -n 'sibling|\\.\\./|no matches' docs/scope-auditing.md"
        expected: "exit code 0"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- scafld/audit_scope.py scafld/commands/audit.py tests/review_gate_smoke.sh"
    phase2: "git checkout HEAD -- scafld/acceptance.py tests/test_command_runtime.py docs/scope-auditing.md"

