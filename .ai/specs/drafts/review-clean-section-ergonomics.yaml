status: draft
harden_status: passed
task:
  title: Make clean review sections easier to write correctly
  summary: "Fix the review-gate ergonomics gap where semantically clean adversarial\
    \ sections can still fail parsing if the reviewer writes a natural variant like\
    \ \"No additional issues found \u2014 checked ...\" instead of the one exact accepted\
    \ phrase. The clean model is: the parser accepts a small family of explicit clean-section\
    \ notes, and the docs/tests teach the accepted forms directly.\n"
  size: small
  risk_level: low
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/reviewing.py
      lines: task-selected
      reason: The no-issues parser is the source of the current phrase brittleness.
    - path: tests/review_gate_smoke.sh
      lines: task-selected
      reason: Review gate smoke should prove the natural clean-section variant now
        passes.
    - path: docs/review.md
      lines: task-selected
      reason: The documented accepted forms should match the parser.
    invariants:
    - clean_review_sections_must_be_easy_to_write_correctly
    - review_gate_parser_must_stay_strict_about_evidence
    - packaged_cli_is_the_truth_surface
  objectives:
  - Accept a small family of explicit no-issues review notes without weakening finding
    validation.
  - Make the review docs teach the accepted clean-section forms directly.
  - Prove the behavior through the real review gate smoke.
  touchpoints:
  - area: review parsing
    description: Adversarial review sections should accept natural clean-section notes
      that still state what was checked.
  - area: review docs
    description: The operator-facing guidance should match the parser exactly.
  acceptance:
    definition_of_done:
    - id: dod1
      description: "A review round using \"No additional issues found \u2014 checked\
        \ ...\" passes the gate without weakening finding validation."
      status: pending
    - id: dod2
      description: The review docs describe the accepted clean-section note forms.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the review parser update.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Review gate smoke proves the clean-section variant passes.
      command: bash tests/review_gate_smoke.sh clean-section-variants
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not accept empty placeholders like "None." again.
    - Do not loosen finding validation for blocking or non-blocking sections.
  notes: 'This came from real use: the gate should be strict about evidence, not brittle
    about one exact clean-section phrase.

    '
