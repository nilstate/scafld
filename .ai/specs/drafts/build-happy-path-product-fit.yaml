spec_version: "1.1"
task_id: "build-happy-path-product-fit"
created: "2026-04-24T06:10:00Z"
updated: "2026-04-24T06:10:00Z"
status: "draft"
harden_status: "not_run"

task:
  title: "Make Build Feel Easier Than A Raw Agent Loop"
  summary: >
    Tighten the happy path around `build` and `status` until scafld feels
    shorter and clearer than manually juggling agent turns, handoff paths, and
    lifecycle state. The work only counts if a medium brownfield task feels
    easier to drive through `build -> review -> complete` than through a raw
    agent loop. That means one obvious next action, crisp blocked-state
    guidance, and no operator archaeology to figure out what should happen
    next.
  size: "large"
  risk_level: "medium"
  context:
    packages:
      - "scafld/commands/workflow.py"
      - "scafld/commands/lifecycle.py"
      - "scafld/commands/execution.py"
      - "scafld/output.py"
      - "README.md"
      - "AGENTS.md"
      - "docs/execution.md"
      - "docs/cli-reference.md"
      - "tests/"
    files_impacted:
      - path: "scafld/commands/workflow.py"
        lines: "all"
        reason: "build remains the public orchestration surface and should own the happy path."
      - path: "scafld/commands/lifecycle.py"
        lines: "1-420"
        reason: "status should surface the same next-action guidance as build."
      - path: "scafld/commands/execution.py"
        lines: "220-620"
        reason: "execution already knows recovery and block states; those signals need cleaner surfacing."
      - path: "scafld/output.py"
        lines: "all"
        reason: "Human and JSON envelopes should present the next action consistently."
      - path: "README.md"
        lines: "1-220"
        reason: "The default story should describe build as the shortest path through real work."
      - path: "AGENTS.md"
        lines: "1-220"
        reason: "Agent guidance should teach one obvious command and one obvious next step."
      - path: "docs/execution.md"
        lines: "all"
        reason: "Execution docs should describe the happy path and blocked states with zero operator guesswork."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "CLI docs should make build/status next-action semantics explicit."
      - path: "tests/agent_surface_smoke.sh"
        lines: "all"
        reason: "Existing surface smoke should prove build remains the public path."
      - path: "tests/lifecycle_smoke.sh"
        lines: "all"
        reason: "Lifecycle smoke should keep the end-to-end build path honest."
      - path: "tests/build_happy_path_smoke.sh"
        lines: "all"
        reason: "New smoke should exercise approved, in_progress, blocked, and review-ready next-action states."
      - path: "tests/status_next_action_smoke.sh"
        lines: "all"
        reason: "New smoke should prove status mirrors build guidance."
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "no_test_logic_in_production"
    related_docs:
      - "README.md"
      - "AGENTS.md"
      - "docs/execution.md"
      - "docs/cli-reference.md"
  objectives:
    - "Make build the obvious command for approved and in_progress work."
    - "Expose one canonical next action across build, status, review, and complete."
    - "Make blocked and recovery-required states obvious in both human and JSON output."
    - "Cut operator leakage from the default docs and prompts without removing advanced tools."
    - "Move scafld closer to the real standard that build feels easier than a raw agent loop."
  scope:
    in_scope:
      - "Shared next-action derivation for build/status/review surfaces."
      - "Human output cleanup for approved, active, blocked, review-ready, and exhausted states."
      - "JSON envelope cleanup where existing fields are too indirect."
      - "Docs and smoke coverage for the happy path."
    out_of_scope:
      - "New public commands."
      - "Spec schema changes."
      - "Model-provider-specific adapters."
      - "Changing the review gate itself."
  dependencies:
    - "Assumes the slim public surface and role×gate handoff transport remain the base architecture."
  assumptions:
    - "The public command set stays `init, plan, approve, build, review, complete, status, list, report, handoff, update`."
    - "The next-action story should be derived from spec plus session, not from handoff contents."
  touchpoints:
    - area: "build orchestration"
      description: "Public build flow should stay short, deterministic, and easy to resume."
    - area: "status control tower"
      description: "status should tell a human or wrapper exactly what to do next."
    - area: "human output"
      description: "Human-facing summaries should remove ambiguity without becoming verbose."
    - area: "json surface"
      description: "Wrappers should get canonical next_action and block reason fields without guessing."
  risks:
    - description: "Next-action logic can drift if multiple commands compute it independently."
      impact: "high"
      mitigation: "Centralize derivation in one helper shared by workflow and lifecycle surfaces."
    - description: "Making output friendlier can bloat the command surfaces."
      impact: "medium"
      mitigation: "Keep richer detail in JSON and keep human output concise around one next step."
    - description: "A smoother build path could accidentally hide meaningful operator tools."
      impact: "medium"
      mitigation: "Preserve advanced commands; only simplify the taught surface."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "build exposes one obvious next action for approved, active, blocked, and review-ready tasks."
        status: "pending"
      - id: "dod2"
        description: "status mirrors the same next action and block reason without requiring JSON interpretation."
        status: "pending"
      - id: "dod3"
        description: "Docs and agent guidance teach build as the shortest path through real work."
        status: "pending"
      - id: "dod4"
        description: "Smoke coverage proves the happy path feels like one coherent loop instead of a wrapper over old commands."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate build-happy-path-product-fit"
        expected: "exit code 0"
      - id: "v2"
        type: "compile"
        description: "Compile scafld after the happy-path refactor."
        command: "python3 -m compileall scafld"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Run the public-surface and lifecycle smokes."
        command: "bash tests/agent_surface_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Run happy-path next-action coverage."
        command: "bash tests/build_happy_path_smoke.sh && bash tests/status_next_action_smoke.sh"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not add another lifecycle primitive."
      - "Do not reintroduce `new`, `start`, or `exec` to the public surface."
      - "Do not make handoff contents the source of truth for next-action logic."
  notes: >
    Keep the code shape small. If a new helper is needed, it should derive next
    actions from spec + session and be reused by workflow, lifecycle, and
    review surfaces. The work only succeeds if build genuinely feels easier
    than managing a raw agent loop yourself.

planning_log:
  - timestamp: "2026-04-24T06:10:00Z"
    actor: "assistant"
    summary: "Drafted the build product-fit slice against the real-standard bar."

phases:
  - id: "phase1"
    name: "Canonical next action"
    objective: "Derive and expose one shared next-action story across build and status."
    changes:
      - file: "scafld/commands/workflow.py"
        action: "update"
        content_spec: |
          Refactor build output so approved, active, blocked, recovery, and
          review-ready cases all emit one canonical next_action and concise
          human guidance.
      - file: "scafld/commands/lifecycle.py"
        action: "update"
        content_spec: |
          Teach status to show the same next action, selector, and block reason
          that build exposes.
      - file: "scafld/output.py"
        action: "update"
        content_spec: |
          Keep human output compact while making the next step unambiguous.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Happy-path next-action smoke passes."
        command: "bash tests/build_happy_path_smoke.sh && bash tests/status_next_action_smoke.sh"
        expected: "exit code 0"
    status: "pending"

  - id: "phase2"
    name: "Teach the short path"
    objective: "Update docs and agent guidance to present build as the easiest real path."
    dependencies: ["phase1"]
    changes:
      - file: "README.md"
        action: "update"
        content_spec: |
          Rewrite the build/status examples so the happy path looks shorter than
          a raw agent loop.
      - file: "AGENTS.md"
        action: "update"
        content_spec: |
          Teach agents to trust build/status next-action guidance instead of
          reconstructing lifecycle state manually.
      - file: "docs/execution.md"
        action: "update"
        content_spec: |
          Explain how build moves work forward and what each blocked state means
          in practice.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document the canonical next_action story for build and status.
      - file: "tests/agent_surface_smoke.sh"
        action: "update"
        content_spec: |
          Keep the default public surface and one-call build flow covered.
      - file: "tests/lifecycle_smoke.sh"
        action: "update"
        content_spec: |
          Keep the end-to-end build path and report triage covered.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Existing public-surface smokes stay green."
        command: "bash tests/agent_surface_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- scafld/commands/workflow.py scafld/commands/lifecycle.py scafld/output.py tests/build_happy_path_smoke.sh tests/status_next_action_smoke.sh"
    phase2: "git checkout HEAD -- README.md AGENTS.md docs/execution.md docs/cli-reference.md tests/agent_surface_smoke.sh tests/lifecycle_smoke.sh"
