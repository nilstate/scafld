spec_version: '1.1'
task_id: git-bound-task-origins
created: '2026-04-21T06:42:00Z'
updated: '2026-04-21T08:32:02Z'
status: draft
harden_status: passed
task:
  title: Bind scafld specs to Git branches and work origins
  summary: 'Make Git state and engineering origins first-class in scafld. A task should
    be able to say where it came from, which branch it owns, which base ref it targets,
    what repo/remote it belongs to, and whether the live workspace has drifted away
    from the spec. This is the load-bearing bridge between scafld as an internal workflow
    file and scafld as the kernel underneath everyday Git, issue, and PR flow.

    '
  size: large
  risk_level: high
  context:
    packages:
    - cli
    - scafld
    - tests
    - docs
    - .ai
    files_impacted:
    - path: .ai/schemas/spec.json
      lines: all
      reason: The spec schema needs a first-class origin and git-binding model.
    - path: cli/scafld
      lines: all
      reason: New branch and sync commands plus origin-aware status/start flows belong
        in the CLI.
    - path: scafld/git_state.py
      lines: all
      reason: Git helpers need to capture branch, base-ref, remote, and worktree drift
        details.
    - path: scafld/spec_store.py
      lines: all
      reason: Origin metadata should live beside spec state and move with the spec.
    - path: docs/lifecycle.md
      lines: all
      reason: Lifecycle docs should explain how branch/origin binding relates to task
        state.
    - path: docs/workspaces.md
      lines: all
      reason: Workspace docs should explain branch creation, repo assumptions, and
        sync semantics.
    - path: docs/spec-schema.md
      lines: all
      reason: The new origin model should be documented explicitly.
    - path: tests/git_origin_smoke.sh
      lines: all
      reason: A new smoke test should prove branch creation and sync drift detection.
    invariants:
    - origin_metadata_is_provider_neutral
    - git_mutation_stays_explicit_and_safe
    - spec_and_branch_relationship_is_first_class
    - sync_reports_drift_instead_of_hiding_it
    - status_can_surface_origin_without_network_access
    related_docs:
    - docs/lifecycle.md
    - docs/workspaces.md
    - docs/spec-schema.md
    - README.md
    cwd: /home/kam/dev/scafld
  objectives:
  - Add a first-class spec metadata block for origin, repo, branch, base-ref, and
    sync state.
  - Introduce `scafld branch <task-id>` to create or bind a working branch safely.
  - Introduce `scafld sync <task-id>` to compare spec metadata with live Git state
    and report drift.
  - Make `status --json` surface origin and sync details without requiring wrapper
    inference.
  - Keep the model provider-neutral so GitHub, GitLab, and repo-local callers can
    all project onto it.
  scope:
    in_scope:
    - Schema additions for origin and Git binding.
    - CLI branch and sync commands.
    - Status/report visibility for origin and sync state.
    - Docs and smoke coverage for branch binding and drift reporting.
    out_of_scope:
    - Calling remote forge APIs directly from scafld.
    - Automatically opening pull requests.
    - Auto-merging or auto-closing issues.
    - Hosted approval or receipt logic.
  dependencies:
  - command-core-integrity-hardening
  - native-lifecycle-json-contracts
  assumptions:
  - The origin model should store remote-facing identifiers and URLs, but remote mutation
    remains outside scafld.
  - The branch command should prefer safety over convenience and refuse surprising
    mutations.
  - Sync is diagnostic first; it should report drift before any tool tries to repair
    it.
  touchpoints:
  - area: spec schema
    description: Add first-class origin and Git binding fields to the task spec.
    owners:
    - scafld-core
  - area: git runtime
    description: Capture branch, remote, base-ref, head SHA, dirty state, and sync
      drift.
    owners:
    - scafld-core
  - area: CLI workflow
    description: Add branch and sync commands and expose origin-aware status.
    owners:
    - scafld-core
  - area: docs and smoke
    description: Explain and verify the new Git-bound workflow.
    owners:
    - scafld-core
  risks:
  - description: Branch creation could mutate the wrong branch or dirty workspace
      if safety checks are too loose.
    impact: high
    mitigation: Require explicit task binding, validate the current repo state, and
      refuse dirty/detached mutations unless a clear override exists.
  - description: Origin metadata could become GitHub-shaped and leak provider assumptions
      into the kernel.
    impact: medium
    mitigation: 'Keep the schema neutral: source system, source id/url, repo, branch,
      refs, and sync facts rather than forge-specific policy.'
  - description: Sync output could become prose-only and repeat today's brittleness.
    impact: high
    mitigation: Make sync output a native JSON payload with explicit drift reasons
      and current/expected state fields.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: Specs can store origin, repo, branch, base-ref, and sync metadata
        natively.
      status: pending
    - id: dod2
      description: '`scafld branch` safely creates or binds a task branch and records
        it in the spec.'
      status: pending
    - id: dod3
      description: '`scafld sync` reports current-vs-expected drift in structured
        form.'
      status: pending
    - id: dod4
      description: '`status --json` exposes origin and sync state directly.'
      status: pending
    - id: dod5
      description: Docs and smoke coverage explain and prove the Git-bound task model.
      status: pending
    validation:
    - id: v1
      type: integration
      description: Git origin smoke passes.
      command: ./tests/git_origin_smoke.sh
      expected: exit code 0
      timeout_seconds: 240
    - id: v2
      type: documentation
      description: Spec schema docs include the origin model.
      command: rg -n "origin|branch|base_ref|sync" docs/spec-schema.md docs/workspaces.md
        docs/lifecycle.md
      expected: matches documenting the new fields and commands
      timeout_seconds: 60
