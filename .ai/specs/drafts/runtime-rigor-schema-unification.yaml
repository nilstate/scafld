    summary: "Replaced placeholder with the schema-unification plan: jsonschema as soft dep, schema-first validation, hand-written checks remain as the cross-field/citation layer."

phases:
  - id: "phase1"
    name: "Soft import helper"
    objective: "Single helper that returns the jsonschema module when importable, None otherwise. Cached."
    changes:
      - file: "scafld/runtime_bundle.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add `try_import_jsonschema()` decorated with
          `@functools.lru_cache(maxsize=1)`. Returns the imported
          module when `from jsonschema import Draft7Validator`
          succeeds; returns None otherwise. Operators call this from
          validation paths to decide whether to delegate.
      - file: "tests/test_lifecycle_runtime.py"
        action: "create"
        content_spec: |
          New unittest module. Tests:
            - `try_import_jsonschema` returns a module on this venv
              (which has the dep installed).
            - Test mode that monkey-patches `sys.modules["jsonschema"]
              = None` and confirms the helper returns None gracefully.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        description: "Sources compile."
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
      - id: "ac1_2"
        type: "test"
        description: "Soft-import helper tests pass."
        command: "python3 -m unittest tests.test_lifecycle_runtime"
        expected_kind: "exit_code_zero"
    status: "pending"

  - id: "phase2"
    name: "Spec validation delegation"
    objective: "validate_spec delegates structural checks to Draft7Validator when available; hand-written checks run after."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/lifecycle_runtime.py"
        action: "update"
        content_spec: |
          - At the top of `validate_spec`, call
            `try_import_jsonschema()`. When the module is available,
            load the schema from `resolve_schema_path(root)` and run
            `Draft7Validator(schema).iter_errors(data)`. Convert each
            error into a string `<json_pointer>: <message>` and
            append to the errors list.
          - When the module is not available, do nothing extra (the
            existing hand-written checks already run).
          - The hand-written cross-field checks always run afterward
            for messages the schema can't produce (TODO patterns,
            phase ordering rules, etc.).
      - file: "tests/test_lifecycle_runtime.py"
        action: "update"
        content_spec: |
          Add tests:
            - `validate_spec` returns no errors for a known-good spec
              from `.ai/specs/examples/`.
            - `validate_spec` returns a Draft7 error message for a
              spec missing a required top-level field (when
              jsonschema is available).
            - With jsonschema monkey-patched out, the hand-written
              checks alone catch the same missing-required case.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Spec validation delegation tests pass."
        command: "python3 -m unittest tests.test_lifecycle_runtime"
        expected_kind: "exit_code_zero"
    status: "pending"

  - id: "phase3"
    name: "Review packet validation delegation"
    objective: "normalize_review_packet runs Draft7Validator before hand-written checks; cross-field rules stay."
    dependencies:
      - "phase2"
    changes:
      - file: "scafld/review_packet.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          At the top of `normalize_review_packet` (after JSON parse,
          before structural checks), call `try_import_jsonschema()`.
          When available, load the schema from
          `resolve_review_packet_schema_path(root)` and run
          `Draft7Validator(schema).iter_errors(packet)`. Surface
          errors via the existing `_packet_error` helper with
          `<json_pointer>: <message>` formatting.
      - file: "tests/test_review_packet.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Tests:
            - Schema delegation accepts the canonical fixture.
            - Schema delegation rejects a tampered fixture (e.g.,
              non-enum verdict) with a Draft7 error message.
            - With jsonschema monkey-patched out, hand-written checks
              still catch the same tampered fixture.
            - Cross-field invariants (verdict pass + findings list
              non-empty) remain detected by the hand-written layer.
      - file: "setup.py"
        action: "update"
        content_spec: |
          Add `extras_require={"strict": ["jsonschema>=4"]}` to the
          existing setup() call. Leave `install_requires` untouched.
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Add a "Strict schema validation" subsection: scafld can use
          `jsonschema` for richer structural error messages on
          validate / review. Optional: `pip install scafld[strict]`.
          When absent, hand-written checks cover the same contract.
    acceptance_criteria:
      - id: "ac3_1"
        type: "compile"
        description: "Sources compile after delegation added."
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
      - id: "ac3_2"
        type: "test"
        description: "Review packet delegation tests pass."
        command: "python3 -m unittest tests.test_review_packet"
        expected_kind: "exit_code_zero"
      - id: "ac3_3"
        type: "boundary"
        description: "extras_require entry declared."
        command: "grep -qE 'jsonschema.*>=.*4' setup.py"
        expected_kind: "exit_code_zero"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- scafld/runtime_bundle.py && rm -f tests/test_lifecycle_runtime.py"
    phase2: "git checkout HEAD -- scafld/lifecycle_runtime.py tests/test_lifecycle_runtime.py"
    phase3: "git checkout HEAD -- scafld/review_packet.py setup.py docs/configuration.md tests/test_review_packet.py"

