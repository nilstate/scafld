spec_version: "1.1"
task_id: "adversarial-review-cutover"
created: "2026-04-23T14:03:11Z"
updated: "2026-04-23T14:03:11Z"
status: "draft"
harden_status: "not_run"

task:
  title: "Adversarial Review Cutover"
  summary: >
    Re-center scafld around adversarial review as the product identity.
    Preserve `spec` and `session` as the only primitives, demote `handoff` to
    transport, concentrate challenge at the `review` gate, and slim the default
    agent-facing surface to the workflow verbs that matter. The implementation
    should leave the code shape cleaner than the current cutover by keeping
    review challenge in the existing handoff/session substrate rather than
    spawning parallel subsystems.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "scafld/"
      - "docs/"
      - ".ai/"
      - "tests/"
      - "plans/"
    files_impacted:
      - path: "plans/llm-performance-cutover.md"
        lines: "all"
        reason: "Canonical cutover plan must reflect the final adversarial-review model."
      - path: "README.md"
        lines: "1-260"
        reason: "Product identity, lifecycle story, and default command surface must change."
      - path: "docs/review.md"
        lines: "all"
        reason: "Review becomes the challenger hero gate and must be documented that way."
      - path: "docs/execution.md"
        lines: "all"
        reason: "Execution docs should present build as the long-running path into review, not the hero feature."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "Default help and documented command surface need the 10-verb model plus advanced legacy coverage."
      - path: "docs/configuration.md"
        lines: "all"
        reason: "Config docs should stay minimal while naming challenge-specific metrics and constraints."
      - path: "docs/run-artifacts.md"
        lines: "all"
        reason: "Transport and session responsibilities change from kind-centric to role×gate."
      - path: "AGENTS.md"
        lines: "1-260"
        reason: "Agent guidance must teach the slim surface and adversarial review identity."
      - path: "CLAUDE.md"
        lines: "1-220"
        reason: "Claude-specific integration notes should mirror the new workflow vocabulary."
      - path: ".ai/README.md"
        lines: "all"
        reason: "Workspace guide must explain spec/session primitives and handoff transport."
      - path: ".ai/OPERATORS.md"
        lines: "all"
        reason: "Operator guide must teach the new verbs and review gate semantics."
      - path: ".ai/prompts/plan.md"
        lines: "all"
        reason: "Plan template should teach the new wrapper surface."
      - path: ".ai/prompts/exec.md"
        lines: "all"
        reason: "Execution template should support build-to-review flow without overclaiming challenge."
      - path: ".ai/prompts/review.md"
        lines: "all"
        reason: "Review template must become explicitly adversarial."
      - path: "scafld/runtime_contracts.py"
        lines: "all"
        reason: "Own role×gate transport contracts, schema versions, and archive pathing."
      - path: "scafld/handoff_renderer.py"
        lines: "all"
        reason: "One renderer should emit sibling md/json handoffs with role×gate tags."
      - path: "scafld/session_store.py"
        lines: "all"
        reason: "Session must record typed entries for attempts, summaries, challenge verdicts, approvals, and overrides."
      - path: "scafld/review_workflow.py"
        lines: "all"
        reason: "Review orchestration owns challenger handoff generation and verdict capture."
      - path: "scafld/reviewing.py"
        lines: "all"
        reason: "Review artifacts must reference challenge history without breaking Review Artifact v3."
      - path: "scafld/commands/review.py"
        lines: "all"
        reason: "review and complete must gate on challenger verdicts and audited overrides."
      - path: "scafld/commands/reporting.py"
        lines: "all"
        reason: "report should headline first_attempt_pass_rate, recovery_convergence_rate, and challenge_override_rate."
      - path: "scafld/commands/surface.py"
        lines: "all"
        reason: "CLI surface should default to the slim agent-facing verb set and move legacy commands to advanced help."
      - path: "scafld/commands/workflow.py"
        lines: "all"
        reason: "New wrapper command module for plan/build keeps orchestration out of the low-level command modules."
      - path: "scafld/commands/execution.py"
        lines: "all"
        reason: "build wrappers and review handoff expectations still depend on clean execution/session behavior."
      - path: "tests/run_contracts_smoke.sh"
        lines: "all"
        reason: "Transport tests should assert role×gate metadata and sibling artifacts."
      - path: "tests/session_recovery_smoke.sh"
        lines: "all"
        reason: "Session smoke should cover typed event recording and recovery counters."
      - path: "tests/review_handoff_smoke.sh"
        lines: "all"
        reason: "Review handoff tests should become challenger-handoff tests."
      - path: "tests/review_gate_smoke.sh"
        lines: "all"
        reason: "Review gate semantics must stay compatible while using challenger verdicts."
      - path: "tests/report_metrics_smoke.sh"
        lines: "all"
        reason: "Report metrics must include challenge_override_rate."
      - path: "tests/agent_surface_smoke.sh"
        lines: "all"
        reason: "New smoke test for the agent-facing verb surface and help output."
      - path: "tests/package_smoke.sh"
        lines: "all"
        reason: "New modules, prompts, and docs must remain packaged."
      - path: "tests/update_smoke.sh"
        lines: "all"
        reason: "Managed bundle refresh must keep the slim prompt and help surface synchronized."
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "config_from_env"
      - "no_test_logic_in_production"
    related_docs:
      - "plans/llm-performance-cutover.md"
      - "README.md"
      - "docs/review.md"
      - "docs/run-artifacts.md"
      - "AGENTS.md"
  objectives:
    - "Reposition scafld as long-running AI coding work under adversarial review."
    - "Keep `spec` and `session` as the only primitives."
    - "Make `handoff` transport only, tagged by `role × gate`, emitted as sibling `.md/.json` files."
    - "Fire challenge at `review` only in v1 and record challenger verdicts plus human overrides in session."
    - "Expose the compact agent-facing command surface: plan, approve, build, review, complete, status, list, report, handoff, update."
    - "Keep legacy commands working and discoverable through advanced help and compatibility paths."
    - "Keep v1 at zero spec schema changes."
  scope:
    in_scope:
      - "Product and docs rewrite around adversarial review."
      - "Transport contract refactor from kind-centric to role×gate."
      - "Typed session entries for review challenge and override events."
      - "Challenger-role handoff at the review gate."
      - "Agent-facing CLI wrappers and help slimming."
      - "Report metrics for challenge_override_rate."
      - "Smoke coverage for transport, review gate, reporting, packaging, and agent surface."
    out_of_scope:
      - "Challenge firing at harden, phase, or recovery gates."
      - "Spec schema changes."
      - "Removing legacy commands in v1."
      - "Archive precedent retrieval."
      - "Model-tuned renderer hints beyond the existing minimal config."
  dependencies:
    - "Builds on the existing handoff/session runtime already landed in the workspace."
  assumptions:
    - "The current lifecycle remains the only underlying state machine."
    - "Review is the one meaningful adversarial gate in v1."
    - "The challenger verdict can be recorded in session and surfaced through Review Artifact v3 without a schema migration."
    - "Wrapper verbs can orchestrate existing low-level commands instead of replacing them immediately."
  touchpoints:
    - area: "Identity"
      description: "README, plans, prompts, and operator docs must tell one adversarial-review story."
    - area: "Transport"
      description: "handoff metadata and file layout must be role×gate-based and remain immutable."
    - area: "Session ledger"
      description: "session must become the only durable source for challenge verdicts and overrides."
    - area: "Review gate"
      description: "review must become the hero gate while complete remains the audited closeout path."
    - area: "CLI surface"
      description: "default help and prompts must teach the slim verb surface without breaking scripts."
    - area: "Reporting"
      description: "report must surface challenge_override_rate next to the existing quality metrics."
  risks:
    - description: "A weak review prompt could make challenge ceremonial rather than adversarial."
      impact: "high"
      mitigation: "Rewrite the review template explicitly as an attacker brief and add targeted smoke coverage."
    - description: "CLI slimming can confuse existing users if advanced help is not obvious."
      impact: "medium"
      mitigation: "Preserve legacy commands and make `--help --advanced` the compatibility escape hatch."
    - description: "Role×gate transport can drift from existing kind-based behavior."
      impact: "high"
      mitigation: "Keep compatibility fields where needed, and cover the transport contract in smoke tests."
    - description: "Challenge_override_rate can overclaim causality."
      impact: "medium"
      mitigation: "State explicitly that metrics are session-observed outcomes and the harness may ignore handoffs."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "The cutover plan and repo docs consistently frame scafld as adversarial review over long-running AI coding work."
        status: "pending"
      - id: "dod2"
        description: "handoff transport is role×gate tagged, emitted as sibling `.md/.json` pairs, and remains immutable."
        status: "pending"
      - id: "dod3"
        description: "session records typed entries for attempts, phase summaries, challenger verdicts, approvals, and human overrides."
        status: "pending"
      - id: "dod4"
        description: "review emits a challenger-role handoff and complete gates on the challenger verdict unless a human override is recorded."
        status: "pending"
      - id: "dod5"
        description: "The default agent-facing help and prompt surface teaches the 10 workflow verbs while legacy commands remain available."
        status: "pending"
      - id: "dod6"
        description: "report shows first_attempt_pass_rate, recovery_convergence_rate, and challenge_override_rate."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate adversarial-review-cutover"
        expected: "exit code 0"
      - id: "v2"
        type: "compile"
        description: "Compile the scafld package after the refactor."
        command: "python3 -m compileall scafld"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Run transport and session smoke coverage."
        command: "bash tests/run_contracts_smoke.sh && bash tests/session_recovery_smoke.sh"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Run review gate and challenger handoff coverage."
        command: "bash tests/review_handoff_smoke.sh && bash tests/review_gate_smoke.sh"
        expected: "exit code 0"
      - id: "v5"
        type: "test"
        description: "Run report and agent-surface coverage."
        command: "bash tests/report_metrics_smoke.sh && bash tests/agent_surface_smoke.sh"
        expected: "exit code 0"
      - id: "v6"
        type: "test"
        description: "Run package and managed-bundle coverage."
        command: "bash tests/package_smoke.sh && bash tests/update_smoke.sh"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not add a separate challenge artifact family."
      - "Do not add a telemetry artifact or telemetry command."
      - "Do not change the spec schema in v1."
      - "Do not fire challenge outside the review gate in v1."
      - "Do not break existing scripts that call the old command surface."
  notes: >
    Clean code shape matters as much as the product story. `runtime_contracts`
    should own enums, schema versions, and pathing. `handoff_renderer` should
    only render transport. `session_store` should own typed entries and metric
    helpers. `review_workflow` should own challenger verdict flow. Wrapper
    verbs belong in `scafld/commands/workflow.py`, not in the low-level command
    modules. Avoid a new `challenge.py` or `telemetry.py`; the new shape should
    be smaller than it looks from the outside.

planning_log:
  - timestamp: "2026-04-23T14:01:58Z"
    actor: "user"
    summary: "Spec created via scafld new"
  - timestamp: "2026-04-23T14:03:11Z"
    actor: "agent"
    summary: "Replaced the placeholder draft with the final adversarial-review cutover shape."

phases:
  - id: "phase1"
    name: "Identity and docs"
    objective: "Rewrite the plan, docs, prompts, and operator guidance around adversarial review as the core identity."
    changes:
      - file: "plans/llm-performance-cutover.md"
        action: "update"
        content_spec: |
          Rewrite the cutover plan around the final shape: `spec` and `session`
          as primitives, `handoff` as transport, review as the adversarial hero
          gate, the compact 10-verb surface, and the clean module ownership
          boundaries.
      - file: "README.md"
        action: "update"
        content_spec: |
          Replace the LLM-performance framing with long-running AI coding work
          under adversarial review. Make review the differentiator and describe
          handoff as transport instead of the product story.
      - file: "docs/review.md"
        action: "update"
        content_spec: |
          Document review as a challenger gate whose verdict determines whether
          complete can close normally.
      - file: "docs/execution.md"
        action: "update"
        content_spec: |
          Keep execution focused on build progress, recovery, and handoff
          emission without turning phase execution into challenge theater.
      - file: "AGENTS.md"
        action: "update"
        content_spec: |
          Teach the slim workflow verbs, the review hero gate, and the fact
          that handoff is transport rather than the central primitive.
      - file: "CLAUDE.md"
        action: "update"
        content_spec: |
          Mirror the new vocabulary and guide Claude users toward the agent-
          facing wrapper verbs.
      - file: ".ai/README.md"
        action: "update"
        content_spec: |
          Explain spec and session as primitives and handoff as role×gate
          transport.
      - file: ".ai/OPERATORS.md"
        action: "update"
        content_spec: |
          Teach the compact workflow and explain review challenge plus human
          override semantics.
      - file: ".ai/prompts/plan.md"
        action: "update"
        content_spec: |
          Use the compact workflow vocabulary and set up review as the decisive
          adversarial gate.
      - file: ".ai/prompts/exec.md"
        action: "update"
        content_spec: |
          Keep execution coherent across a long-running build and point toward
          review as the next meaningful gate.
      - file: ".ai/prompts/review.md"
        action: "update"
        content_spec: |
          Rewrite the review template as an explicitly adversarial challenger
          brief that tries to falsify the task claim.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Cutover plan and docs consistently use adversarial-review framing."
        command: "bash -lc 'rg -qi \"adversarial review|unchallenged|challenge_override_rate\" plans/llm-performance-cutover.md README.md docs/review.md AGENTS.md .ai/README.md .ai/OPERATORS.md'"
        expected: "exit code 0"
      - id: "ac1_2"
        type: "documentation"
        description: "Prompt docs teach the plan/build/review vocabulary and treat review as adversarial."
        command: "bash -lc 'rg -qi \"plan|build|review\" .ai/prompts/plan.md .ai/prompts/exec.md && rg -qi \"adversarial|challenger|falsify\" .ai/prompts/review.md'"
        expected: "exit code 0"
    status: "pending"

  - id: "phase2"
    name: "Transport and ledger cleanup"
    objective: "Refactor the current handoff/session implementation into clean role×gate transport plus typed session entries."
    dependencies: ["phase1"]
    changes:
      - file: "scafld/runtime_contracts.py"
        action: "update"
        content_spec: |
          Define role and gate enums, compatibility fields, schema versions,
          and archive-aware path helpers without introducing new runtime
          primitives.
      - file: "scafld/handoff_renderer.py"
        action: "update"
        content_spec: |
          Render handoffs from `role × gate` and emit sibling `.md/.json`
          artifacts. Keep current compatibility fields only where needed for
          legacy callers.
      - file: "scafld/session_store.py"
        action: "update"
        content_spec: |
          Record typed entries for attempts, phase summaries, approvals,
          challenger verdicts, and human overrides. Keep session as the only
          durable runtime state source.
      - file: "docs/run-artifacts.md"
        action: "update"
        content_spec: |
          Rewrite the artifact contract around spec/session primitives and
          handoff transport tagged by role and gate.
      - file: "tests/run_contracts_smoke.sh"
        action: "update"
        content_spec: |
          Assert role×gate metadata plus sibling `.md/.json` artifact
          generation.
      - file: "tests/session_recovery_smoke.sh"
        action: "update"
        content_spec: |
          Assert typed session entries and recovery counters remain intact under
          the transport refactor.
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        description: "scafld compiles after the transport and ledger refactor."
        command: "python3 -m compileall scafld"
        expected: "exit code 0"
      - id: "ac2_2"
        type: "test"
        description: "Transport and session smoke tests pass."
        command: "bash tests/run_contracts_smoke.sh && bash tests/session_recovery_smoke.sh"
        expected: "exit code 0"
    status: "pending"

  - id: "phase3"
    name: "Review challenger gate"
    objective: "Make review the single challenge gate and record its disposition in session."
    dependencies: ["phase2"]
    changes:
      - file: "scafld/review_workflow.py"
        action: "update"
        content_spec: |
          Generate challenger-role handoffs at `gate: review`, ingest
          challenger verdicts, and record them as typed session entries.
      - file: "scafld/reviewing.py"
        action: "update"
        content_spec: |
          Keep Review Artifact v3 valid while referencing challenge history and
          audited overrides.
      - file: "scafld/commands/review.py"
        action: "update"
        content_spec: |
          Treat review as the hero gate. Make complete close only when the
          challenger verdict allows it, unless a human override is explicitly
          recorded.
      - file: "docs/review.md"
        action: "update"
        content_spec: |
          Explain challenger verdicts, review blocking, and override behavior.
      - file: "tests/review_handoff_smoke.sh"
        action: "update"
        content_spec: |
          Assert the review handoff is challenger-tagged and wired into the
          review artifact.
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        content_spec: |
          Assert complete respects challenger verdicts and records overrides
          honestly.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Review handoff and review gate smoke tests pass."
        command: "bash tests/review_handoff_smoke.sh && bash tests/review_gate_smoke.sh"
        expected: "exit code 0"
    status: "pending"

  - id: "phase4"
    name: "Agent surface and compatibility"
    objective: "Expose the compact workflow verbs while preserving the existing command surface for scripts and advanced users."
    dependencies: ["phase3"]
    changes:
      - file: "scafld/commands/workflow.py"
        action: "create"
        content_spec: |
          Add thin orchestration wrappers for `plan` and `build` so the agent-
          facing surface can stay compact without bloating the low-level
          modules.
      - file: "scafld/commands/surface.py"
        action: "update"
        content_spec: |
          Present the 10-verb surface in default help, keep legacy verbs
          functional, and move their documentation behind advanced help.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document the compact agent-facing command surface plus the advanced
          compatibility layer.
      - file: "AGENTS.md"
        action: "update"
        content_spec: |
          Teach only the compact workflow verbs by default.
      - file: "CLAUDE.md"
        action: "update"
        content_spec: |
          Mirror the compact workflow and explain that legacy verbs still exist
          for compatibility.
      - file: "tests/agent_surface_smoke.sh"
        action: "create"
        content_spec: |
          Assert default help surfaces the compact verbs and legacy commands are
          still invokable through compatibility paths.
      - file: "tests/update_smoke.sh"
        action: "update"
        content_spec: |
          Ensure the managed bundle refresh keeps the compact prompt and help
          surface synchronized.
    acceptance_criteria:
      - id: "ac4_1"
        type: "test"
        description: "Agent-surface and managed-bundle smoke tests pass."
        command: "bash tests/agent_surface_smoke.sh && bash tests/update_smoke.sh"
        expected: "exit code 0"
    status: "pending"

  - id: "phase5"
    name: "Reporting and packaging"
    objective: "Expose the final metrics and keep the repo distributable after the cutover."
    dependencies: ["phase4"]
    changes:
      - file: "scafld/commands/reporting.py"
        action: "update"
        content_spec: |
          Headline first_attempt_pass_rate, recovery_convergence_rate, and
          challenge_override_rate, both per task and in aggregate.
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Keep config minimal while documenting the review-only challenge rule
          and honest attribution boundary.
      - file: "docs/run-artifacts.md"
        action: "update"
        content_spec: |
          Explain which session entries feed challenge_override_rate and how
          archived runs retain that evidence.
      - file: "tests/report_metrics_smoke.sh"
        action: "update"
        content_spec: |
          Assert challenge_override_rate in human and JSON report output.
      - file: "tests/package_smoke.sh"
        action: "update"
        content_spec: |
          Ensure new commands, prompts, and docs remain packaged.
    acceptance_criteria:
      - id: "ac5_1"
        type: "test"
        description: "Report, package, and lifecycle smoke tests pass."
        command: "bash tests/report_metrics_smoke.sh && bash tests/package_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- plans/llm-performance-cutover.md README.md docs/review.md docs/execution.md AGENTS.md CLAUDE.md .ai/README.md .ai/OPERATORS.md .ai/prompts/plan.md .ai/prompts/exec.md .ai/prompts/review.md"
    phase2: "git checkout HEAD -- scafld/runtime_contracts.py scafld/handoff_renderer.py scafld/session_store.py docs/run-artifacts.md tests/run_contracts_smoke.sh tests/session_recovery_smoke.sh"
    phase3: "git checkout HEAD -- scafld/review_workflow.py scafld/reviewing.py scafld/commands/review.py docs/review.md tests/review_handoff_smoke.sh tests/review_gate_smoke.sh"
    phase4: "git checkout HEAD -- scafld/commands/surface.py docs/cli-reference.md AGENTS.md CLAUDE.md tests/update_smoke.sh && rm -f scafld/commands/workflow.py tests/agent_surface_smoke.sh"
    phase5: "git checkout HEAD -- scafld/commands/reporting.py docs/configuration.md docs/run-artifacts.md tests/report_metrics_smoke.sh tests/package_smoke.sh tests/lifecycle_smoke.sh"

metadata:
  estimated_effort_hours: 20
  ai_model: "unspecified"
  tags:
    - "adversarial-review"
    - "session"
    - "transport"
    - "review-gate"
    - "cli"
