spec_version: "1.1"
task_id: "real-work-dogfood-proof"
created: "2026-04-24T06:10:00Z"
updated: "2026-04-24T06:10:00Z"
status: "draft"
harden_status: "not_run"

task:
  title: "Prove The Ceremony Pays Off On Real Repo Work"
  summary: >
    Dogfood scafld against a curated cohort of medium brownfield tasks until
    the release bar is no longer theoretical. The real standard is explicit:
    build feels easier than a raw agent loop, review catches meaningful
    defects often enough to matter, the handoff is consumed by default, and
    the extra ceremony feels justified on real repo work. This slice defines
    the cohort, the runbook, the reporting script, and the documented cut/no-cut
    bar.
  size: "large"
  risk_level: "medium"
  context:
    packages:
      - "scripts/"
      - "docs/"
      - "tests/"
      - ".ai/specs/archive/"
      - "scafld/commands/reporting.py"
    files_impacted:
      - path: "scripts/real_standard.py"
        lines: "all"
        reason: "A cohort runner should summarize the real-standard questions from existing sessions and review artifacts."
      - path: "docs/dogfooding.md"
        lines: "all"
        reason: "Dogfood runbook and release bar should be documented explicitly."
      - path: "docs/release.md"
        lines: "all"
        reason: "Release guidance should include the 9.5+ tool bar."
      - path: "tests/real_standard_cohort_smoke.sh"
        lines: "all"
        reason: "New smoke should keep the cohort script and docs honest."
      - path: "scafld/commands/reporting.py"
        lines: "all"
        reason: "Current report JSON should be consumable by the cohort script without new primitives."
      - path: ".ai/specs/archive/"
        lines: "task-selected"
        reason: "Dogfood should run against real archived or newly executed medium tasks."
    invariants:
      - "public_api_stable"
      - "config_from_env"
      - "no_test_logic_in_production"
    related_docs:
      - "README.md"
      - "docs/review.md"
      - "docs/execution.md"
  objectives:
    - "Define the real-standard release bar as an explicit cohort question set."
    - "Create a runbook for executing medium brownfield tasks through the taught surface."
    - "Add a script that summarizes the real-standard signals from report/session/review data."
    - "Record per-task operator notes for build friction, review usefulness, handoff consumption, and ceremony payoff."
    - "Make future release decisions depend on real repo work, not architecture confidence."
  scope:
    in_scope:
      - "Dogfood cohort definition."
      - "Runbook and release-bar docs."
      - "A thin cohort-summary script over existing report/session/review data."
      - "Smoke coverage for the runbook and cohort script."
    out_of_scope:
      - "Hosted telemetry."
      - "A new report command."
      - "Spec schema changes."
      - "Forcing hard numeric release gates into core runtime behavior."
  dependencies:
    - "build-happy-path-product-fit"
    - "challenger-review-signal-lift"
    - "default-handoff-consumption"
  assumptions:
    - "Some parts of the real standard remain partly qualitative and should be recorded honestly as operator notes."
    - "The cohort script should consume existing report and session outputs rather than inventing a parallel telemetry layer."
  touchpoints:
    - area: "dogfood cohort"
      description: "Medium brownfield tasks are the proving ground, not toy smoke tests."
    - area: "release bar"
      description: "The 9.5+ standard should be written down as a cut/no-cut decision aid."
    - area: "operator notes"
      description: "Qualitative evidence should sit alongside the measurable signals, not be hand-waved away."
    - area: "existing report surface"
      description: "The cohort script should stand on the current report/session/review artifacts."
  risks:
    - description: "The cohort can turn into vanity reporting if the tasks are too small or too friendly."
      impact: "high"
      mitigation: "Require medium brownfield tasks and record why each task is representative."
    - description: "Qualitative notes can become vague and non-comparable."
      impact: "medium"
      mitigation: "Use a fixed question set aligned to the real standard for each task."
    - description: "A custom script can drift from current report/session contracts."
      impact: "medium"
      mitigation: "Keep it thin and back it with a cohort smoke test."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "A documented dogfood runbook exists for medium brownfield tasks."
        status: "pending"
      - id: "dod2"
        description: "A thin cohort script summarizes the real-standard signals from existing report/session/review data."
        status: "pending"
      - id: "dod3"
        description: "The release bar is written down as build ease, review usefulness, default handoff consumption, and ceremony payoff."
        status: "pending"
      - id: "dod4"
        description: "A cohort smoke test proves the runbook and script stay aligned."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate real-work-dogfood-proof"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Run the cohort smoke and report smoke."
        command: "bash tests/real_standard_cohort_smoke.sh && bash tests/report_metrics_smoke.sh"
        expected: "exit code 0"
      - id: "v3"
        type: "custom"
        description: "The cohort script can summarize an explicit task list."
        command: "python3 scripts/real_standard.py --help"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not create a new telemetry artifact family."
      - "Do not pretend the real standard is fully measurable from one number."
      - "Do not replace existing report with a dogfood-specific subsystem."
  notes: >
    This slice is the honesty check. The architecture is already strong enough.
    The remaining question is whether the product earns the ceremony on real
    repo work. Keep the implementation thin: a runbook, a cohort script over
    existing artifacts, and a fixed question set aligned to the real standard.

planning_log:
  - timestamp: "2026-04-24T06:10:00Z"
    actor: "assistant"
    summary: "Drafted the real-work dogfood slice against the 9.5-plus release bar."

phases:
  - id: "phase1"
    name: "Define the cohort and runbook"
    objective: "Write down what counts as representative real repo work and how to run it."
    changes:
      - file: "docs/dogfooding.md"
        action: "create"
        content_spec: |
          Define the cohort, the fixed question set, and the runbook for
          running medium brownfield tasks through scafld.
      - file: "docs/release.md"
        action: "update"
        content_spec: |
          Add the 9.5+ release bar so release decisions anchor to the real
          standard instead of intuition.
    acceptance_criteria:
      - id: "ac1_1"
        type: "custom"
        description: "Dogfood runbook documents the real-standard question set."
        command: "bash tests/real_standard_cohort_smoke.sh"
        expected: "exit code 0"
    status: "pending"

  - id: "phase2"
    name: "Summarize the cohort honestly"
    objective: "Add a thin script that reads existing artifacts and produces a cohort summary."
    dependencies: ["phase1"]
    changes:
      - file: "scripts/real_standard.py"
        action: "create"
        content_spec: |
          Read explicit task ids plus existing report/session/review data and
          summarize the measurable signals and fixed operator question set.
      - file: "scafld/commands/reporting.py"
        action: "update"
        content_spec: |
          Keep report JSON consumable by the cohort script without adding new
          primitives.
      - file: "tests/real_standard_cohort_smoke.sh"
        action: "create"
        content_spec: |
          Prove the cohort script and docs stay aligned to the real-standard
          question set.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Cohort smoke and report smoke pass."
        command: "bash tests/real_standard_cohort_smoke.sh && bash tests/report_metrics_smoke.sh"
        expected: "exit code 0"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- docs/dogfooding.md docs/release.md tests/real_standard_cohort_smoke.sh"
    phase2: "git checkout HEAD -- scripts/real_standard.py scafld/commands/reporting.py tests/real_standard_cohort_smoke.sh"
