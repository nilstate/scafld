task:
  title: Make adversarial review use a real external runner
  summary: '`scafld review` still only opens the challenger round and emits a handoff,
    while the thin provider wrappers are an optional side path. The clean model is:
    `scafld review` owns challenger execution. It resolves a runner explicitly, defaults
    to external execution, prefers `codex` then `claude`, supports explicit `local`
    and `manual` fallback modes, and records review provenance without introducing
    compatibility shims or a second review artifact format.

    '
  size: medium
  risk_level: medium
  context:
    packages:
    - scafld
    - docs
    - tests
    files_impacted:
    - path: scafld/commands/review.py
      lines: all
      reason: Review command should own runner resolution and execution instead of
        only printing the challenger handoff.
    - path: scafld/review_runtime.py
      lines: all
      reason: Review snapshot/result payload should expose runner-ready metadata without
        breaking the JSON control surface.
    - path: scafld/review_workflow.py
      lines: all
      reason: The review round writer and metadata model are the canonical place to
        persist completed challenger provenance.
    - path: scafld/reviewing.py
      lines: all
      reason: Review metadata validation must understand the new runner/provenance
        fields.
    - path: scafld/commands/surface.py
      lines: all
      reason: The public review command needs explicit runner/provider/model overrides.
    - path: scafld/review_runner.py
      lines: all
      reason: New dedicated boundary for runner selection, provider invocation, and
        output normalization.
    - path: .ai/config.yaml
      lines: all
      reason: Review runner defaults belong in config, not hardcoded CLI assumptions.
    - path: docs/review.md
      lines: all
      reason: The review product surface and fallback modes need to match the new
        command behavior.
    - path: docs/integrations.md
      lines: all
      reason: Thin wrapper docs must stop claiming wrappers are the default review
        path.
    - path: docs/configuration.md
      lines: all
      reason: Runner/provider/model config needs a documented contract.
    - path: docs/cli-reference.md
      lines: all
      reason: Review flags and default runner semantics are part of the taught CLI
        surface.
    - path: tests/review_gate_smoke.sh
      lines: all
      reason: The real review gate smoke should prove external, local, and manual
        review paths.
    - path: tests/codex_handoff_adapter_smoke.sh
      lines: all
      reason: Existing adapter smoke should keep proving the thin provider wrapper
        still works as a non-default integration surface.
    - path: tests/claude_handoff_adapter_smoke.sh
      lines: all
      reason: Claude wrapper smoke should continue to prove the optional integration
        path after the hard cut.
    invariants:
    - domain_boundaries
    - no_legacy_code
    - packaged_cli_is_the_truth_surface
    - review_artifact_stays_scafld_owned
  objectives:
  - Make `scafld review` own challenger runner selection and execution by default.
  - Keep the external path clean: explicit provider selection, codex-first auto resolution,
      claude fallback, and real provenance capture.
  - Preserve an explicit degraded fallback path via `local` or `manual` instead of
    silent implicit fallback.
  - Keep the existing review artifact and review gate contracts intact instead of
    introducing a parallel format.
  scope:
    in_scope:
    - review command flags and control flow
    - review runner config and provider resolution
    - external subprocess execution for codex and claude
    - local/manual fallback modes
    - review metadata/provenance fields
    - docs and smoke coverage for the new review surface
    out_of_scope:
    - changing the adversarial pass topology itself
    - changing complete/override semantics beyond consuming the new review metadata
    - replacing the thin provider wrapper scripts for build/review integration
  assumptions:
  - codex and claude non-interactive CLIs are available in at least some environments,
    but may be absent in others
  - the JSON review surface should remain a control-plane snapshot and not mix subprocess
    stdout into machine-readable output
  - scafld should remain provider-neutral in core even while shipping first-party
    codex and claude runner implementations
  touchpoints:
  - area: review command surface
    description: '`scafld review` should be the canonical challenger entrypoint instead
      of wrapper-first behavior.'
  - area: review artifact contract
    description: The latest review round should stay scafld-owned, validated, and
      provenance-rich.
  - area: provider integrations
    description: Codex and Claude should remain thin external integrations selected
      by the runner boundary, not leak into review core logic.
  acceptance:
    validation_profile: standard
    definition_of_done:
    - id: dod1
      description: '`scafld review` defaults to external runner resolution and completes
        a challenger round through a clean subprocess path when a provider is available.'
      status: done
      checked_at: "2026-04-25T14:14:00Z"
      notes: "review now defaults to external execution and writes completed rounds through scafld."
    - id: dod2
      description: Explicit `local` and `manual` review modes exist and are visibly
        degraded, not silent fallback.
      status: done
      checked_at: "2026-04-25T14:14:00Z"
      notes: "local/manual review require explicit selection and leave the round in_progress."
    - id: dod3
      description: Review metadata records runner/provider provenance without changing
        the gate artifact shape.
      status: done
      checked_at: "2026-04-25T14:14:00Z"
      notes: "review metadata now carries review_provenance with runner/provider/model timing and response hash."
    - id: dod4
      description: Docs and smoke tests teach and prove the new review path.
      status: done
      checked_at: "2026-04-25T14:14:00Z"
      notes: "docs/help are aligned and the review + adapter smokes are green."
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after review runner changes.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Review gate smoke proves external, local, and manual runner behavior.
      command: bash tests/review_gate_smoke.sh external-runner
      expected: exit code 0
    - id: v3
      type: integration
      description: Codex wrapper smoke still proves the thin review adapter path.
      command: bash tests/codex_handoff_adapter_smoke.sh
      expected: exit code 0
    - id: v4
      type: integration
      description: Claude wrapper smoke still proves the thin review adapter path.
      command: bash tests/claude_handoff_adapter_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not add compatibility aliases that preserve the old wrapper-first review
      model as the taught surface.
    - Do not silently fall back from external to local review.
    - Do not let the external agent rewrite unrelated files as part of review execution.
  notes: 'The clean product line here is narrow: `scafld review` owns challenger execution,
    provider integrations stay thin, and degraded fallback modes are explicit.

    '
