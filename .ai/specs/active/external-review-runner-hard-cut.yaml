phases:
- id: phase1
  name: Add runner config and selection boundary
  objective: Define the explicit runner/provider/model contract and add a dedicated
    review-runner seam instead of overloading the current prompt-pipe helper.
  changes:
  - file: .ai/config.yaml
    action: update
    content_spec: Add review runner defaults covering runner mode and external provider/model
      selection.
  - file: scafld/commands/surface.py
    action: update
    content_spec: Add explicit review flags for runner/provider/model overrides.
  - file: scafld/review_runner.py
    action: create
    content_spec: Create the dedicated runner boundary for loading config and resolving
      runner/provider selection.
  acceptance_criteria:
  - id: ac1_1
    type: integration
    description: Review surface exposes the new runner/provider/model options without
      breaking help or parsing.
    command: python3 - <<'PY'\nfrom scafld.commands.surface import COMMAND_SPECS\nreview
      = next(spec for spec in COMMAND_SPECS if spec.name == 'review')\nflags = {flag
      for arg in review.args for flag in arg.flags if flag.startswith('--')}\nassert
      '--runner' in flags\nassert '--provider' in flags\nassert '--model' in flags\nPY
    expected: exit code 0
    result:
      status: pass
      timestamp: "2026-04-25T14:02:00Z"
      output: "review surface exposes runner/provider/model overrides"
  status: completed
- id: phase2
  name: Run challenger reviews through external, local, and manual paths
  objective: Make `scafld review` default to external subprocess execution, preserve
    explicit degraded modes, and persist completed review data plus provenance through
    the existing review artifact.
  dependencies:
  - phase1
  changes:
  - file: scafld/commands/review.py
    action: update
    content_spec: Use the new review runner to execute or emit the challenger round
      depending on runner mode.
  - file: scafld/review_runtime.py
    action: update
    content_spec: Expose runner-ready review payload fields without mixing provider
      subprocess output into JSON mode.
  - file: scafld/review_workflow.py
    action: update
    content_spec: Add helpers to complete the latest review round from structured
      runner output while keeping the canonical artifact shape.
  - file: scafld/reviewing.py
    action: update
    content_spec: Validate and surface the new runner/provider provenance metadata.
  - file: tests/review_gate_smoke.sh
    action: update
    content_spec: Add review-gate coverage for codex-first resolution, claude fallback,
      explicit local mode, and explicit manual mode.
  acceptance_criteria:
  - id: ac2_1
    type: integration
    description: Review gate smoke proves external/local/manual runner behavior.
    command: bash tests/review_gate_smoke.sh external-runner
    expected: exit code 0
    result:
      status: pass
      timestamp: "2026-04-25T14:02:00Z"
      output: "external runner smoke passed with codex-path proof, claude fallback, and explicit local/manual degradation"
  status: completed
- id: phase3
  name: Sync wrappers, docs, and integration expectations
  objective: Keep the thin provider wrapper story honest now that `scafld review`
    owns the default challenger path.
  dependencies:
  - phase2
  changes:
  - file: docs/review.md
    action: update
    content_spec: Teach the new default review runner behavior, degraded modes, and
