phases:
  - id: "phase1"
    name: "Accept a model list in review config"
    objective: "Parse `review.external.{codex,claude}.model` as `str | list[str]` and thread an ordered list of models down to the runner."
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - Replace `_provider_model` with `_provider_models` returning a
            non-empty list of strings, accepting both string and list[str]
            shapes. Reject empty lists, non-string entries, and oversize
            lists with a clear `ValueError` referencing `CONFIG_PATH`.
          - `ReviewRunnerConfig` and `ResolvedReviewRunner` gain a `models`
            field (tuple of strings). The legacy `model` field stays as the
            first element so existing callers keep working.
          - `resolve_review_runner` honors `--model` overrides as a single
            element list with a one-shot warning if a list was configured.
          - `configured_provider_model` becomes `configured_provider_models`
            with a thin shim returning the first element for callers that
            still want a single model.
      - file: "tests/test_review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add tests covering: single-string config returns a 1-tuple; list
          config preserves order; empty list raises; non-string entry
          raises; `--model` override yields a 1-tuple regardless of
          configured shape.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        description: "Sources compile after config refactor."
        command: "python3 -m compileall scafld tests"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:12:59Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac1_2"
        type: "test"
        description: "Config parsing tests pass."
        command: "python3 -m unittest tests.test_review_runner"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:12:59Z"
        result_output: "..................................... ---------------------------------------------------------------------- Ran 37 tests in 0.000s  OK"
    status: "completed"

  - id: "phase2"
    name: "Per-model retry loop with rejection classifier"
    objective: "When a provider exits with a model-rejection signature, retry against the next configured model and record both attempts."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - Add `_is_model_rejection(returncode, stdout, stderr)` matching a
            tight allowlist of strings: `unknown model`, `model not found`,
            `model not available`, `does not have access`, `not authorized
            to use this model`. Only signal classification on non-zero
            return codes.
          - Restructure `run_external_review` so the provider call lives in
            a `for model in resolved_runner.models:` loop. Each attempt:
              - Records a provider invocation with status `running`.
              - On non-zero exit + classifier match, records the entry as
                `failed_model_unavailable` with the matched signature, then
                continues.
              - On non-zero exit + classifier miss, behaves exactly as today
                (`failed`, raise `ScafldError`).
              - On success, records `completed` and returns the result.
            After exhausting the list, raise the existing
            `external review runner failed via {provider}` error with a
            details line listing each attempted model.
          - Provenance includes a `model_attempts` list of
            `{model, status, signature?}` dicts; `model_requested` becomes
            the first attempted model and a new `model_used` field captures
            the successful one.
      - file: "tests/test_review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Cover `_is_model_rejection` against representative codex stderr
          (e.g., `error: model 'gpt-5.5' not available`) and claude stdout
          (e.g., `error: model "claude-opus-4-7" not found`). Cover negative
          cases (timeout, network error) and ensure the classifier returns
          False.
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add `external-review-model-fallback`: builds an isolated workspace
          with `review.external.codex.model: ["fake-1", "fake-2"]`. Stub
          provider exits non-zero with `error: model 'fake-1' not
          available` on the first invocation and emits a valid review
          packet on the second. Assert the review completes, the session
          ledger records two provider invocations, and the provenance
          `model_attempts` shows both attempts.
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Document `review.external.{codex,claude}.model` as `string |
          list[string]`. Show the example shape, explain the fallback
          trigger, and link to `scafld status` for observing
          `model_attempts`.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Classifier and runner unit tests pass."
        command: "python3 -m unittest tests.test_review_runner"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:22:52Z"
        result_output: ".................................................... ---------------------------------------------------------------------- Ran 52 tests in 0.001s  OK"
      - id: "ac2_2"
        type: "boundary"
        description: "Fallback smoke is registered in the harness dispatcher and case_all."
        command: "grep -q 'case_external_review_model_fallback' tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:22:52Z"
      - id: "ac2_3"
        type: "boundary"
        description: "Smoke harness has valid bash syntax."
        command: "bash -n tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:22:52Z"
      - id: "ac2_4"
        type: "boundary"
        description: "Docs explain the rejection classifier and list shape."
        command: "grep -qE 'rejection signature|model not available|list of strings' docs/configuration.md"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:23:10Z"
    status: "completed"

