task:
  title: "Provider model fallback list for external review"
  summary: >
    `review.external.codex.model` and `review.external.claude.model` accept a
    single string. The pinned defaults (`gpt-5.5`, `claude-opus-4-7`) are
    aggressive on purpose, but if an account does not have access to the pin,
    `scafld review` fails the entire run with `external review runner failed
    via codex` and forces the operator to either pass `--model` or switch
    runner. The provider-binary fallback in `_auto_provider_candidates` does
    not help here: the binary exists, only the requested model is not
    available, so auto fallback never triggers.

    Accept a list under `review.external.{codex,claude}.model` and have
    `run_external_review` retry the same provider across the list when the
    failure surface looks like a model-rejection. Record the per-attempt
    outcomes in provenance so it is obvious which model produced the verdict.
    Keep the existing single-string form working untouched.
  size: "small"
  risk_level: "low"
  context:
    packages:
      - "scafld"
      - "tests"
    files_impacted:
      - path: "scafld/review_runner.py"
        lines: "task-selected"
        reason: "Owns config parsing for review.external and the provider invocation loop."
      - path: "scafld/runtime_bundle.py"
        lines: "task-selected"
        reason: "Loads runtime config; confirm list-vs-string acceptance for the model field."
      - path: ".ai/config.yaml"
        lines: "task-selected"
        reason: "Reference config that documents the model list shape; bundled with new workspaces via `scafld init`/`scafld update`."
      - path: "tests/test_review_runner.py"
        lines: "task-selected"
        reason: "Pure tests for config parsing and the model-rejection classifier."
      - path: "tests/review_gate_smoke.sh"
        lines: "task-selected"
        reason: "End-to-end smoke that exercises the fallback path with a stub provider."
      - path: "docs/configuration.md"
        lines: "task-selected"
        reason: "Operator docs for the review configuration block."
    invariants:
      - "single_string_model_must_continue_to_work"
      - "fallback_only_triggers_on_model_rejection_surfaces"
      - "every_attempt_must_be_recorded_in_session_ledger"
      - "first_successful_attempt_is_authoritative_for_verdict"
    related_docs:
      - ".ai/specs/archive/2026-04/external-review-observed-model-truth.yaml"
      - ".ai/specs/archive/2026-04/harden-external-review-contract.yaml"
      - "docs/configuration.md"
    cwd: "."
  objectives:
    - "Accept a list of models per provider in `.ai/config.yaml` without breaking the existing single-string form."
    - "Retry the provider call against the next model only when the failure looks like model-rejection."
    - "Record an entry per attempted model in the session ledger and in the review provenance."
    - "Document the model list shape and rejection classifier in operator docs."
  scope:
    in_scope:
      - "Config parsing for `review.external.{codex,claude}.model` as `str | list[str]`."
      - "A model-rejection classifier on stderr/stdout that decides whether to advance to the next model."
      - "Per-attempt provider invocation records in the session ledger."
      - "Smoke test using a stub provider that fails the first model and succeeds on the second."
      - "Operator docs for the new shape."
    out_of_scope:
      - "Cross-provider fallback (Codex → Claude) on model rejection; that remains tied to provider-binary availability."
      - "Reordering or deduplicating user-supplied model lists."
      - "Per-attempt timeouts; the existing `timeout_seconds` applies per attempt as today."
  assumptions:
    - "Model rejection from `codex exec` and `claude -p` is observable in stderr with a stable enough signature to classify reliably; if the signature is ambiguous, fallback does not trigger and behavior matches today."
    - "Operators who pin a single model want today's behavior; the list form is opt-in."
    - "It is acceptable to record a `failed_model_unavailable` provider invocation status alongside a subsequent `completed`; downstream consumers (`scafld status`, `scafld report`) already iterate the entry list rather than reading only the latest."
  touchpoints:
    - area: "review config"
      description: "`_provider_model` becomes `_provider_models` returning an ordered list; existing callers consume the first element when they only want one."
    - area: "review runner"
      description: "Wrap the provider call in a per-model loop with rejection classification."
    - area: "session ledger"
      description: "Record one provider invocation entry per model attempt, including the new `failed_model_unavailable` status."
    - area: "operator docs"
      description: "Document the list shape and how to spot fallback events in the report."
  risks:
    - description: "Rejection classifier is too aggressive and triggers fallback on transient or unrelated errors, masking real failures."
      impact: "high"
      mitigation: "Match a tight allowlist of strings (`unknown model`, `model not found`, `model not available`, `does not have access`, `not authorized to use this model`). Anything else falls through to the existing failure path."
    - description: "List form silently changes behavior for operators who already configured a single model."
      impact: "medium"
      mitigation: "Keep the single-string code path explicit; only iterate when the parsed shape is a list of length > 1."
    - description: "Per-attempt session ledger entries swell `session.json`."
      impact: "low"
      mitigation: "Only N <= len(models) entries per review attempt; reviews are infrequent enough that growth is bounded."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "`review.external.{codex,claude}.model` accepts a string or a non-empty list of strings; existing single-string configs continue to work."
        status: "done"
      - id: "dod2"
        description: "When a provider call fails with a recognized model-rejection signature, the runner retries the same provider with the next model in the list."
        status: "done"
      - id: "dod3"
        description: "The session ledger records one provider invocation per attempted model, including the failure reason for skipped attempts."
        status: "done"
      - id: "dod4"
        description: "Smoke coverage proves the fallback path against a stub provider; unit coverage proves the rejection classifier."
        status: "done"
      - id: "dod5"
        description: "Docs explain the list shape, the rejection classifier, and how to observe fallback in `scafld status`."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        description: "Python sources compile."
        command: "python3 -m compileall scafld tests"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Unit tests cover config parsing and the rejection classifier."
        command: "python3 -m unittest tests.test_review_runner"
        expected: "exit code 0"
      - id: "v3"
        type: "integration"
        description: "Smoke proves the fallback path."
        command: "bash tests/review_gate_smoke.sh external-review-model-fallback"
        expected: "exit code 0"
      - id: "v4"
        type: "boundary"
        description: "Operator docs mention the model list shape."
        command: "rg -n 'model:.*\\[' docs/configuration.md"
        expected: "exit code 0"

