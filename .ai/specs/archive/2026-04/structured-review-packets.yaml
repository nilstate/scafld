task:
  title: "Structured review packets"
  summary: >
    External adversarial review should become a structured LLM-to-LLM repair
    transport without returning to verdict-only JSON theater. The provider must
    return a rich ReviewPacket that carries pass results, checked surfaces,
    findings, evidence, fix guidance, tests, and spec update suggestions.
    Scafld owns provenance and renders the canonical human markdown review plus
    an executor repair handoff from the normalized packet.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "scafld"
      - "tests"
      - "docs"
    files_impacted:
      - path: "scafld/review_packet.py"
        lines: "new"
        reason: "ReviewPacket schema normalization, validation, markdown projection, packet persistence, and repair-handoff rendering live here."
      - path: "scafld/review_runner.py"
        lines: "task-selected"
        reason: "External provider prompt, JSON extraction, packet validation, hashes, and runner result assembly live here."
      - path: "scafld/review_workflow.py"
        lines: "task-selected"
        reason: "Completed review rounds must be rendered from packets and invalid packet artifacts need diagnostics."
      - path: "scafld/runtime_contracts.py"
        lines: "task-selected"
        reason: "Review packet artifacts need a stable run directory."
      - path: "scafld/runtime_guidance.py"
        lines: "task-selected"
        reason: "Status/current_handoff must route failed structured reviews to the packet-derived executor repair handoff."
      - path: "scafld/commands/review.py"
        lines: "task-selected"
        reason: "Review command should expose packet and repair-handoff paths after external review."
      - path: "scafld/reviewing.py"
        lines: "task-selected"
        reason: "Finding target validation constants should be reusable by ReviewPacket validation."
      - path: "tests/review_packet_smoke.sh"
        lines: "new"
        reason: "Focused coverage for packet validation, markdown projection, and repair handoff content."
      - path: "tests/review_gate_smoke.sh"
        lines: "task-selected"
        reason: "External runner smoke stubs must return ReviewPacket JSON and assert packet artifacts."
      - path: "docs/review.md"
        lines: "task-selected"
        reason: "Operator docs should explain ReviewPacket as canonical structured transport and markdown/repair handoff as projections."
      - path: "docs/run-artifacts.md"
        lines: "task-selected"
        reason: "Run artifact docs should list review-packets and repair handoffs."
      - path: "AGENTS.md"
        lines: "task-selected"
        reason: "The canonical agent guide must list the new executor review_repair handoff and explain when agents consume it."
      - path: "tests/run_contracts_smoke.sh"
        lines: "task-selected"
        reason: "Runtime contract smoke should lock the review_repair handoff path and agent guide inventory."
    invariants:
      - "scafld_owns_provenance"
      - "markdown_review_gate_remains_authoritative_for_completion"
      - "structured_output_must_carry_repair_context_not_just_verdicts"
      - "invalid_provider_output_must_leave_diagnostics"
      - "packet_artifacts_must_not_be_blindly_applied_to_specs"
      - "rejected_review_packet_projections_must_not_create_normal_repair_artifacts"
  objectives:
    - "Define ReviewPacket v1 as the canonical provider review content contract."
    - "Require rich repair context for every finding: failure mode, why it matters, evidence, suggested fix, tests to add, and spec update suggestions."
    - "Require checked-surface context for clean passes so executors can understand what the challenger actually attacked."
    - "Render the existing markdown review artifact from the normalized packet instead of parsing provider-authored markdown."
    - "Persist normalized packets under `.ai/runs/{task-id}/review-packets/review-N.json`."
    - "Generate an executor repair handoff from the packet under `.ai/runs/{task-id}/handoffs/executor-review-repair.md`."
    - "Expose that repair handoff through status/current_handoff when structured review blocks completion."
    - "Keep scafld-owned metadata and provider provenance out of the model-returned schema."
    - "Preserve diagnostics for invalid JSON, invalid packet shape, and invalid markdown projection."
  touchpoints:
    - area: "external challenger contract"
      description: "Provider output becomes structured ReviewPacket JSON with strict machine fields and rich prose fields."
    - area: "review artifact projection"
      description: "Scafld renders markdown reviews and repair handoffs from normalized packet content."
    - area: "LLM handoff ecosystem"
      description: "The reviewer output must be useful to the next executor agent as a dense repair brief, including spec-update guidance."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "External providers are prompted to return ReviewPacket JSON only, and scafld rejects legacy prose as invalid external output."
        status: "done"
      - id: "dod2"
        description: "ReviewPacket validation enforces exact pass ids/results, a closed top-level schema, exactly one checked surface per pass, checked surfaces for clean passes, repository-grounded file:line and Markdown/YAML anchor targets, the 10-finding cap, single-line markdown-projected and repair-handoff-rendered fields, severity, blocking status, and rich repair fields."
        status: "done"
      - id: "dod3"
        description: "Completed external review rounds are rendered from normalized ReviewPacket content and still pass the existing markdown review parser."
        status: "done"
      - id: "dod4"
        description: "Normalized packet artifacts and executor repair handoffs are persisted and referenced in review provenance/command output only after the markdown review projection passes the canonical review parser, and failed structured reviews surface the repair handoff through status/current_handoff."
        status: "done"
      - id: "dod5"
        description: "Docs explain ReviewPacket as the canonical structured transport, with markdown and repair handoffs as projections."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        description: "Python sources compile after packet contract changes."
        command: "python3 -m compileall scafld cli scripts"
        expected: "exit code 0"
      - id: "v2"
        type: "integration"
        description: "Focused packet smoke validates schema, projection, persistence, and repair handoff rendering."
        command: "bash tests/review_packet_smoke.sh"
        expected: "exit code 0"
      - id: "v3"
        type: "integration"
        description: "External runner smoke proves both provider stubs return ReviewPacket JSON and produce packet artifacts."
        command: "bash tests/review_gate_smoke.sh external-runner-structured-packet"
        expected: "exit code 0"
      - id: "v4"
        type: "integration"
        description: "External runner observability smoke still persists diagnostics for invalid output."
        command: "bash tests/review_gate_smoke.sh external-runner-observability"
        expected: "exit code 0"

