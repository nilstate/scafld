harden_rounds:
  - round: 1
    started_at: "2026-04-26T14:51:57Z"
    outcome: "passed"
    questions:
      - q: "Should ReviewPacket be the canonical provider artifact, with markdown and repair handoffs rendered by scafld?"
        recommended_answer: "Yes. This prevents dual-source reconciliation and keeps scafld in charge of provenance, validation, and durable projections."
        grounded_in: "code:scafld/review_workflow.py:577"
      - q: "Should the packet optimize for executor repair, not just gate verdicts?"
        recommended_answer: "Yes. Each finding should carry failure mode, evidence, fix direction, tests, and spec-update suggestions so the next LLM can repair without rediscovering the review."
        grounded_in: "spec_gap:objectives"

