    command: python3 -m compileall scafld cli
    expected: exit code 0
    result: "pass"
    executed_at: "2026-04-25T15:05:51Z"
    result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'cli'..."
  status: "completed"
- id: phase2
  name: Restore prose as the review contract
  objective: >
    Stop treating shape-valid JSON as a trusted review and route external
    challenger content through the canonical markdown parser before persisting.
  dependencies:
  - phase1
  changes:
  - file: scafld/review_runner.py
    action: update
    ownership: shared
    content_spec: >
      Replace the broad verdict/blocking/non_blocking JSON payload with a
      prose-first output contract. Permit only a narrow control object for
      pass_results if needed; adversarial sections, Blocking, Non-blocking, and
      Verdict must be prose in the canonical review shape.
  - file: scafld/review_workflow.py
    action: update
    ownership: shared
    content_spec: >
      Render candidate completed review rounds from external prose into a
      temporary string/file, run parse_review_file on that candidate, reject
      parser errors, and only then replace the latest in-progress review round.
  - file: scafld/reviewing.py
    action: update
    ownership: shared
    content_spec: >
      Tighten clean-section quality validation so generic filler does not pass.
      Require clean notes to name concrete reviewed targets such as changed
      files, callers/importers, documented rule files, or commands. Keep
      blocking and non-blocking finding format strict.
  - file: scafld/commands/review.py
    action: update
    ownership: shared
    content_spec: >
      If external output would create parser errors, print those errors, leave
      the existing review round in_progress, and exit nonzero without printing
      the next complete command.
  - file: scafld/review_signal.py
    action: update
    ownership: shared
    content_spec: >
      Count clean_review_with_evidence only when all clean sections satisfy the
      concrete-target clean-note rule.
  - file: .ai/prompts/review.md
    action: update
    ownership: shared
    content_spec: >
      Teach the prose-first output contract and concrete clean-section evidence
      rule.
  - file: .ai/scafld/prompts/review.md
    action: update
    ownership: shared
    content_spec: >
      Keep the managed review prompt copy aligned with .ai/prompts/review.md.
  - file: docs/review.md
    action: update
    ownership: shared
    content_spec: >
      Document that findings stay in prose and that scafld validates the final
      markdown artifact before accepting external review output.
  - file: tests/review_gate_smoke.sh
    action: update
    ownership: shared
    content_spec: >
      Add cases for valid prose external review, malformed prose rejection,
      invalid finding format rejection, and generic clean-section filler
