task:
  title: Harden external review into a trustworthy gate
  summary: >
    The external review runner is structurally useful, but its current contract
    is too easy to game. It accepts shape-valid JSON with weak evidence,
    records model-self-reported provenance, has no subprocess timeout, treats
    Codex and Claude isolation as equivalent, and exposes misleading review
    metadata in some command paths. This task turns the runner from a
    rigorous-looking wrapper into a trustable review gate by making scafld own
    observed facts, keeping findings in prose, validating the rendered review
    before completion is suggested, and clearly surfacing isolation and model
    attribution limits.
  size: large
  risk_level: high
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/review_runner.py
      lines: all
      reason: >
        Core boundary for runner config, provider resolution, prompt wrapping,
        subprocess execution, output normalization, timeout handling, hashing,
        provenance, and provider isolation metadata.
    - path: scafld/review_workflow.py
      lines: all
      reason: >
        Writes completed review rounds from runner output and must validate the
        canonical review artifact before replacing the in-progress round.
    - path: scafld/reviewing.py
      lines: all
      reason: >
        Parser/gate quality rules must reject filler clean sections and keep
        finding format validation strict after the runner contract changes.
    - path: scafld/commands/review.py
      lines: all
      reason: >
        User-facing review command must report real runner status, fail on
        invalid external output, honor flag overrides in JSON mode, and avoid
        suggesting completion after a malformed runner result.
    - path: scafld/review_runtime.py
      lines: all
      reason: >
        Review snapshots need runner override awareness and should expose
        control-plane runner metadata without claiming that JSON mode spawned a
        reviewer.
    - path: scafld/commands/surface.py
      lines: all
      reason: >
        CLI flags may need timeout/isolation related help and JSON-mode override
        semantics documented through the command surface.
    - path: scafld/handoff_renderer.py
      lines: all
      reason: >
        Generated challenger handoffs carry spec-derived content and may need
        explicit untrusted-input boundaries or structured section metadata.
    - path: .ai/prompts/review.md
      lines: all
      reason: >
        The challenger template must teach the evidence contract, clean-section
        rules, and untrusted spec/diff boundary in the same language the parser
        enforces.
    - path: .ai/scafld/prompts/review.md
      lines: all
      reason: >
        Managed runtime bundle copy must stay aligned with the canonical review
        prompt.
    - path: .ai/config.yaml
      lines: all
      reason: >
        Review runner defaults need timeout, fallback policy, and isolation
        configuration fields.
    - path: .ai/specs/active/external-review-runner-hard-cut.yaml
      lines: ownership metadata only
      reason: >
        Active-scope audit needs the predecessor runner spec to explicitly mark
        overlapping runner files as shared while this hardening spec supersedes
        and continues that work.
    - path: .ai/scafld/config.yaml
      lines: all
      reason: >
        Managed runtime bundle copy must stay aligned when review runner config
        defaults change.
    - path: scafld/adapter_runtime.py
      lines: all
      reason: >
        Optional provider adapters are the only place scafld can observe
        executor provider/model facts when it launches external agents.
    - path: scafld/session_store.py
      lines: all
      reason: >
        Session entries may need typed provider/model telemetry for executor
        and challenger attribution.
    - path: scafld/execution_runtime.py
      lines: all
      reason: >
        Native execution/session lifecycle may need to preserve observed
        executor metadata when wrapper-launched work flows through scafld.
    - path: scafld/commands/reporting.py
      lines: all
      reason: >
        Reports should surface review trust signals, isolation downgrade counts,
        and known/unknown model separation instead of implying proof where none
        exists.
    - path: scafld/review_signal.py
      lines: all
      reason: >
        Clean-review signal should distinguish evidence-backed clean sections
        from generic boilerplate.
    - path: docs/review.md
      lines: all
      reason: >
        Operator-facing review docs must describe the hardened runner contract,
        evidence requirements, isolation caveats, and failure behavior.
    - path: docs/configuration.md
      lines: all
      reason: >
        Review runner config docs must include timeout, auto fallback policy,
        provider model pins, and isolation metadata semantics.
    - path: docs/cli-reference.md
      lines: all
      reason: >
        CLI docs must match review flag behavior, JSON mode, and timeout/error
        outcomes.
    - path: docs/integrations.md
      lines: all
      reason: >
        Provider integration docs must be honest about Codex vs Claude isolation
        and wrapper attribution limits.
    - path: tests/review_gate_smoke.sh
      lines: all
      reason: >
        Main smoke harness should prove hardened external review behavior,
        timeout handling, malformed output rejection, and fallback warnings.
    - path: tests/review_prompt_contract_smoke.sh
      lines: all
      reason: >
        Prompt contract smoke should prove untrusted spec content is fenced and
        cannot be mistaken for runner instructions.
    - path: tests/review_signal_corpus_smoke.sh
      lines: all
      reason: >
        Review signal fixtures should prove generic clean-section boilerplate is
        not counted as evidence.
    - path: tests/codex_handoff_adapter_smoke.sh
      lines: all
      reason: >
        Optional Codex adapter smoke may need to record observed executor
        provider/model facts without changing the primary review runner.
    - path: tests/claude_handoff_adapter_smoke.sh
      lines: all
      reason: >
        Optional Claude adapter smoke may need to record observed executor
        provider/model facts and document weaker isolation.
    - path: tests/package_smoke.sh
      lines: all
      reason: >
        Package smoke may need fixture updates if managed prompt/config assets
        change.
    - path: tests/update_smoke.sh
      lines: all
      reason: >
        Runtime bundle update smoke may need assertions for changed managed
        config/prompt assets.
    invariants:
    - review_artifact_stays_scafld_owned
    - provenance_must_be_observed_not_model_claimed
    - findings_stay_grounded_prose
    - degraded_isolation_must_be_visible
    - packaged_cli_is_the_truth_surface
    related_docs:
    - docs/review.md
    - docs/configuration.md
    - docs/cli-reference.md
    - docs/integrations.md
  objectives:
  - >
    Remove model-controlled provenance fields from the external review output
    contract; scafld must set reviewer mode, session, isolation, provider,
    model, timing, exit, timeout, and hash facts from observed runner state.
  - >
    Replace the broad verdict/blocking/non_blocking JSON envelope with a
    prose-first review body that is parsed by the same review artifact gate used
    for manual challenger rounds.
  - >
    Add external reviewer subprocess timeouts with configurable defaults and
    clear failure/fallback messaging.
  - >
    Fence spec-derived and handoff-derived prompt content as untrusted input so
    injected instructions in task descriptions cannot override runner rules.
  - >
    Make Codex and Claude isolation differences explicit in args, provenance,
    warnings, docs, and reports; do not silently treat Claude fallback as
    equivalent to the Codex sandbox.
  - >
    Ensure scafld validates the rendered completed review round before replacing
    the latest round or printing the next complete command.
  - >
    Record executor/challenger provider and model telemetry only when observed,
    and report unknown values as unknown rather than proof of model separation.
  scope:
    in_scope:
    - external review runner output contract
    - review artifact writing and validation before command success
    - runner provenance and response hashing
    - timeout configuration and subprocess failure handling
    - Codex and Claude argument hardening
    - prompt-injection boundaries around generated handoffs
    - review signal quality checks for clean sections
    - JSON and human CLI review surfaces
    - docs and smoke coverage for the hardened contract
    - best-effort executor/challenger model attribution where scafld observes it
    out_of_scope:
    - building a general semantic judge for review substance
    - changing the review pass topology beyond what the existing passes need
    - removing local or manual degraded review modes
    - requiring Claude to provide Codex-equivalent sandboxing if the CLI cannot
      support it
    - blocking all reviews when executor model telemetry is unknown
  assumptions:
  - >
    Codex remains the strongest supported external review provider because its
    non-interactive CLI supports read-only sandboxing and ephemeral execution.
  - >
    Claude can be made fresher with session and MCP/settings controls, but it
    still lacks a visible Codex-equivalent sandbox in the installed CLI surface.
  - >
    The existing markdown review parser is the right canonical gate; runner
    output should feed that parser instead of becoming a second trusted format.
  - >
    Shape validation can catch generic filler and malformed findings, but it
    cannot prove that a model performed a real review. The product should surface
    evidence limits honestly.
  touchpoints:
  - area: review runner trust boundary
    description: >
      External provider output is untrusted. Scafld should parse it, render a
      canonical review round, validate that round, then persist only if the gate
      accepts the structure and evidence contract.
  - area: review provenance
    description: >
      Provenance fields must be observed runner facts. Model-supplied strings
      must not become reviewer_mode, reviewer_session, provider, model, or
      isolation facts.
  - area: provider isolation
    description: >
      Codex and Claude have different isolation properties. The CLI and reports
      should make that visible, especially when provider=auto falls back from
      Codex to Claude.
  - area: prompt construction
    description: >
      Runner instructions need to be outside the untrusted handoff/spec block,
      with explicit boundary markers and instructions to treat all task content
      as data.
  - area: telemetry and reporting
    description: >
      Scafld should report what it knows about executor/challenger model
      separation, and explicitly report unknown when it cannot observe it.
  risks:
  - description: >
      Replacing the JSON envelope with prose-first output may make provider
      parsing more complex and break the current smoke stubs.
    impact: high
    mitigation: >
      Implement the new contract behind the same review artifact parser and add
      targeted stubs for valid prose, malformed prose, and generic filler.
  - description: >
      Tightening clean-section validation may reject legitimate but concise clean
      reviews.
    impact: medium
    mitigation: >
      Accept a documented family of evidence-backed clean notes and include
      fixtures for both accepted concrete notes and rejected generic notes.
  - description: >
      Claude hardening flags may vary by installed Claude Code version.
    impact: medium
    mitigation: >
      Use only flags visible in `claude --help` for this environment, keep docs
      honest, and fail clearly if a configured strict Claude mode is unsupported.
  - description: >
      Capturing executor model telemetry may overpromise if work was performed
      outside scafld wrappers.
    impact: medium
    mitigation: >
      Record observed telemetry only from scafld-launched provider paths and
      report missing values as unknown.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: >
        External review provenance fields are set by scafld from observed
        subprocess facts, and malicious model-supplied reviewer_mode or session
        strings are ignored.
      status: pending
    - id: dod2
      description: >
        External review output is prose-first and must pass the canonical
        markdown review parser before `scafld review` reports success or prints
        `scafld complete`.
      status: pending
    - id: dod3
      description: >
        External review subprocesses obey a configurable timeout with a default
        of 600 seconds and fail cleanly with local/manual fallback guidance.
      status: pending
    - id: dod4
      description: >
        Prompt injection inside task/spec/handoff content is fenced as
        untrusted input in the external review prompt.
      status: pending
    - id: dod5
      description: >
        Codex and Claude provenance records include an isolation level and auto
        fallback from Codex to Claude is visible to users and reports.
      status: pending
    - id: dod6
      description: >
        Generic clean-section filler such as "No issues found - checked
        everything" no longer counts as evidence-backed clean review signal.
      status: pending
    - id: dod7
      description: >
        Docs and CLI help describe the hardened review contract, timeout config,
        JSON mode semantics, and provider isolation limits.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after runner and review changes.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Run the full review gate smoke suite.
      command: bash tests/review_gate_smoke.sh
      expected: exit code 0
      timeout_seconds: 900
    - id: v3
      type: integration
      description: Run the review prompt contract smoke suite.
      command: bash tests/review_prompt_contract_smoke.sh
      expected: exit code 0
    - id: v4
      type: integration
      description: Run review signal corpus fixtures.
      command: bash tests/review_signal_corpus_smoke.sh
      expected: exit code 0
    - id: v5
      type: integration
      description: Prove optional Codex and Claude adapter paths still work.
      command: bash tests/codex_handoff_adapter_smoke.sh && bash tests/claude_handoff_adapter_smoke.sh
      expected: exit code 0
      timeout_seconds: 900
    - id: v6
      type: integration
      description: Prove packaging and managed runtime bundle updates stay coherent.
      command: bash tests/package_smoke.sh && bash tests/update_smoke.sh
      expected: exit code 0
      timeout_seconds: 900
    - id: v7
      type: documentation
      description: Documentation mentions timeout, isolation, prose contract, and JSON mode behavior.
      command: >
        bash -lc 'for term in timeout isolation "prose" "--json"; do
        rg -q -- "$term" docs/review.md docs/configuration.md docs/cli-reference.md;
        done'
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not add a second review artifact path beside `.ai/reviews/{task-id}.md`.
    - Do not trust model-supplied provenance as observed fact.
    - Do not silently downgrade from external review to local/manual review.
    - Do not claim model separation when either side is unknown.
    - Do not let external reviewers edit code as part of the review command.
  notes: >
    This is a hardening task, not a feature expansion. The useful product is a
    small number of honest gates: observed provenance, bounded subprocesses,
    review prose parsed by the existing gate, visible isolation downgrade, and
    enough smoke coverage to stop regressions.
