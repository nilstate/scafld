- id: phase3
  name: Harden provider isolation and prompt boundaries
  objective: >
    Make runner prompts resistant to spec-level instruction injection and make
    provider isolation differences explicit instead of hidden behind provider=auto.
  dependencies:
  - phase2
  changes:
  - file: scafld/review_runner.py
    action: update
    ownership: shared
    content_spec: >
      Wrap generated handoff content in explicit untrusted-input boundary
      markers. Keep runner instructions outside the untrusted block. Remove
      Codex --ignore-rules unless convention_check is removed; prefer keeping
