phases:
- id: phase1
  name: Make runner facts observed and bounded
  objective: >
    Remove model-self-reported provenance from the external output contract and
    add timeout/hash/config support at the runner boundary.
  changes:
  - file: scafld/review_runner.py
    action: update
    ownership: shared
    content_spec: >
      Remove reviewer_mode and reviewer_session from the accepted model payload.
      Set reviewer_mode to fresh_agent for external runs inside scafld. Add
      ReviewRunnerConfig fields for timeout_seconds and auto fallback policy.
      Pass timeout to subprocess.run for Codex and Claude. Catch TimeoutExpired
      and raise ScafldError with degraded runner guidance. Record
      model_requested, model_observed, model_source, provider, provider_bin,
      provider_env, started_at, completed_at, exit_code, timed_out,
      isolation_level, raw_response_sha256, and canonical_response_sha256.
  - file: .ai/config.yaml
    action: update
    ownership: shared
    content_spec: >
      Add review.external.timeout_seconds defaulting to 600 and an explicit
      auto fallback policy field that controls whether Claude fallback is
      allowed, warned, or disabled.
  - file: .ai/specs/active/external-review-runner-hard-cut.yaml
    action: update
    ownership: shared
    content_spec: >
      Mark overlapping runner/review/doc/test declarations as shared so the
      active predecessor spec and this hardening continuation do not conflict
      in scope audit.
  - file: .ai/scafld/config.yaml
    action: update
    ownership: shared
    content_spec: >
      Keep the managed runtime bundle config copy aligned with .ai/config.yaml.
  - file: docs/configuration.md
    action: update
    ownership: shared
    content_spec: >
      Document timeout_seconds, model_requested vs model_observed, and fallback
      policy semantics.
  - file: tests/review_gate_smoke.sh
    action: update
    ownership: shared
    content_spec: >
      Add cases for malicious self-reported reviewer_mode/session being ignored,
      timeout_seconds killing a hanging provider, and provenance recording both
      raw and canonical response hashes.
  acceptance_criteria:
  - id: ac1_1
    type: integration
    description: Malicious model provenance does not become review metadata.
    command: bash tests/review_gate_smoke.sh external-runner-provenance
    expected: exit code 0
    result: "pass"
    executed_at: "2026-04-25T15:05:45Z"
  - id: ac1_2
    type: integration
    description: External runner timeout fails cleanly with fallback guidance.
    command: bash tests/review_gate_smoke.sh external-runner-timeout
    expected: exit code 0
    result: "pass"
    executed_at: "2026-04-25T15:05:50Z"
  - id: ac1_3
