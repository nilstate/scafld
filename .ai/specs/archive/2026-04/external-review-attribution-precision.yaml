task:
  title: External review attribution precision
  summary: 'The external review runner now records observed model ids, but the attribution
    surface still conflates structured provider facts with unstructured regex hints.
    Claude model ids come from a real JSON envelope; Codex model ids are inferred
    from stdout/stderr text and have a false-positive risk. Tighten that distinction,
    preserve useful diagnostics, and tune the remaining review-format surfaces without
    weakening the strict review gate.

    '
  size: small
  risk_level: medium
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/review_runner.py
      lines: task-selected
      reason: Provider model extraction, Claude session echo checks, prompt diagnostics,
        and review prompt rules live here.
    - path: scafld/session_store.py
      lines: task-selected
      reason: Provider telemetry confidence and model-separation aggregation must
        distinguish observed from inferred attribution.
    - path: scafld/commands/review.py
      lines: task-selected
      reason: Review command output should label inferred model ids honestly.
    - path: scafld/commands/reporting.py
      lines: task-selected
      reason: Report output and JSON should show inferred model counts separately
        from observed model counts.
    - path: scafld/reviewing.py
      lines: task-selected
      reason: Finding citation validation should accept stable YAML/Markdown anchors
        in addition to numeric code lines.
    - path: scafld/review_workflow.py
      lines: task-selected
      reason: Manual challenger handoff instructions should match the accepted finding
        citation format.
    - path: scafld/review_signal.py
      lines: task-selected
      reason: The legacy clean-review alias should be explicitly deprecated rather
        than presented as an evidence claim.
    - path: scripts/real_standard.py
      lines: task-selected
      reason: Cohort reporting should continue using format-compliant wording and
        avoid the deprecated clean-review alias where possible.
    - path: tests/review_gate_smoke.sh
      lines: task-selected
      reason: External runner smoke coverage should prove inferred-vs-observed model
        source semantics and prompt diagnostic truncation.
    - path: tests/report_metrics_smoke.sh
      lines: task-selected
      reason: Provider telemetry aggregation should prove inferred model counts and
        trusted model separation.
    - path: tests/review_signal_corpus_smoke.sh
      lines: task-selected
      reason: Review parser corpus should protect YAML/Markdown citation support
        and clean-review signal wording.
    - path: docs/review.md
      lines: task-selected
      reason: Operator docs should explain observed vs inferred attribution and deprecated
        clean-review alias semantics.
    invariants:
    - provider_telemetry_must_not_overclaim
    - review_gate_verdict_semantics_do_not_change
    - diagnostics_must_remain_debuggable
    - packaged_cli_is_the_truth_surface
  objectives:
  - Treat Claude JSON envelope model ids as structurally observed, but treat Codex
    stdout/stderr model hints as inferred.
  - Keep inferred model ids out of trusted same-model/separated model-separation
    decisions.
  - 'Restrict unstructured model hints enough to avoid obvious `model: User` and
    `model_id: legacy` false positives.'
  - Check Claude's reported session id against scafld's requested UUID and record
    a warning when they diverge.
  - Make diagnostic prompt previews keep both trusted header and untrusted task tail.
  - Accept stable YAML/Markdown anchor citations for document/config findings while
    preserving strict numeric line citations for code.
  - Mark `clean_reviews_with_evidence` as a deprecated compatibility alias; keep
    human-facing and preferred JSON surfaces on format-compliant wording.
  touchpoints:
  - area: external review attribution
    description: Provider provenance and session telemetry must separate structured
      observations from unstructured hints.
  - area: review parser strictness
    description: The review gate should allow non-code anchors where line numbers
      are not the stable citation form, without accepting loose prose bullets.
  - area: diagnostics and reports
    description: Debug artifacts and aggregate reports should expose attribution
      precision and avoid overstating clean-review evidence.
  acceptance:
    definition_of_done:
    - id: dod1
      description: 'Codex unstructured model hints record `model_source: inferred`
        and confidence `inferred`, while Claude JSON envelope model ids remain observed.'
      status: pending
    - id: dod2
      description: Model-separation telemetry only treats observed model ids as trusted;
        inferred ids are counted separately.
      status: pending
    - id: dod3
      description: Claude session id mismatches emit telemetry warnings and prompt
        diagnostics keep both the header and the handoff tail.
      status: pending
    - id: dod4
      description: 'Review findings can cite YAML/Markdown anchors such as `config.yaml#review.external`
        while unanchored prose findings remain invalid.'
      status: pending
    - id: dod5
      description: 'Clean-review report/docs use format-compliant wording, with `clean_reviews_with_evidence`
        documented and emitted only as a deprecated compatibility alias.'
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile Python sources after runner/session/parser changes.
      command: python3 -m compileall scafld cli scripts
      expected: exit code 0
    - id: v2
      type: integration
      description: External review runner smoke proves inferred attribution and diagnostics.
      command: bash tests/review_gate_smoke.sh external-runner-attribution-precision
      expected: exit code 0
    - id: v3
      type: integration
      description: Report metrics smoke proves inferred counts and trusted model separation.
      command: bash tests/report_metrics_smoke.sh
      expected: exit code 0
    - id: v4
      type: integration
      description: Review signal corpus proves YAML/Markdown finding citations and clean-review wording.
      command: bash tests/review_signal_corpus_smoke.sh
      expected: exit code 0
