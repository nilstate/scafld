    content_spec: Return model source/confidence with provider extraction, mark Codex
      regex hints as inferred, restrict unstructured model hints to plausible model
      prefixes, check Claude reported session ids, and preserve prompt head plus tail
      in diagnostics.
  - file: scafld/session_store.py
    action: update
    content_spec: Add inferred provider confidence, count inferred models separately,
      and make model-separation states use observed-confidence models only.
  - file: scafld/commands/review.py
    action: update
    content_spec: Print inferred model labels distinctly from observed model labels.
  - file: scafld/commands/reporting.py
    action: update
    content_spec: Add inferred model counts to human and JSON provider telemetry.
  - file: tests/review_gate_smoke.sh
    action: update
    content_spec: Add smoke coverage for Codex inferred model hints, false-positive
      rejection, Claude session mismatch warnings, and prompt preview head/tail truncation.
  - file: tests/report_metrics_smoke.sh
