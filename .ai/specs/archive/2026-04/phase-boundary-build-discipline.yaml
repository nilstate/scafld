task:
  title: Make build advance one phase at a time
  summary: 'Fix the execution model so scafld respects phase boundaries instead of
    silently validating future phases when their checks also happen to pass. Today
    `build` calls `exec_snapshot(..., phase=None)` and `exec_snapshot()` runs every
    runnable acceptance criterion in the spec, then marks later phases complete if
    their criteria pass. That breaks the handoff model: an operator can consume the
    phase1 handoff, rerun `build`, and discover phase2 and phase3 already completed
    without ever seeing their handoffs. The clean model is one phase per default `build`
    or `exec`: run the current open phase, record its results, and if it passes emit
    the next phase handoff instead of executing the next phase automatically.

    '
  size: medium
  risk_level: high
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/execution_runtime.py
      lines: task-selected
      reason: Default execution scope should resolve to the current open phase rather
        than the whole spec.
    - path: scafld/workflow_runtime.py
      lines: task-selected
      reason: Build should preserve the phase boundary and return the next handoff
        instead of over-executing.
    - path: scafld/commands/execution.py
      lines: task-selected
      reason: Human output should say which phase actually ran when default exec scopes
        itself.
    - path: tests/phase_boundary_smoke.sh
      lines: all
      reason: A dedicated smoke should prove build and default exec stop at the next
        phase boundary.
    - path: docs/lifecycle.md
      lines: task-selected
      reason: The lifecycle docs should describe one-phase-at-a-time execution and
        handoff advancement.
    - path: docs/cli-reference.md
      lines: task-selected
      reason: CLI docs should explain default phase scoping for build and exec.
    invariants:
    - handoff_is_the_phase_boundary
    - default_build_does_not_skip_unconsumed_phase_handoffs
    - explicit_phase_execution_remains_available
    - machine_output_names_the_actual_executed_phase
    related_docs:
    - AGENTS.md
    - CONVENTIONS.md
    - docs/lifecycle.md
    - docs/review.md
    - docs/cli-reference.md
  objectives:
  - Make default `build` execute only the current open phase.
  - Make default `exec` execute only the current open phase unless `--phase` is explicitly
    supplied.
  - After a phase passes, emit the next phase handoff instead of auto-running that
    next phase.
  - Expose the executed phase explicitly in human and JSON output.
  - Protect the behavior with a real CLI smoke that covers a multi-phase spec.
  scope:
    in_scope:
    - Default phase selection in execution/runtime code.
    - Build/runtime guidance after a phase passes.
    - Human and machine execution payloads that identify the executed phase.
    - Docs and smoke coverage for one-phase-at-a-time execution.
    out_of_scope:
    - Changing explicit `--phase` behavior.
    - Review-gate behavior.
    - A redesign of recovery semantics.
  assumptions:
  - Phase boundaries are load-bearing and should not be crossed without another explicit
    `build`/`exec` invocation.
  - If an operator wants to run a later phase intentionally, `--phase <id>` remains
    the escape hatch.
  - A default exec/build call should be predictable enough that automation can treat
    the returned handoff as authoritative.
  touchpoints:
  - area: execution semantics
    description: Current-phase-only execution becomes the default contract.
  - area: handoff progression
    description: Passing one phase should surface the next handoff rather than consume
      it implicitly.
  - area: automation output
    description: JSON and terminal output should name the phase that actually ran.
  risks:
  - description: Changing exec defaults could surprise advanced operators who were
      relying on whole-spec execution.
    impact: medium
    mitigation: Keep explicit `--phase` untouched and document that default execution
      now follows the current phase boundary.
  - description: Phase selection could regress recovery behavior if failed criteria
      no longer map cleanly to the active phase.
    impact: high
    mitigation: Keep recovery keyed to the executed phase and cover both pass-to-next-phase
      and failure paths in smoke.
  - description: Guidance/status could drift from actual execution semantics.
    impact: medium
    mitigation: Drive build through the same current-phase resolution the runtime
      uses and assert the returned next handoff in smoke.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: Default build and exec run only the current open phase.
      status: pending
    - id: dod2
      description: Passing one phase emits the next phase handoff without auto-completing
        the later phase.
      status: pending
    - id: dod3
      description: Execution output states which phase actually ran.
      status: pending
    - id: dod4
      description: A dedicated multi-phase smoke proves the new boundary behavior.
      status: pending
    - id: dod5
      description: Lifecycle and CLI docs describe the one-phase-at-a-time model.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the execution model changes.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Dedicated phase-boundary smoke passes.
      command: bash tests/phase_boundary_smoke.sh
      expected: exit code 0
    - id: v3
      type: integration
      description: Lifecycle smoke still passes with the new build semantics.
      command: bash tests/lifecycle_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not add a compatibility flag that keeps the old auto-run-all-phases behavior
      alive.
    - Do not broaden build into a hidden planner; it should keep following the current
      spec contract.
    - Do not rely on phase status hand-edits to paper over the runtime behavior.
  notes: 'This is the next real product cut. If scafld is going to be trustworthy
    for long-running work, the operator has to believe that a phase handoff really
    is a boundary and not a polite suggestion.

    '
