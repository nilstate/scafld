task:
  title: "Improve report triage output"
  summary: >
    Extend `scafld report` from passive aggregate counts to actionable workflow
    triage. Surface stale drafts, approved specs that never started, active specs
    with no exec results, and review drift once review artifacts are bound to git
    state.
  size: "small"
  risk_level: "low"
  context:
    packages:
      - "cli"
      - "tests"
      - "docs"
    invariants:
      - "domain_boundaries"
      - "no_legacy_code"
      - "public_api_stable"
  objectives:
    - "Keep the aggregate report, but add actionable workflow triage."
    - "Highlight stale and blocked specs without requiring manual digging."
    - "Reflect review drift once commit binding exists."
  touchpoints:
    - area: "cli/scafld"
      description: "Extend report output with workflow triage sections."
    - area: "tests/lifecycle_smoke.sh"
      description: "Optionally use lifecycle/report assertions for actionable output."
    - area: "docs/cli-reference.md"
      description: "Document the new report sections."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "`scafld report` highlights stale drafts and inactive approved/active specs."
        status: "pending"
      - id: "dod2"
        description: "Report can surface review drift once review binding exists."
        status: "pending"
      - id: "dod3"
        description: "Docs describe the new triage sections."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Lifecycle smoke still passes after report changes."
        command: "bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"

