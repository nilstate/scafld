task:
  title: "Handoff Renderer And Templates"
  summary: >
    Build one handoff renderer with a kind enum and make the existing prompt
    files renderer templates instead of standalone artifacts. Add the single new
    read-only command, `scafld handoff`, so external harnesses can ask for the
    current phase, recovery, or review handoff without driving lifecycle moves.
    Every handoff should render as a sibling `*.md + *.json` pair from one
    renderer.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "scafld/"
      - "scafld/commands/"
      - ".ai/prompts/"
      - "docs/"
      - "tests/"
    files_impacted:
      - path: "scafld/handoff_renderer.py"
        lines: "all"
        reason: "New module for rendering all handoff kinds from one code path."
      - path: "scafld/commands/handoff.py"
        lines: "all"
        reason: "New read-only command for emitting handoffs."
      - path: "scafld/commands/surface.py"
        lines: "1-260"
        reason: "Register the new handoff command."
      - path: ".ai/prompts/plan.md"
        lines: "all"
        reason: "Planning template source of truth."
      - path: ".ai/prompts/exec.md"
        lines: "all"
        reason: "Phase template source of truth."
      - path: ".ai/prompts/review.md"
        lines: "all"
        reason: "Review template source of truth."
      - path: ".ai/prompts/recovery.md"
        lines: "all"
        reason: "Recovery template source of truth."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "Document `scafld handoff`."
      - path: "docs/execution.md"
        lines: "all"
        reason: "Document phase and recovery handoffs."
      - path: "docs/review.md"
        lines: "all"
        reason: "Document review handoffs."
      - path: "tests/run_contracts_smoke.sh"
        lines: "all"
        reason: "Smoke test for runtime contracts and phase handoff generation."
      - path: "tests/review_handoff_smoke.sh"
        lines: "all"
        reason: "Smoke test for review handoff generation."
      - path: "tests/lifecycle_smoke.sh"
        lines: "all"
        reason: "Smoke test for default review-handoff selection after completion."
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "config_from_env"
    related_docs:
      - "plans/llm-performance-cutover.md"
      - "docs/execution.md"
      - "docs/review.md"
      - "docs/run-artifacts.md"
  objectives:
    - "Use one renderer for phase, recovery, and review handoffs."
    - "Make `.ai/prompts/*.md` the source templates for handoff rendering."
    - "Render every handoff as a sibling `.md/.json` pair with stable metadata."
    - "Expose a single read-only `scafld handoff` command."
    - "Define default selector behavior for active phase, fallback phase1, and review-after-complete."
    - "Keep the handoff immutable and never use it as run state."
  scope:
    in_scope:
      - "Renderer templates and rendering."
      - "One new read-only command."
      - "Docs and smoke tests."
    out_of_scope:
      - "Execution-session writes."
      - "Recovery attempt accounting."
      - "Report metrics."
  dependencies:
    - "llm-run-schema-and-config should land first so handoff/session contracts are stable."
  assumptions:
    - "Session-dependent recovery details can be partially scaffolded here and completed in the session/recovery spec."
    - "Planning templates can be subordinated now even if planning handoffs are not publicly surfaced in v1."
  touchpoints:
    - area: "Renderer"
      description: "One renderer code path accepts kind and selector and emits a handoff."
    - area: "Templates"
      description: "Prompt files become the one source of truth for rendered handoff prose."
    - area: "CLI"
      description: "External harnesses can retrieve a handoff without lifecycle mutation."
    - area: "Docs"
      description: "Execution and review docs explain how handoffs are obtained."
  risks:
    - description: "Templates and rendered handoffs can drift."
      impact: "high"
      mitigation: "Keep templates as the sole prose source and render all handoffs from them."
    - description: "The command surface can regrow."
      impact: "medium"
      mitigation: "Add only `scafld handoff` in v1."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "One renderer can emit sibling `.md/.json` handoffs of kind phase, review, and recovery."
        status: "pending"
      - id: "dod2"
        description: "Prompt files are consumed as templates, not parallel artifacts."
        status: "pending"
      - id: "dod3"
        description: "scafld handoff returns phase and review handoffs in human and JSON forms with the correct defaults."
        status: "pending"
      - id: "dod4"
        description: "Recovery template exists and is wired into the renderer contract."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate llm-context-pack-prompt-compiler"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Run runtime contract smoke test."
        command: "bash tests/run_contracts_smoke.sh"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Run review handoff and lifecycle smoke tests."
        command: "bash tests/review_handoff_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not add multiple new read-only commands."
      - "Do not store handoff state back into session."
      - "Do not add provider-specific model calls."
  notes: >
    The renderer should support a `kind` enum now. Recovery can remain partially
    populated until the session spec adds attempts and diagnostics. The JSON
    sibling should expose the same structured payload the markdown was rendered
    from so external harnesses can inspect the handoff without scraping prose.

