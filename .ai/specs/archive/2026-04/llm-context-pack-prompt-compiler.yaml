phases:
  - id: "phase1"
    name: "Template hierarchy"
    objective: "Make prompt files the single prose source for handoff rendering."
    changes:
      - file: ".ai/prompts/plan.md"
        action: "update"
        content_spec: |
          Convert the file to explicit template language for planning handoffs.
      - file: ".ai/prompts/exec.md"
        action: "update"
        content_spec: |
          Convert the file to explicit template language for phase handoffs.
      - file: ".ai/prompts/review.md"
        action: "update"
        content_spec: |
          Convert the file to explicit template language for review handoffs.
      - file: ".ai/prompts/recovery.md"
        action: "create"
        content_spec: |
          Add the recovery handoff template used when a criterion fails.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Template docs mention handoff rendering."
        command: >
          bash -lc 'for f in .ai/prompts/plan.md .ai/prompts/exec.md .ai/prompts/review.md .ai/prompts/recovery.md; do rg -qi "template|handoff" "$f" || exit 1; done'
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:07Z"
    status: "pending"

  - id: "phase2"
    name: "Unified handoff renderer"
    objective: "Render all handoff kinds from one code path."
    dependencies: ["phase1"]
    changes:
      - file: "scafld/handoff_renderer.py"
        action: "create"
        content_spec: |
          Implement one renderer that accepts kind, selector, spec, session
          summary, template path, and model profile. Emit a stable sibling
          `.md/.json` handoff pair with schema_version and immutable output.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Handoff smoke test covers phase and review handoffs."
        command: "bash tests/run_contracts_smoke.sh && bash tests/review_handoff_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:13Z"
        result_output: "PASS: run contracts smoke [1/3] execute a passing phase [2/3] review emits a fresh review handoff [3/3] review metadata records the handoff reference PASS: review handoff smoke"
    status: "pending"

  - id: "phase3"
    name: "Read-only handoff command"
    objective: "Expose handoff retrieval without lifecycle mutation."
    dependencies: ["phase2"]
    changes:
      - file: "scafld/commands/handoff.py"
        action: "create"
        content_spec: |
          Add `scafld handoff <task-id> [--phase phase1 | --recovery ac1_1 |
          --review] [--json]`. With no flags, default to the active phase,
          `phase1` before execution, or the review handoff after completion.
          Human mode prints path and summary; JSON mode returns envelope
          metadata, the sibling JSON path, and the structured payload.
      - file: "scafld/commands/surface.py"
        action: "update"
        content_spec: |
          Register the handoff command with mutually exclusive selectors.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document the single new command and its selectors.
      - file: "docs/execution.md"
        action: "update"
        content_spec: |
          Explain how phase and recovery handoffs are obtained.
      - file: "docs/review.md"
        action: "update"
        content_spec: |
          Explain how a review handoff is obtained.
      - file: "tests/run_contracts_smoke.sh"
        action: "update"
        content_spec: |
          Create a temporary workspace/spec, render a phase handoff, and assert
          the sibling `.md/.json` artifacts plus envelope metadata.
      - file: "tests/review_handoff_smoke.sh"
        action: "update"
        content_spec: |
          Open a review round and assert the review handoff plus sibling JSON
          artifact are generated.
      - file: "tests/lifecycle_smoke.sh"
        action: "update"
        content_spec: |
          Complete a task and assert `scafld handoff <task-id>` defaults to the
          archived review handoff.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Handoff smoke passes."
        command: "bash tests/run_contracts_smoke.sh && bash tests/review_handoff_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:50Z"
        result_output: "PASS: run contracts smoke [1/3] execute a passing phase [2/3] review emits a fresh review handoff [3/3] review metadata records the handoff reference PASS: review handoff smoke [1/6] init a clean work"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- .ai/prompts/plan.md .ai/prompts/exec.md .ai/prompts/review.md && rm -f .ai/prompts/recovery.md"
    phase2: "rm -f scafld/handoff_renderer.py"
    phase3: "git checkout HEAD -- scafld/commands/surface.py docs/cli-reference.md docs/execution.md docs/review.md tests/run_contracts_smoke.sh tests/review_handoff_smoke.sh tests/lifecycle_smoke.sh && rm -f scafld/commands/handoff.py"

