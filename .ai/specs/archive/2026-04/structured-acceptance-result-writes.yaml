task:
  title: Make acceptance result writes structurally safe
  summary: 'Replace the remaining regex text surgery in `scafld/acceptance.py` with
    a structured YAML update. Right now `record_exec_result()` rewrites criterion
    result fields by scanning raw lines, which breaks once YAML folds a long `result_output`
    string across continuation lines. The next explicit `scafld exec` pass removes
    only the first `result_output:` line, leaves the folded continuation lines behind,
    and can corrupt the spec. The clean model is: acceptance result writes walk the
    parsed document structure, update the matching criterion in place, and emit valid
    YAML no matter how many times exec reruns the same phase.

    '
  size: medium
  risk_level: high
  context:
    packages:
    - scafld
    - tests
    files_impacted:
    - path: scafld/acceptance.py
      lines: task-selected
      reason: Criterion result writes still mutate the spec with regex line surgery.
    - path: scafld/execution_runtime.py
      lines: task-selected
      reason: Exec currently depends on the legacy text-based result writer.
    - path: tests/acceptance_result_write_smoke.sh
      lines: all
      reason: A disposable-repo smoke should prove repeated explicit exec passes keep
        the spec valid YAML.
    invariants:
    - acceptance_result_updates_must_preserve_valid_yaml
    - repeated_exec_on_the_same_phase_must_not_corrupt_the_spec
    - packaged_cli_is_the_truth_surface
    related_docs:
    - docs/lifecycle.md
    - docs/cli-reference.md
  objectives:
  - Make acceptance result writes structurally safe for long folded output strings.
  - Keep repeated explicit `scafld exec --phase ...` runs from corrupting the spec.
  - Prove the fix with a packaged-CLI smoke that validates the resulting spec after
    multiple exec passes.
  scope:
    in_scope:
    - Structured criterion-result updates in acceptance/runtime code.
    - A disposable-repo smoke that reproduces and then prevents spec corruption on
      repeated exec.
    out_of_scope:
    - Reworking session storage.
    - Changing acceptance criterion semantics.
    - Broad YAML formatting preservation work beyond keeping the document valid and
      structurally correct.
  assumptions:
  - The bug is caused by the raw-text writer failing to remove folded continuation
    lines from previous result_output values.
  - Safe YAML emission is acceptable for these runtime result updates because the
    same spec already undergoes structured writes elsewhere.
  touchpoints:
  - area: acceptance result recording
    description: Criterion status/output writes should be document-aware, not regex
      line edits.
  - area: explicit reruns
    description: Re-executing an already-completed phase should stay safe and deterministic.
  - area: spec integrity
    description: Runtime metadata updates must never leave the active spec unparsable.
  risks:
  - description: A structured rewrite could accidentally change the stored criterion
      shape for entries that already use nested `result` mappings.
    impact: medium
    mitigation: Preserve the existing flat-vs-nested shape per criterion and cover
      the result writer with a real CLI smoke.
  - description: A result-writer fix that rewrites the full document could still
      damage user-authored YAML structure even if the spec stays parseable.
    impact: medium
    mitigation: Keep the write bounded to the matched criterion fields, and validate
      authoring fidelity in the packaged smoke.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: Repeated explicit exec runs no longer corrupt the spec when result_output
        is long enough to fold.
      status: pending
    - id: dod2
      description: Acceptance result writes preserve the criterion's existing flat
        or nested result shape.
      status: pending
    - id: dod3
      description: A packaged-CLI smoke proves the spec still validates after repeated
        exec passes.
      status: pending
    - id: dod4
      description: Repeated exec updates preserve unrelated author-authored YAML structure
        such as comments and literal block scalars.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the acceptance result write change.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Acceptance-result smoke proves repeated explicit exec passes keep
        the spec valid while preserving unrelated author-authored YAML structure.
      command: bash tests/acceptance_result_write_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not leave the regex writer in place behind an opt-in flag.
    - Do not rely on line-wrapping accidents staying below the fold threshold.
    - Do not broaden the task into a full spec formatting preservation project.
  notes: 'This is another trust bug in the core loop: the tool should never corrupt
    the spec while recording its own execution results.

    '
