task:
  title: Make exec a first-class CLI surface
  summary: 'Hard-cut the CLI surface so the default help, the docs, and the actual
    command registry tell one story. Today `scafld exec` is real and documented, but
    it is hidden from the normal help surface in `scafld/commands/surface.py`. At
    the same time, a hidden `execute` alias still exists only for compatibility, and
    the smoke suite is split between protecting the hidden surface and the documented
    one. That is not a product I would want to use. The clean model is: `exec` is
    a first-class public command, `execute` is removed, and the help/package/runx
    surface tests all assert the same contract.

    '
  size: small
  risk_level: medium
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/commands/surface.py
      lines: task-selected
      reason: The command registry currently hides `exec` and still exposes the `execute`
        compatibility alias.
    - path: tests/package_smoke.sh
      lines: task-selected
      reason: Installed-wheel help expectations currently assert that default help
        hides exec.
    - path: tests/agent_surface_smoke.sh
      lines: task-selected
      reason: Agent-surface help expectations still assert that exec is hidden.
    - path: tests/runx_surface_smoke.sh
      lines: task-selected
      reason: Runx surface smoke still protects the deprecated execute alias.
    - path: docs/cli-reference.md
      lines: task-selected
      reason: Docs already present exec as public; verify they stay aligned after
        the hard cut.
    invariants:
    - default_help_must_match_the_real_public_surface
    - one_canonical_command_per_user_facing_action
    - no_compatibility_alias_without_a_live_product_reason
    related_docs:
    - README.md
    - docs/cli-reference.md
    - docs/lifecycle.md
  objectives:
  - Make `scafld exec` visible on the default help surface.
  - Remove the `execute` compatibility alias from the CLI registry.
  - Update help/package/runx smokes to assert the same public contract.
  - Keep the docs aligned to the hard-cut surface.
  scope:
    in_scope:
    - Command-surface visibility for `exec`.
    - Removal of the `execute` alias.
    - Smoke and docs updates needed to reflect the public surface accurately.
    out_of_scope:
    - Reworking exec semantics.
    - Renaming `build`.
    - Adding new lifecycle commands.
  assumptions:
  - The docs are already describing the desired surface more accurately than the current
    help output.
  - No supported wrapper should still depend on the `execute` spelling once the hard
    cut lands.
  touchpoints:
  - area: public CLI surface
    description: Default help should advertise the commands a user is actually expected
      to run.
  - area: compatibility cleanup
    description: The old alias should disappear instead of lingering behind hidden
      switches and stale tests.
  - area: surface verification
    description: Package, agent, and runx smokes should all assert the same public
      command contract.
  risks:
  - description: Removing the alias could break an internal smoke or wrapper that
      still shells out to `scafld execute`.
    impact: medium
    mitigation: Search the repo for live call sites, update the smoke suite in the
      same cut, and fail hard if any stray references remain.
  - description: Making exec public without updating tests would leave the product
      surface split-brained.
    impact: medium
    mitigation: Update every surface smoke that currently asserts exec is hidden or
      execute still exists.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: Default help exposes exec as a public command.
      status: pending
    - id: dod2
      description: The execute alias is removed from the live CLI registry.
      status: pending
    - id: dod3
      description: Package, agent, and runx surface smokes all assert the new hard-cut
        surface.
      status: pending
    - id: dod4
      description: Docs remain aligned to the public exec surface after the cut.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the CLI surface change.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Package smoke reflects the public exec surface.
      command: bash tests/package_smoke.sh
      expected: exit code 0
    - id: v3
      type: integration
      description: Agent surface smoke reflects the public exec surface.
      command: bash tests/agent_surface_smoke.sh
      expected: exit code 0
    - id: v4
      type: integration
      description: Runx surface smoke uses the canonical exec command only.
      command: bash tests/runx_surface_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not add another alias.
    - "Do not keep execute hidden for \u201Cjust in case\u201D compatibility."
    - Do not claim a public help surface that the CLI still hides.
  notes: 'This is the kind of product inconsistency that compounds operator distrust.
    A command should either be first-class or gone.

    '
