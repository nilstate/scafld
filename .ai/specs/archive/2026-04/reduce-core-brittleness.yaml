task:
  title: "Reduce core brittleness"
  summary: >
    Finish the next cleanup pass on scafld's command core so the tool feels
    tighter under both human use and automation. The biggest remaining
    brittleness is not feature coverage anymore; it is the residue left in
    `cli/scafld` after the earlier extraction round. `cmd_new` still builds its
    repo-aware template inline, projection/origin helpers still live in the CLI,
    review parsing is still implemented there instead of in the review module,
    and the shell smoke tests duplicate fragile JSON assertion glue. This round
    extracts those residual helper clusters into modules, gives the smoke tests
    one shared assertion harness, and replaces ad hoc stringly error-code usage
    with a first-class catalog so future integrations do not keep copying
    literals around.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "scafld"
      - "tests"
      - "docs"
    invariants:
      - "human_cli_behavior_stays_intact"
      - "machine_callers_never_need_terminal_scraping"
      - "shared_helpers_live_outside_the_entrypoint"
      - "json_mode_uses_stable_envelopes"
      - "review_and_projection_surfaces_remain_deterministic"
  objectives:
    - "Move residual template/origin/projection/review helper logic out of `cli/scafld` into reusable modules."
    - "Give shell smoke tests one shared JSON assertion path instead of repeating inline Python eval blocks."
    - "Define a single error-code catalog that command code and JSON output can reuse without string drift."
    - "Keep the current JSON and human contracts stable while making the internals easier to extend."
  touchpoints:
    - area: "cli/scafld"
      description: "Trim the entrypoint back to command flow and thin composition over extracted helpers."
    - area: "scafld/spec_templates.py"
      description: "Own repo-aware draft template generation for `scafld new`."
    - area: "scafld/projections.py"
      description: "Own origin metadata shaping plus projection/model helper logic."
    - area: "scafld/reviewing.py"
      description: "Own review artifact parsing instead of leaving it embedded in the CLI."
    - area: "scafld/error_codes.py"
      description: "Provide one shared source of truth for structured command error codes."
    - area: "tests/smoke_lib.sh"
      description: "Provide shared shell smoke helpers for capture, assertions, and temp-dir cleanup."
    - area: "tests/json_assert.py"
      description: "Provide one reusable JSON assertion helper for shell smoke suites."
    - area: "package.json"
      description: "Ensure npm packaging continues to ship the Python runtime modules the CLI imports."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Residual template/origin/projection/review helpers are extracted out of `cli/scafld`."
        status: "done"
      - id: "dod2"
        description: "Smoke suites reuse shared helper code instead of repeating inline JSON assertion blocks."
        status: "done"
      - id: "dod3"
        description: "Structured error codes are centralized and callers no longer rely on scattered string literals."
        status: "done"
      - id: "dod4"
        description: "Lifecycle, projection, git-origin, harden, and review-gate behavior remains stable."
        status: "done"
    validation:
      - id: "v1"
        type: "test"
        description: "Focused unit coverage for runtime/spec/git modules still passes."
        command: "python3 -m unittest tests.test_command_runtime tests.test_spec_store tests.test_git_state"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v2"
        type: "integration"
        description: "JSON contract smoke passes through the shared assertion harness."
        command: "./tests/json_contract_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v3"
        type: "integration"
        description: "Git-bound origin smoke still passes after helper extraction."
        command: "./tests/git_origin_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v4"
        type: "integration"
        description: "Projection surface smoke still passes after projection helper extraction."
        command: "./tests/projection_surface_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v5"
        type: "integration"
        description: "Harden smoke still passes with shared shell helpers."
        command: "./tests/harden_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v6"
        type: "integration"
        description: "Review gate smoke still passes with the shared JSON assertion harness."
        command: "./tests/review_gate_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v7"
        type: "integration"
        description: "Package smoke still proves the published wheel and npm tarball contain the required runtime surface."
        command: "./tests/package_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240

