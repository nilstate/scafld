  - id: "phase1"
    name: "Extract Residual Core Helpers"
    objective: "Move remaining template, projection, origin, and review helper logic into reusable modules."
    changes:
      - file: "cli/scafld"
        action: "update"
        content_spec: |
          Replace inline repo-aware draft template building, origin/projection
          shaping, and review parsing helpers with calls into extracted modules.
      - file: "scafld/spec_templates.py"
        action: "create"
        content_spec: |
          Generate the repo-aware draft template and companion metadata used by
          `scafld new`.
      - file: "scafld/projections.py"
