task:
  title: Restore list command runtime integrity
  summary: 'Fix the current regression where `scafld list` crashes with a `NameError`
    instead of showing the task inventory. The immediate bug is simple: `cmd_list()`
    calls `yaml_read_field()` but `scafld/commands/lifecycle.py` no longer imports
    it. The real product requirement is a little broader: `list` is one of the default
    control-surface commands, so it needs a direct regression test that exercises
    the packaged CLI across the normal spec states instead of relying on incidental
    coverage from other flows. This task restores the command, adds a real smoke,
    and keeps the scope tight.

    '
  size: small
  risk_level: low
  context:
    packages:
    - scafld
    - tests
    files_impacted:
    - path: scafld/commands/lifecycle.py
      lines: task-selected
      reason: The list command currently references `yaml_read_field()` without importing
        it.
    - path: tests/list_command_smoke.sh
      lines: all
      reason: A dedicated smoke should prove `scafld list` works through the packaged
        CLI and respects basic filters.
    invariants:
    - default_control_surface_commands_must_not_crash
    - packaged_cli_is_the_truth_surface
    - list_output_remains_human_first
    related_docs:
    - README.md
    - docs/lifecycle.md
    - docs/cli-reference.md
  objectives:
  - Make `scafld list` run successfully again from the packaged CLI.
  - Add a dedicated smoke that covers the normal lifecycle buckets and filter behavior.
  - Keep the fix narrow and avoid changing list semantics beyond restoring integrity.
  scope:
    in_scope:
    - The missing import and any directly related command-runtime cleanup required
      to restore `scafld list`.
    - A real CLI smoke for `scafld list`.
    out_of_scope:
    - Adding JSON mode to `list`.
    - Reformatting list output.
    - Broader lifecycle/reporting redesign.
  assumptions:
  - find_all_specs() already provides the right source of truth for list inventory.
  - A direct smoke is the right guardrail because this bug bypassed the current suites.
  touchpoints:
  - area: command integrity
    description: scafld list should be as reliable as status and report.
  - area: regression coverage
    description: The packaged CLI should be exercised directly instead of relying
      on helper-level tests.
  risks:
  - description: A too-minimal fix could restore the import but still leave list filters
      untested and brittle.
    impact: medium
    mitigation: Add a dedicated smoke that proves both unfiltered and filtered listing.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: scafld list no longer crashes and shows existing specs.
      status: pending
    - id: dod2
      description: A dedicated smoke proves the packaged CLI can list lifecycle buckets
        and apply a basic filter.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the list command fix.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Dedicated list-command smoke passes.
      command: bash tests/list_command_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not widen the task into a list UX redesign.
    - Do not add compatibility branches or duplicate parsing helpers.
    - Do not bypass the packaged CLI in the regression coverage.
  notes: 'This is a real product bug in one of the commands shown in the default help
    surface. The bar here is simple: the command should work, and it should stay working.

    '
