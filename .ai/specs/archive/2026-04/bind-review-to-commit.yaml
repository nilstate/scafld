updated: "2026-04-21T06:56:32Z"
status: "completed"
harden_status: "not_run"

task:
  title: "Bind review artifacts to commits"
  summary: >
    Strengthen the review gate by recording git state in Review Artifact v3 and
    refusing normal completion when the current workspace no longer matches what
    was reviewed. The latest review round should capture the reviewed `HEAD`,
    whether the tree was dirty, and enough information for `scafld complete` to
    detect drift. Human override remains the escape hatch.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "tests"
      - "docs"
    invariants:
      - "domain_boundaries"
      - "no_legacy_code"
      - "public_api_stable"
  objectives:
    - "Record reviewed git state in review metadata."
    - "Block `scafld complete` when the current repo no longer matches the reviewed state."
    - "Preserve the existing human-reviewed override path."
  touchpoints:
    - area: "cli/scafld"
      description: "Capture git state during review, validate metadata, and enforce commit binding during completion."
    - area: "tests/review_gate_smoke.sh"
      description: "Exercise matched and mismatched review state scenarios."
    - area: "docs/review.md"
      description: "Document reviewed commit binding and override semantics."
    - area: "docs/cli-reference.md"
      description: "Document completion blocking when review and HEAD diverge."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Review metadata records reviewed git state."
        status: "pending"
      - id: "dod2"
        description: "`scafld complete` blocks if the current git state no longer matches the review."
        status: "pending"
      - id: "dod3"
        description: "The human override path still works and is auditable."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Review gate smoke covers commit binding."
        command: "bash tests/review_gate_smoke.sh"
        expected: "exit code 0"

