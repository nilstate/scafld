phases:
  - id: "phase1"
    name: "Capture And Enforce Reviewed Git State"
    objective: "Bind review artifacts to a concrete git state and enforce it at completion."
    changes:
      - file: "cli/scafld"
        action: "update"
        content_spec: |
          Extend review metadata with reviewed git state, validate the new fields,
          and block completion when the current repo no longer matches the latest
          reviewed state unless the human override path is used.
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        content_spec: |
          Add fixtures that mutate the repo after review and assert that
          completion is blocked with a clear reason until overridden.
      - file: "docs/review.md"
        action: "update"
        content_spec: |
          Explain reviewed git state capture, mismatch blocking, and the audited
          override path.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Mention that `scafld complete` checks review binding against the
          current git state.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Review gate smoke passes with commit binding enabled."
        command: "bash tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-21T06:54:04Z"
    status: "pending"

rollback:
