phases:
  - id: "phase1"
    name: "Extract Stable Helper Modules"
    objective: "Move reusable helper layers into the package while keeping the CLI surface stable."
    changes:
      - file: "scafld/config.py"
        action: "create"
        content_spec: |
          Move config parsing, merging, and overlay helpers into a dedicated
          module used by the CLI.
      - file: "scafld/git_state.py"
        action: "create"
        content_spec: |
          Move reusable git-state inspection helpers into a shared module.
      - file: "scafld/hardening.py"
        action: "create"
        content_spec: |
          Move harden citation parsing and verification helpers into a shared
          module.
      - file: "scafld/reviewing.py"
        action: "create"
        content_spec: |
          Move review topology, metadata, and rendering helpers into a shared
          module.
      - file: "cli/scafld"
        action: "update"
        content_spec: |
          Replace extracted helper bodies with imports and keep command dispatch
          behavior unchanged.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "The smoke suite passes after helper extraction."
        command: "bash tests/harden_smoke.sh && bash tests/review_gate_smoke.sh && bash tests/update_smoke.sh && bash tests/package_smoke.sh"
        expected: "exit code 0"
        result: "pass"
