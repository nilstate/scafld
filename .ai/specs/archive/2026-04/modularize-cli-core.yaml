task:
  title: "Modularize CLI core"
  summary: >
    Reduce change risk in the single-file CLI by extracting stable helper layers
    into the importable `scafld` package. Focus on pure helpers and command-local
    support code first: config loading, git-state helpers, harden citation
    helpers, and review/report helpers. Keep CLI behavior unchanged.
  size: "large"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "scafld"
      - "tests"
    invariants:
      - "domain_boundaries"
      - "no_legacy_code"
      - "public_api_stable"
  objectives:
    - "Extract stable helper code from `cli/scafld` into importable modules."
    - "Shrink the command file without changing CLI behavior."
    - "Keep smoke coverage green after the extraction."
  touchpoints:
    - area: "cli/scafld"
      description: "Retain argument parsing and command dispatch while importing extracted helpers."
    - area: "scafld/"
      description: "New helper modules for config, git state, harden verification, and review/report support."
    - area: "tests/*.sh"
      description: "Existing smoke tests guard behavior during extraction."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Helper code moves into package modules with no CLI behavior regressions."
        status: "pending"
      - id: "dod2"
        description: "`cli/scafld` becomes materially smaller and more command-focused."
        status: "pending"
      - id: "dod3"
        description: "Existing smoke tests remain green after the extraction."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Smoke suite passes after modularization."
        command: "bash tests/harden_smoke.sh && bash tests/review_gate_smoke.sh && bash tests/update_smoke.sh && bash tests/package_smoke.sh"
        expected: "exit code 0"

