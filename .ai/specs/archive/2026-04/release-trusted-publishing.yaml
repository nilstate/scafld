phases:
  - id: "phase1"
    name: "Cut publish-pypi over to trusted publishing"
    objective: "Remove the PyPI token from the workflow, add OIDC permission to the publish job, and document the trusted publisher binding."
    changes:
      - file: ".github/workflows/release.yml"
        action: "update"
        content_spec: |
          On `publish-pypi`:
            - Add `permissions: { id-token: write, contents: read }`. Keep
              `contents: read` because the job downloads release artifacts.
            - Remove `password: ${{ secrets.PYPI_API_TOKEN }}` from the
              `pypa/gh-action-pypi-publish` step. Keep `packages-dir` and
              `skip-existing`.
            - Do not change the validate, build, publish-npm, or
              github-release jobs.
      - file: "docs/release.md"
        action: "create"
        content_spec: |
          New maintainer-facing release doc. Add a "PyPI trusted publishing"
          section explaining:
            - The PyPI project must register a trusted publisher with owner
              `nilstate`, repo `scafld`, workflow filename `release.yml`,
              environment empty, and job id `publish-pypi`.
            - Why the workflow no longer needs `PYPI_API_TOKEN` and that
              the secret can be removed from the repo settings only after
              the first successful trusted-publishing release.
            - Rollback: re-add the `password:` input and the secret if the
              OIDC handshake fails for an unexpected reason.
    acceptance_criteria:
      - id: "ac1_1"
        type: "boundary"
        description: "release.yml has no PyPI token reference."
        command: "sh -c '! grep -q PYPI_API_TOKEN .github/workflows/release.yml'"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:12:42Z"
      - id: "ac1_2"
        type: "boundary"
        description: "publish-pypi job declares id-token write."
        command: "grep -qE 'id-token:[[:space:]]+write' .github/workflows/release.yml"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:12:42Z"
      - id: "ac1_3"
        type: "boundary"
        description: "publish-pypi step still references the canonical pypi-publish action."
        command: "grep -q 'pypa/gh-action-pypi-publish' .github/workflows/release.yml"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:12:42Z"
      - id: "ac1_4"
        type: "boundary"
        description: "Maintainer doc describes the trusted publisher binding."
        command: "grep -qiE 'trusted publisher|trusted publishing' docs/release.md"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T09:12:42Z"
    status: "completed"

