task:
  title: "Migrate PyPI release to trusted publishing"
  summary: >
    The release workflow authenticates to PyPI with a long-lived
    `PYPI_API_TOKEN` repository secret. Trusted publishing on PyPI removes
    the shared secret entirely: the publish job exchanges its short-lived
    GitHub OIDC token for a per-release upload credential, scoped to the
    `nilstate/scafld` repository, the `Release` workflow, and the
    `publish-pypi` job. Migrating shrinks the blast radius of a leaked
    token and removes a yearly rotation chore.

    Switch the PyPI publish job to OIDC trusted publishing. Keep the npm
    publish path on its current `NPM_TOKEN` flow until npm's OIDC story
    settles; npm tokens are explicitly out of scope here.
  size: "micro"
  risk_level: "medium"
  context:
    packages:
      - ".github"
      - "docs"
    files_impacted:
      - path: ".github/workflows/release.yml"
        lines: "task-selected"
        reason: "Owns the publish-pypi job; needs `id-token: write` and the password removed."
      - path: "docs/release.md"
        lines: "task-selected"
        reason: "New maintainer-facing release doc that records the trusted publisher binding and rollback path."
    invariants:
      - "release_workflow_must_remain_idempotent_per_tag"
      - "no_long_lived_publish_credentials_in_workflow"
      - "tag_to_pypi_release_path_unchanged_for_operators"
    related_docs:
      - "docs/release.md"
      - ".github/workflows/release.yml"
    cwd: "."
  objectives:
    - "PyPI publish authenticates via GitHub OIDC trusted publishing instead of a shared API token."
    - "Document the PyPI trusted publisher registration so a new maintainer can re-bind the workflow if needed."
    - "Remove the `PYPI_API_TOKEN` reference from the workflow once trusted publishing is verified."
  scope:
    in_scope:
      - "publish-pypi job permissions and inputs in `release.yml`."
      - "Documentation describing the trusted publisher binding and one-time setup."
    out_of_scope:
      - "npm publish credentials and provenance."
      - "GitHub release notes generation."
      - "Changing the release pipeline structure (validate/build/publish/release)."
      - "Removing the `PYPI_API_TOKEN` repository secret itself; that is an operator action after the first successful trusted publish."
  assumptions:
    - "The PyPI project `scafld` already exists; trusted publisher binding can be added via the PyPI project settings."
    - "`pypa/gh-action-pypi-publish@release/v1` accepts trusted publishing with no `password` input when the job has `id-token: write`."
    - "The workflow filename, job id, and environment name are stable enough to use in the trusted publisher binding."
  touchpoints:
    - area: "release workflow"
      description: "publish-pypi job permissions, inputs, and dependencies."
    - area: "operator docs"
      description: "How to register or re-register the PyPI trusted publisher and what to do if the OIDC handshake fails."
  risks:
    - description: "First release after the cutover fails because the trusted publisher binding on PyPI is missing or mistyped."
      impact: "high"
      mitigation: "Document the exact PyPI binding fields (workflow filename, environment, job id, owner, repo) and dry-run with TestPyPI before deleting the API token."
    - description: "GitHub job permissions are tightened more than necessary and break artifact download."
      impact: "low"
      mitigation: "Only `id-token: write` is needed; keep `contents: read` for download/upload-artifact."
  acceptance:
    validation_profile: "light"
    definition_of_done:
      - id: "dod1"
        description: "publish-pypi job has `permissions.id-token: write` and no `password` input on `pypa/gh-action-pypi-publish`."
        status: "done"
      - id: "dod2"
        description: "release.yml no longer references `secrets.PYPI_API_TOKEN`."
        status: "done"
      - id: "dod3"
        description: "docs/release.md (or a release runbook) describes the PyPI trusted publisher binding fields and the rollback plan."
        status: "done"
    validation:
      - id: "v1"
        type: "boundary"
        description: "publish-pypi step still references the canonical pypi-publish action."
        command: "grep -q 'pypa/gh-action-pypi-publish' .github/workflows/release.yml"
        expected: "exit code 0"
      - id: "v2"
        type: "boundary"
        description: "release.yml no longer references the PyPI token secret."
        command: "sh -c '! grep -q PYPI_API_TOKEN .github/workflows/release.yml'"
        expected: "exit code 0"
      - id: "v3"
        type: "boundary"
        description: "publish-pypi job declares OIDC permission."
        command: "grep -qE 'id-token:[[:space:]]+write' .github/workflows/release.yml"
        expected: "exit code 0"

