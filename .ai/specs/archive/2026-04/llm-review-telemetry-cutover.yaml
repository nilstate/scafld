phases:
  - id: "phase1"
    name: "Review handoff"
    objective: "Generate a fresh review handoff without changing the existing review lifecycle."
    changes:
      - file: "scafld/review_workflow.py"
        action: "update"
        content_spec: |
          When opening a review round, compile a review handoff from spec, diff,
          and compact session state. Return the handoff path in human and JSON
          output while keeping review artifact creation unchanged.
      - file: "scafld/reviewing.py"
        action: "update"
        content_spec: |
          Add optional metadata fields for review_handoff and
          reviewer_isolation while preserving existing required review artifact
          fields and validation behavior.
      - file: "scafld/commands/review.py"
        action: "update"
        content_spec: |
          Include review handoff references in --json output and concise human
          output.
      - file: "docs/review.md"
        action: "update"
        content_spec: |
          Document review as a fresh-context stage and explain why it should not
          inherit executor chatter.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Review handoff smoke test passes."
        command: "bash tests/review_handoff_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:13Z"
        result_output: "[1/3] execute a passing phase [2/3] review emits a fresh review handoff [3/3] review metadata records the handoff reference PASS: review handoff smoke"
    status: "pending"

  - id: "phase2"
    name: "Session-derived metrics"
    objective: "Teach report to measure the value layer from session outcomes."
    dependencies: ["phase1"]
    changes:
      - file: "scafld/commands/reporting.py"
        action: "update"
        content_spec: |
          Read session and review data to compute
          first_attempt_pass_rate, recovery_convergence_rate, attempts per
          phase, and optional usage/cost totals when available. Expose the two
          canonical metrics per task and in aggregate.
      - file: "scafld/projections.py"
        action: "update"
        content_spec: |
          Expose optional session summary fields for JSON/report projections
          without breaking existing projection keys.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document report metric meanings, review JSON additions, and the
          boundaries of attribution.
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Document the minimal llm config surface and optional usage fields that
          wrappers may place into session.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Report metrics smoke test passes."
        command: "bash tests/report_metrics_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:23Z"
        result_output: "[1/3] create one failure followed by one recovery [2/3] human report shows the LLM execution signals section [3/3] json report exposes the same metrics PASS: report metrics smoke"
    status: "pending"

  - id: "phase3"
    name: "Docs and compatibility"
    objective: "Make the architecture legible without expanding the public surface."
    dependencies: ["phase2"]
    changes:
      - file: "README.md"
        action: "update"
        content_spec: |
          Update the mission wording to 'control plane that gets the most out of
          your LLM during governed execution' and explain spec/handoff/session
          at a high level.
      - file: "docs/run-artifacts.md"
        action: "update"
        content_spec: |
          Add review handoff and report metric details, including the honest
          boundary that external agents may ignore the handoff.
      - file: "tests/report_metrics_smoke.sh"
        action: "create"
        content_spec: |
          Construct a temporary session ledger with attempts and recoveries, run
          scafld report, and assert the expected metrics appear.
      - file: "tests/review_handoff_smoke.sh"
        action: "create"
        content_spec: |
          Open a review round in a temporary workspace, assert the review
          artifact remains valid, and assert a review handoff is generated.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Review, report, and review gate smoke tests pass."
        command: "bash tests/review_handoff_smoke.sh && bash tests/report_metrics_smoke.sh && bash tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:54:26Z"
        result_output: "[1/3] execute a passing phase [2/3] review emits a fresh review handoff [3/3] review metadata records the handoff reference PASS: review handoff smoke [1/3] create one failure followed by one recovery"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- scafld/review_workflow.py scafld/reviewing.py scafld/commands/review.py docs/review.md tests/review_handoff_smoke.sh"
    phase2: "git checkout HEAD -- scafld/commands/reporting.py scafld/projections.py docs/cli-reference.md docs/configuration.md tests/report_metrics_smoke.sh"
    phase3: "git checkout HEAD -- README.md docs/run-artifacts.md tests/report_metrics_smoke.sh tests/review_handoff_smoke.sh"

