status: "completed"
harden_status: "not_run"

task:
  title: "Review Handoffs And Report Metrics"
  summary: >
    Complete the cutover by giving review a generated handoff and making report
    read quality metrics from session rather than a separate telemetry
    subsystem. scafld should preserve the existing review artifact while
    generating a fresh review handoff and showing whether the value layer is
    moving execution quality.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "scafld/review_workflow.py"
      - "scafld/reviewing.py"
      - "scafld/commands/review.py"
      - "scafld/commands/reporting.py"
      - "scafld/projections.py"
      - "docs/"
      - "tests/"
    files_impacted:
      - path: "scafld/review_workflow.py"
        lines: "1-460"
        reason: "Review opening should generate or reference a review handoff derived from spec, diff, and session summary."
      - path: "scafld/reviewing.py"
        lines: "1-360"
        reason: "Review metadata may need optional fields for handoff reference and reviewer isolation."
      - path: "scafld/commands/review.py"
        lines: "1-360"
        reason: "review --json should expose review handoff paths without breaking current review flow."
      - path: "scafld/commands/reporting.py"
        lines: "1-320"
        reason: "Report should expose session-derived LLM-performance metrics."
      - path: "scafld/projections.py"
        lines: "1-220"
        reason: "Projection model can expose session summary fields."
      - path: "docs/review.md"
        lines: "all"
        reason: "Document review as a fresh-context handoff stage."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "Document review JSON additions and report metrics."
      - path: "docs/configuration.md"
        lines: "all"
        reason: "Document minimal llm config surface and optional usage fields inside session."
      - path: "tests/review_handoff_smoke.sh"
        lines: "all"
        reason: "New smoke test for review handoff generation."
      - path: "tests/report_metrics_smoke.sh"
        lines: "all"
        reason: "New smoke test for session-driven metrics."
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "config_from_env"
      - "no_test_logic_in_production"
    related_docs:
      - "plans/llm-performance-cutover.md"
      - "docs/review.md"
      - "docs/configuration.md"
      - "docs/run-artifacts.md"
  objectives:
    - "Generate a review handoff from spec, diff, and compact session state."
    - "Keep Review Artifact v3 intact while adding optional handoff references."
    - "Make report derive first_attempt_pass_rate, recovery_convergence_rate, and attempts per phase from session."
    - "Surface the canonical metrics both per task and in aggregate."
    - "State the honest boundary that handoffs may be ignored by external agent harnesses."
  scope:
    in_scope:
      - "Review handoff generation."
      - "Session-derived report metrics."
      - "Optional projection/report JSON additions."
      - "Docs and smoke tests."
    out_of_scope:
      - "Provider billing integration."
      - "External dashboards."
      - "Separate telemetry artifacts or commands."
  dependencies:
    - "llm-recovery-session-loop should land first so report has session attempts and phase summaries to read."
  assumptions:
    - "Optional usage fields may be recorded inside session by external wrappers, but report must work without them."
    - "Review handoff generation can reuse the same renderer used for phase and recovery."
  touchpoints:
    - area: "Review handoff"
      description: "Review gets a fresh-context handoff rather than inheriting executor chatter."
    - area: "Review artifact metadata"
      description: "Metadata can reference the review handoff without changing required Review Artifact v3 fields."
    - area: "Reporting"
      description: "report reads session and review outcomes instead of separate telemetry files, exposing canonical metrics per task and in aggregate."
    - area: "Agent-agnostic boundary"
      description: "Docs and report describe that handoffs improve available input but do not force consumption."
  risks:
    - description: "Adding review metadata can break completion gate parsing."
      impact: "high"
      mitigation: "Keep new review fields optional and preserve existing required review artifact fields."
    - description: "Metrics can overclaim causality."
      impact: "high"
      mitigation: "Report only session-observed outcomes and state that external agents may ignore handoffs."
    - description: "Session metrics may be incomplete when wrappers do not record usage."
      impact: "medium"
      mitigation: "Make usage/cost fields optional and keep core metrics based on attempts and review outcomes."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "scafld review emits a review handoff and keeps existing review artifact behavior."
        status: "pending"
      - id: "dod2"
        description: "Review metadata remains backward-compatible and may reference the review handoff."
        status: "pending"
      - id: "dod3"
        description: "scafld report shows first_attempt_pass_rate, recovery_convergence_rate, and attempts per phase from session, both per task and in aggregate."
        status: "pending"
      - id: "dod4"
        description: "No separate telemetry artifact or command is introduced."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate llm-review-telemetry-cutover"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Run review handoff smoke test."
        command: "bash tests/review_handoff_smoke.sh"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Run report metrics smoke test."
        command: "bash tests/report_metrics_smoke.sh"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Run existing review gate smoke to prove compatibility."
        command: "bash tests/review_gate_smoke.sh"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not create telemetry.jsonl or a telemetry command."
      - "Do not require token or cost data to compute the primary metrics."
      - "Do not change the lifecycle gates."
  notes: >
    report should show the minimum honest metrics:
    `first_attempt_pass_rate`, `recovery_convergence_rate`, attempts per phase,
    and optional review fail/pass_with_issues rates after recovery. Optional
    usage fields can live in session when external wrappers provide them, but
    report cannot depend on them. Review is the fresh-context quality stage;
    harden remains unchanged in v1 and is the obvious next handoff kind.

