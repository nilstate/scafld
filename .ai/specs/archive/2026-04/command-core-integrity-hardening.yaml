task:
  title: "Refactor the scafld command core for integrity"
  summary: >
    Harden scafld's internal command architecture before adding more product
    surface area. The current CLI packs parsing, path resolution, spec storage,
    output formatting, and command behavior into one large entrypoint plus a
    few helper modules. Extract stable internal surfaces for command
    registration, spec IO, path/state lookup, JSON emission, and structured
    error handling so new Git, PR, and issue integrations do not compound
    brittleness.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "cli"
      - "scafld"
      - "tests"
      - "docs"
    files_impacted:
      - path: "cli/scafld"
        lines: "all"
        reason: "The monolithic CLI currently owns argument parsing, state transitions, filesystem IO, and user-facing output."
      - path: "scafld/config.py"
        lines: "all"
        reason: "Shared config and init autodetection should plug into a cleaner command/runtime boundary."
      - path: "scafld/git_state.py"
        lines: "all"
        reason: "Git helpers are already extracted and should integrate with a unified command/runtime layer."
      - path: "scafld/reviewing.py"
        lines: "all"
        reason: "Review pass metadata should stay aligned with the refactored scope-audit behavior."
      - path: "tests/review_gate_smoke.sh"
        lines: "all"
        reason: "Review smoke protects the most failure-prone lifecycle boundary."
      - path: "tests/harden_smoke.sh"
        lines: "all"
        reason: "Harden smoke protects the newest lifecycle feature and anti-drift constraints."
      - path: "tests/package_smoke.sh"
        lines: "all"
        reason: "Package smoke ensures the refactor does not break PyPI/npm distribution or bundled assets."
      - path: "tests/test_command_runtime.py"
        lines: "all"
        reason: "Focused runtime coverage protects root detection and structured command context behavior."
      - path: "tests/test_spec_store.py"
        lines: "all"
        reason: "Focused spec-store coverage protects lookup and move semantics during the refactor."
      - path: "tests/test_git_state.py"
        lines: "all"
        reason: "Git-state coverage protects scope auditing and working-tree file discovery behavior."
      - path: "README.md"
        lines: "all"
        reason: "Public docs should explain the new reliability posture at a high level."
      - path: ".ai/config.yaml"
        lines: "all"
        reason: "The bundled default review topology should describe the actual scope-audit behavior."
    invariants:
      - "human_cli_behavior_stays_intact"
      - "command_logic_becomes_more_testable_not_more_magical"
      - "filesystem_state_changes_stay_explicit"
      - "new_internal_layers_reduce_duplication"
      - "packaged_cli_and_framework_assets_remain_in_sync"
    related_docs:
      - "README.md"
      - "AGENTS.md"
      - "docs/cli-reference.md"
      - "docs/lifecycle.md"
      - "docs/review.md"
      - "docs/scope-auditing.md"
      - "docs/workspaces.md"
    cwd: "/home/kam/dev/scafld"
  objectives:
    - "Split shared command concerns into stable internal modules instead of growing `cli/scafld` indefinitely."
    - "Centralize spec discovery, load/update/move/archive operations behind one tested spec-store surface."
    - "Centralize path resolution and workspace discovery so every command uses the same rules."
    - "Introduce one structured error taxonomy that supports human and JSON callers without duplicating logic."
    - "Add a command-test harness that can exercise lifecycle transitions without relying only on end-to-end shell smoke."
    - "Keep packaging, docs, and existing workflow semantics intact while reducing the chance of future regressions."
  scope:
    in_scope:
      - "Create internal modules for command registry/runtime, spec store, output rendering, and error definitions."
      - "Move repeated spec path lookup and write/update behavior out of `cli/scafld`."
      - "Normalize exit handling and error reporting across commands."
      - "Add focused regression tests around command routing and spec-store operations."
      - "Keep the public CLI surface compatible while improving internals."
    out_of_scope:
      - "Adding GitHub-specific network integrations."
      - "Changing the review artifact format beyond what the internal refactor requires."
      - "Redesigning the spec schema for product features unrelated to core integrity."
      - "Hosted receipts, approval routing, or runx-specific orchestration."
  dependencies:
    - "modularize-cli-core"
  assumptions:
    - "The safest path is an internal hard cutover: new code should call the extracted helpers directly rather than keeping shadow implementations."
    - "The CLI entrypoint may remain as a thin adapter so package entrypoints do not change."
    - "The refactor should land before major Git/PR/issue features so new behavior builds on cleaner primitives."
  touchpoints:
    - area: "command runtime"
      description: "Extract a stable command runtime and dispatch layer from `cli/scafld`."
      owners:
        - "scafld-core"
    - area: "spec store"
      description: "Create a single internal surface for locating, loading, updating, moving, and archiving specs."
      owners:
        - "scafld-core"
    - area: "output and errors"
      description: "Centralize human output, JSON output, warnings, and structured error codes."
      owners:
        - "scafld-core"
    - area: "test harness"
      description: "Add focused regression coverage beneath the shell smokes."
      owners:
        - "scafld-core"
    - area: "docs and packaging"
      description: "Keep README/docs/package assets aligned with the refactor."
      owners:
        - "scafld-core"
  risks:
    - description: "Refactoring the CLI core could silently change lifecycle behavior or archive paths."
      impact: "high"
      mitigation: "Run the existing shell smokes unchanged and add focused tests around spec lookup, state transitions, and error handling."
    - description: "New internal layers could become abstract ceremony instead of reducing duplication."
      impact: "medium"
      mitigation: "Limit extraction to shared concerns already repeated in `cli/scafld`; avoid speculative frameworks."
    - description: "Packaging could drift if the refactor changes import paths without updating build metadata."
      impact: "medium"
      mitigation: "Keep `tests/package_smoke.sh` in the acceptance path and verify the packaged CLI still boots."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "Shared command concerns move out of `cli/scafld` into stable internal modules."
        status: "done"
        checked_at: "2026-04-21T08:02:34Z"
      - id: "dod2"
        description: "Spec lookup, load, update, move, and archive behavior is centralized behind one tested surface."
        status: "done"
        checked_at: "2026-04-21T08:02:34Z"
      - id: "dod3"
        description: "Structured error handling is defined once and reused across commands."
        status: "done"
        checked_at: "2026-04-21T08:02:34Z"
      - id: "dod4"
        description: "Existing lifecycle smoke coverage passes unchanged after the refactor."
        status: "done"
        checked_at: "2026-04-21T07:56:54Z"
        notes: "lifecycle, review-gate, and harden smoke suites passed after the extraction."
      - id: "dod5"
        description: "Packaging and docs remain aligned with the refactored internal shape."
        status: "done"
        checked_at: "2026-04-21T08:02:34Z"
    validation:
      - id: "v1"
        type: "test"
        description: "Core command regression suite passes."
        command: "python3 -m unittest tests.test_command_runtime tests.test_spec_store tests.test_git_state"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v2"
        type: "integration"
        description: "Review gate smoke still passes."
        command: "./tests/review_gate_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v3"
        type: "integration"
        description: "Harden smoke still passes."
        command: "./tests/harden_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v4"
        type: "integration"
        description: "Package smoke still passes."
        command: "./tests/package_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240

