task:
  title: "Verify review packet sha256 on complete (hand-edit detection)"
  summary: >
    `scafld complete` reads the review markdown but doesn't verify
    the packet came from a real challenger. An operator (or agent)
    can edit `.ai/reviews/<task>.md` to flip a verdict between
    `scafld review` and `scafld complete` and the CLI accepts it.

    Most of the seal is already in place:

      - `canonical_response_sha256` is computed in
        `review_runner.py:1808,1841` over the full canonical
        `{"packet": ..., "projection": ...}` shape.
      - The hash is already persisted into the review markdown's
        metadata block via `build_review_metadata` /
        `review_provenance` (review_workflow.py:611-629). Existing
        external-reviewed files in `.ai/reviews/` already carry it.
      - The canonical packet body is already written to
        `.ai/runs/<task>/review-packets/review-<n>.json` by
        `write_review_packet_artifact` (review_packet.py:496-507).

    What's missing is the verify-on-complete step. Add a
    `verify_review_seal(metadata, packet) -> (ok, reason)` helper
    that mirrors the writer's hash computation; in `cmd_complete`,
    load the packet artifact, recompute, refuse on mismatch with
    `EC.REVIEW_GATE_BLOCKED`. Hand-edits to the review markdown
    metadata or to the recorded findings now fail loudly.

    Hard cutover: review files written before 1.7.0 (no
    `canonical_response_sha256` in metadata) fail with a clear
    "review file predates 1.7.0 seal" error. Operator re-runs
    `scafld review` under 1.7.0 to refresh the seal.
  size: "small"
  risk_level: "medium"
  context:
    files_impacted:
      - path: "scafld/review_packet.py"
        reason: "Add `compute_canonical_response_sha256(packet)` and `verify_review_seal(metadata, packet)` helpers; mirrors review_runner.py:1808,1841."
      - path: "scafld/commands/review.py"
        reason: "cmd_complete loads the packet artifact, calls verify_review_seal, blocks on mismatch."
      - path: "tests/test_review_packet.py"
        reason: "Cover hash computation determinism, metadata-tamper rejection, packet-tamper rejection, missing-seal rejection."
      - path: "tests/review_gate_smoke.sh"
        reason: "Smoke that proves complete rejects a hand-edited review file and accepts an unmodified one."
        ownership: "shared"
      - path: "docs/configuration.md"
        reason: "Document the seal + hard cutover for pre-1.7.0 review files."
    cwd: "."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "`compute_canonical_response_sha256(packet)` returns deterministic hex sha256 matching the writer in review_runner.py."
        status: "done"
      - id: "dod2"
        description: "`verify_review_seal(metadata, packet)` returns (True, \"\") on match; (False, reason) on hash mismatch; (False, \"missing_seal\") when metadata lacks `canonical_response_sha256`."
        status: "done"
      - id: "dod3"
        description: "`scafld complete` blocks with `EC.REVIEW_GATE_BLOCKED` and a named gate_reason when the packet artifact's recomputed hash doesn't match metadata."
        status: "done"
      - id: "dod4"
        description: "Pre-1.7.0 review files (no canonical_response_sha256 in metadata) fail complete with a clear hard-cutover error."
        status: "done"
      - id: "dod5"
        description: "Smoke proves a hand-edited review file fails complete; an unmodified one passes."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
      - id: "v2"
        type: "test"
        command: "python3 -m unittest tests.test_review_packet"
        expected_kind: "exit_code_zero"
      - id: "v3"
        type: "boundary"
        description: "Tamper-evidence smoke is registered."
        command: "grep -q 'case_review_complete_rejects_tampered_review_file' tests/review_gate_smoke.sh"
        expected_kind: "exit_code_zero"

planning_log:
  - timestamp: "2026-04-27T15:43:46Z"
    actor: "user"
    summary: "Spec drafted as cutover #2 (per plans/1.7.0-cutover.md)."
  - timestamp: "2026-04-28T13:30:00Z"
    actor: "agent"
    summary: "Slimmed against verified code: hash + metadata persistence + canonical artifact already exist; spec narrows to verify_review_seal helper + cmd_complete recompute. Dropped seal_review_packet, sealed.json sibling, sealing_party enum, grace pass (hard cutover means pre-1.7 files fail)."
  - timestamp: "2026-04-28T19:00:00Z"
    actor: "agent"
    summary: |
      Review 6 verdict=fail. Resolved 1 blocking + 1 non-blocking
      medium per user direction "best system, idc about breaking
      compatibility":
      - F1 (high) Body-tamper smoke flipped verdict pass→fail, which
        trips the existing verdict=fail branch BEFORE the body
        cross-check ever runs. So the smoke claimed to assert "review
        body tampered" but actually exercised an unrelated path.
        Fixed: smoke now injects a fake non-blocking bullet (count
        mismatch) without flipping the verdict, exercising
        body_non_blocking_mismatch directly.
      - F2 (medium) Hand-written round_status=override + override_reason
        could still bypass since both fields are tamperable metadata.
        Closed: override now requires a matching human_override entry
        in session.json (written only by the real --human-reviewed
        --reason CLI flow). Hand-edits to review markdown can't forge
        the session entry.
  - timestamp: "2026-04-28T18:30:00Z"
    actor: "agent"
    summary: |
      Review 5 verdict=fail (2 high blocking + 3 medium non-blocking).
      User direction: "best system, idc about breaking compatibility."
      Tightened to the clean shape:
      - F1 hand-written round_status=override loophole closed: complete
        also requires override_reason to be set (mirrors what the
        --human-reviewed --reason flow writes). Manual edits without a
        reason fail with "override without reason" gate_reason.
      - F2 no-artifact + no-seal path no longer falls through. 1.7.0
        hard cutover: every review must either produce a sealed
        external packet OR go through --human-reviewed --reason.
        Operators using --runner local/manual must use the audited
        override path to ship.
      - F3 (medium) topology-coupling: rewrote both writer
        (review_runner.py:1808) and reader (compute_canonical_response_sha256)
        to hash the packet alone, not {packet, projection}. The seal
        is now topology-independent; editing .ai/config.yaml between
        review and complete cannot produce false-positive mismatches.
        Old review files (sealed under the {packet, projection} hash)
        will fail verification, by design — operators re-run review.
      - F4 (medium) malformed packet artifact wrapped in
        try/except (KeyError, TypeError, ValueError) so cmd_complete
        produces a graceful "malformed packet artifact: ..." gate
        reason instead of an uncaught exception.
      - F5 (medium) bullet-text-not-cross-checked: skipped. Both
        blocking and non-blocking COUNTS are cross-checked, which
        catches the threat (re-classification, deletion). Replacing
        a bullet's text without changing severity/blocking yields
        the same gate decision; not a real bypass.
  - timestamp: "2026-04-28T17:30:00Z"
    actor: "agent"
    summary: |
      Review 4 verdict=fail. Resolved 1 blocking finding:
      - F1 (high) Conditioning the seal check on metadata.reviewer_mode
        was tamperable: an operator could flip "fresh_agent" to
        "human_override" to skip verification entirely. Switched the
        discriminator to the out-of-band signal — the packet artifact's
        existence on disk. round_status="override" still skips (audited
        path); otherwise: artifact present means seal must verify;
        artifact missing + metadata claims seal means tamper; artifact
        missing + no seal means non-external mode (local/manual) and
        the gate falls through.
  - timestamp: "2026-04-28T17:00:00Z"
    actor: "agent"
    summary: |
      Review 3 verdict=fail. Resolved 1 blocking + 1 non-blocking medium:
      - F1 (high) Local/manual review workflows don't produce a packet
        artifact, so the unconditional seal check falsely claimed they
        "predated 1.7.0". Fix: only enforce the seal when reviewer_mode
        is `fresh_agent` (external runner). Other modes (challenger
        scaffolds, executor self-review, human_override) skip the check.
      - F2 (medium) Body cross-check covered blocking-finding count but
        not non-blocking, leaving gate_severity=medium/low tamperable.
        Added non-blocking count cross-check.
      Deferred:
      - F3 (low) topology change between scafld review and scafld
        complete raises an uncaught KeyError instead of a graceful
        gate_reason. Tracked alongside the topology-coupling concern in
        the 1.7.x patch.
  - timestamp: "2026-04-28T16:30:00Z"
    actor: "agent"
    summary: |
      Review 2 verdict=fail. Resolved both blocking findings:
      - F1 (high) Seal binds packet+metadata only; cmd_complete still
        consumed verdict + blocking count from the markdown BODY, so a
        body-only tamper (flip `### Verdict` from fail to pass without
        touching the seal) bypassed the gate. Fix: after seal verify,
        cross-check the body's verdict + blocking-finding count against
        the verified packet; mismatch raises a body_verdict_mismatch /
        body_blocking_mismatch gate_reason.
      - F2 (high) The smoke test ran control + tamper in one repo, so the
        control complete archived the run dir before the tamper case
        could read the packet artifact. Refactored into a `_seal_tamper_write_fixture`
        helper called against three fresh repos: control, hash-tamper,
        body-tamper.
  - timestamp: "2026-04-28T15:50:00Z"
    actor: "agent"
    summary: |
      Review 1 verdict=fail. Resolved both blocking findings:
      - F1 (critical) verify_review_seal looked up the hash at metadata
        top-level, but the writer nests it inside
        metadata.review_provenance.canonical_response_sha256. Added
        metadata_canonical_sha256() helper that reads the nested
        location with a top-level fallback for safety; verify_review_seal
        and cmd_complete both delegate to it.
      - F2 (high) cmd_complete's "packet missing but seal exists" check
        used the same wrong-level lookup. Now uses metadata_canonical_sha256.
      Adjusted unit + smoke tests to fixture the seal at the actual
      nested location so future reviews catch the same class of bug.
      Deferred:
      - F4 (medium) compute_canonical_response_sha256 requires the
        current review topology config, so editing .ai/config.yaml
        between scafld review and scafld complete invalidates the seal
        even when nothing was tampered. Real architectural concern but
        rare in practice (topology is stable). 1.7.x patch will hash
        just the packet (topology-independent) — needs migration plan.

      - timestamp: "2026-04-28T04:50:24Z"
        actor: "cli"
        summary: "Spec completed"
phases:
  - id: "phase1"
    name: "verify_review_seal helper + canonical hash recomputation"
    objective: "Add the helpers needed to verify a parsed packet against the metadata hash."
    changes:
      - file: "scafld/review_packet.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - Add `compute_canonical_response_sha256(packet) -> str`:
            calls `normalize_review_packet(packet)` to get the
            `{"canonical": {"packet": ..., "projection": ...}}` shape,
            json.dumps it (sort_keys=True, separators=(",", ":")), and
            returns `hashlib.sha256(payload.encode("utf-8")).hexdigest()`.
            Mirrors review_runner.py:1808,1841.
          - Add `verify_review_seal(metadata, packet) -> (bool, str)`:
              - When `metadata.get("canonical_response_sha256")` is None
                or empty: returns (False, "missing_seal"). Caller treats
                this as a hard-cutover block.
              - Otherwise computes expected via
                `compute_canonical_response_sha256(packet)`. On match
                returns (True, ""); on mismatch returns
                (False, f"hash mismatch: metadata={meta_short}, recomputed={recomputed_short}")
                using 12-char prefixes for readability.
          - Add `read_review_packet_artifact(root, task_id, review_count, *, spec_path=None) -> dict | None`:
              Reads `review_packet_artifact_path(...)` and returns the
              `artifact["packet"]` dict; returns None when the file is
              missing.
      - file: "tests/test_review_packet.py"
        action: "create"
        content_spec: |
          - `test_compute_canonical_response_sha256_deterministic`:
            same packet twice → same hash.
          - `test_compute_canonical_response_sha256_differs_for_different_packets`:
            altered finding text → different hash.
          - `test_verify_review_seal_match`: fresh hash + matching
            packet → (True, "").
          - `test_verify_review_seal_metadata_tampered`: alter metadata
            hash by one char → (False, "hash mismatch: ...").
          - `test_verify_review_seal_packet_tampered`: alter a field on
            the packet (verdict, finding severity) → (False, "hash mismatch: ...").
          - `test_verify_review_seal_missing_seal`: metadata without
            `canonical_response_sha256` → (False, "missing_seal").
          - `test_read_review_packet_artifact_missing_returns_none`:
            no artifact on disk → returns None (covers fresh local /
            manual runner cases).
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:25:38Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac1_2"
        type: "test"
        command: "python3 -m unittest tests.test_review_packet"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:25:38Z"
        result_output: "........... ---------------------------------------------------------------------- Ran 11 tests in 0.002s  OK"
    status: "completed"

  - id: "phase2"
    name: "cmd_complete verifies the seal"
    objective: "complete loads the packet artifact, calls verify_review_seal, blocks on mismatch or missing seal."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/commands/review.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          In `cmd_complete`, after `parse_review_file` returns
          `review_data` and before the existing gate_reason check:
            - When `review_data["exists"]` and the latest round's
              metadata is parsed (review_data.metadata is a dict):
                - Load the packet via
                  `read_review_packet_artifact(root, task_id, review_count)`.
                - When the packet artifact is missing AND the metadata
                  carries `canonical_response_sha256`: that's the
                  external-runner seal mismatch case (artifact gone) —
                  fail with `EC.REVIEW_GATE_BLOCKED`,
                  gate_reason="review packet artifact missing; cannot verify seal".
                - When the packet artifact exists: call
                  `verify_review_seal(metadata, packet)`. On (False,
                  reason): override gate_reason to
                  f"review seal check failed: {reason}" and append the
                  reason to gate_errors. The existing gate-block code
                  path (line 317+) prints the error and exits.
                - When the packet is missing AND metadata lacks the
                  seal: emit gate_reason="review file predates 1.7.0
                  seal; re-run `scafld review {task_id}` to refresh"
                  to surface the hard-cutover signal.
            - Keep the human-override path (`--human-reviewed
              --reason ...`) working: override applies after the seal
              check fails the same way it does for any gate.
      - file: "tests/test_review_packet.py"
        action: "update"
        content_spec: |
          End-to-end-ish (subprocess) tests in this file or a sibling:
            - `test_cmd_complete_rejects_tampered_metadata_hash`: build
              an isolated workspace with a sealed review + packet
              artifact; tamper the metadata hash; subprocess `scafld
              complete` exits non-zero with REVIEW_GATE_BLOCKED.
            - `test_cmd_complete_accepts_matching_seal`: same workspace
              without tampering; complete advances.
            - `test_cmd_complete_rejects_missing_seal`: review file
              with no `canonical_response_sha256` in metadata; complete
              exits non-zero with the hard-cutover guidance message.
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:26:30Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac2_2"
        type: "test"
        command: "python3 -m unittest tests.test_review_packet"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:26:30Z"
        result_output: "........... ---------------------------------------------------------------------- Ran 11 tests in 0.002s  OK"
    status: "completed"

  - id: "phase3"
    name: "Smoke + docs"
    objective: "Smoke-prove tamper rejection end-to-end. Document the seal + hard cutover."
    dependencies:
      - "phase2"
    changes:
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `case_review_complete_rejects_tampered_review_file`: in an
            isolated workspace with a sealed review and packet
            artifact, sed-edit one character in the review markdown's
            metadata `canonical_response_sha256` field; assert
            `scafld complete <task>` exits non-zero and stdout contains
            "review seal check failed".
          - As a control, repeat without the edit and assert complete
            advances cleanly.
      - file: "docs/configuration.md"
        action: "update"
        ownership: "shared"
        content_spec: |
          New "Review seal" subsection under review configuration:
            - Each external-reviewer round writes
              `canonical_response_sha256` to review metadata and stores
              the canonical packet at
              `.ai/runs/<task>/review-packets/review-<n>.json`.
            - `scafld complete` recomputes the hash from the parsed
              packet and refuses on mismatch.
            - Hard cutover: review files written before 1.7.0 (no
              seal) fail complete; re-run `scafld review` to refresh.
    acceptance_criteria:
      - id: "ac3_1"
        type: "boundary"
        command: "bash -n tests/review_gate_smoke.sh"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:28:21Z"
      - id: "ac3_2"
        type: "boundary"
        description: "Tamper-evidence smoke is registered."
        command: "grep -q 'case_review_complete_rejects_tampered_review_file' tests/review_gate_smoke.sh"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:28:21Z"
      - id: "ac3_3"
        type: "boundary"
        description: "Docs cover the seal."
        command: "grep -qiE 'canonical_response_sha256|Review seal' docs/configuration.md"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:28:21Z"
    status: "completed"

