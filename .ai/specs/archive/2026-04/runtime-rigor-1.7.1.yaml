        content_spec: |
          - `_normalize_checked_surfaces`: when `limitations` is null,
            treat as the empty list (existing default for missing).
          - `_normalize_findings`: when `spec_update_suggestions` is
            null, treat as the empty list.
          - `_normalize_spec_update_suggestions`: when `reason`,
            `phase_id`, or `validation_command` is null, treat as the
