  - id: "phase7"
    name: "Liveness diagnostic on watchdog kill"
    objective: "When the watchdog fires, the diagnostic dump names the trigger and shows the last activity instead of empty fields."
    dependencies:
      - "phase6"
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `_write_external_diagnostic` signature gains optional
            `kill_reason`, `time_since_last_byte`,
            `idle_timeout_seconds`, `absolute_max_seconds`,
            `parsed_event_summary` keyword arguments. When
            `timed_out=True`, the dump includes a "## Watchdog
            Kill" section with these values; when
            `timed_out=False`, the section is omitted (existing
            shape preserved for non-timeout failures).
          - The transport (phase 5) hands its kill-state mutable
            back to the call site so diagnostic emission can
            populate the new fields. For idle kills: include the
            tail of stdout (last 16KB, with a "[head trimmed N
            bytes]" marker); for absolute_max kills: same plus a
            note that activity was healthy until the wall ceiling.
          - When provider is claude (phase 6) and the stream was
            NDJSON, include a one-line summary of parsed events:
            "events: 1× system.init, 14× assistant_delta, 3×
            tool_use_start, 2× tool_use_end, 0× result" so the
            operator can see "claude was clearly active but never
            got to result" vs "claude only sent init".
          - Diagnostic file format remains plain text; the new
            section is appended after Stderr and before Workspace
            Status.
      - file: "tests/test_review_runner.py"
        action: "update"
