  - id: "phase4"
    name: "SIGINT handler fix (macOS subprocess termination)"
    objective: "scafld review exits promptly after SIGINT on macOS as well as Linux."
    dependencies:
      - "phase3"
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Investigate first. Likely fix: when the SIGINT handler
          calls `_terminate_provider_process_group(proc_holder[0])`,
          it sends SIGTERM to the process group. macOS may not
          propagate SIGTERM through bash to a `cat`/`sleep`
          subprocess as cleanly as Linux. Fix candidates:
            - Send SIGINT first, then SIGTERM after a short grace,
              then SIGKILL. Mirror `_provider_watchdog`'s escalation.
            - Ensure the subprocess is started with
              `start_new_session=True` (it should be already; verify).
            - If proc.communicate() doesn't return after the kill,
              fall through to `proc.kill()` + `proc.wait(timeout=1)`.
          Pick whichever is the actual root cause; document in
          planning_log.
