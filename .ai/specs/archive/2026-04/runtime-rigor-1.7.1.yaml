  - id: "phase6"
    name: "Claude stream-json output + NDJSON parser"
    objective: "Claude emits NDJSON events incrementally so the activity watchdog can see real liveness signals; parser extracts the structured packet from the final `result` event."
    dependencies:
      - "phase5"
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `_claude_args`: replace `--output-format json` with
            `--output-format stream-json`. Add `--verbose` if the
            current claude CLI requires it for stream-json (verify
            during build by running `claude -p --output-format
            stream-json --verbose --help` or equivalent; document
            the requirement in a code comment if needed).
          - `_extract_claude_stdout` rewrite: the input is now NDJSON
            (one JSON object per line), not a single JSON object.
              - Parse line-by-line; ignore parse failures on stray
                non-JSON lines but keep their text in stdout for
                diagnostics.
              - For each event, look at `type`. Capture:
                  - `system.init` (or whatever the init event type
                    is in current claude stream-json schema):
                    extract `model`, `session_id`.
                  - `result` (final event): extract `result` field
                    (free-text summary) AND `structured_output`
                    (the schema-conformant ReviewPacket when
                    `--json-schema` is attached).
              - Return shape unchanged: (raw_output, model_observed,
                model_source, session_observed). raw_output prefers
                `structured_output` JSON dump (today's logic) over
                free-text `result`.
              - If no `result` event is found (truncated stream,
                kill, etc.), return what we've got: stdout as
                raw_output, model from any system.init seen,
                model_source="" if nothing structured was
                extracted. The downstream
                `_validate_external_result` already handles
                malformed packets.
          - The model-rejection / transient-error signature matching
            (`MODEL_REJECTION_SIGNATURES`,
            `TRANSIENT_PROVIDER_SIGNATURES`) continues to operate on
            stdout+stderr text. NDJSON event payloads include
            stderr-style content for errors; signatures still match
            because they're substring searches on the joined blob.
      - file: "tests/test_review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `test_extract_claude_stdout_ndjson_happy`: input is
            three NDJSON lines (system.init with model+session,
            assistant text delta, result with structured_output);
            parser returns structured_output JSON, observed model,
            "observed" source, observed session.
          - `test_extract_claude_stdout_ndjson_truncated`: only the
            init event present (no result); parser returns stdout
            as raw_output, observed model, empty model_source.
          - `test_extract_claude_stdout_ndjson_with_garbage_lines`:
            stream contains a non-JSON line in the middle; parser
            tolerates it and still finds the result event.
          - `test_extract_claude_stdout_legacy_single_json_still_parses`:
            for safety, if claude regresses to batch JSON, the
            parser must still extract the structured packet (call
            single-blob fallback after ndjson scan finds nothing).
