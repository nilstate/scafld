            invisible downstream.
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          `build_external_review_prompt`: update the demonstrated
          ReviewPacket shape so optional fields appear with their
          empty/null values (`limitations: []`,
          `spec_update_suggestions` shown with all three nullable
          fields populated). Keeps the example consistent with the
          strict-mode schema the provider sees.
      - file: ".ai/config.yaml"
        action: "update"
        ownership: "shared"
        content_spec: |
          Migrate scafld's own review.external timeout knobs from the
          legacy `timeout_seconds: 600` to
          `idle_timeout_seconds: 180` + `absolute_max_seconds: 1800`.
          The activity-aware watchdog catches genuine hangs at the
