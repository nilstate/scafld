    status: "completed"

  - id: "phase5"
    name: "Provider transport refactor (reader-thread architecture + activity-aware watchdog)"
    objective: "Replace the wall-clock-only watchdog with an activity-aware one fed by stdout/stderr reader threads. Provider-agnostic; both claude and codex benefit."
    dependencies:
      - "phase4"
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - Add a `_StreamPump` (or equivalent) helper: per-stream
            reader thread that reads bytes/chunks from `proc.stdout`
            and `proc.stderr`, appends to bounded in-memory buffers,
            and updates a shared `last_activity_at` (`time.monotonic()`
            wallclock pair, mirroring `_watchdog_elapsed`'s dual-clock
            pattern). Buffer cap kept generous (e.g. 8 MiB per
            stream) so legitimate reviews aren't truncated; overflow
            drops the oldest bytes (with a single "[truncated N
            bytes]" marker inserted at the head once).
          - `_run_provider_subprocess` rewritten:
              - Popen with stdout/stderr=PIPE as today.
              - Start two _StreamPump threads (stdout, stderr).
              - Write `stdin_payload` and close proc.stdin.
              - Wait for proc.poll() in a loop with short sleep,
                checking watchdog event each iteration.
              - On exit, join the pump threads (short timeout) and
                pull the collected stdout/stderr text from them.
              - Same exception/cleanup paths as today (on_start
                exception, watchdog kill, finally drain).
            Replaces the `proc.communicate()` call entirely.
          - `_provider_watchdog` rewritten with activity-aware logic:
              - Inputs: proc, idle_timeout, absolute_max, activity
                clock (the shared mutable updated by the pumps).
              - Loop: every WATCHDOG_POLL_SECONDS, check
                `done.is_set()`; check
                `_watchdog_elapsed(start_wall, start_mono) >= absolute_max`
                (kill_reason="absolute_max"); check
                `(now - last_activity_at) >= idle_timeout`
                (kill_reason="idle_timeout"). Trigger on whichever
                fires first.
              - Termination path identical to today: SIGTERM,
                WATCHDOG_GRACE_SECONDS grace, SIGKILL escalation.
              - Returned to the caller via a shared mutable (e.g.
                `kill_state["reason"]` and `kill_state["last_activity_age"]`)
                so phase 7's diagnostic can name the trigger.
          - Config (`_normalize_timeout` and friends):
              - Add `DEFAULT_IDLE_TIMEOUT_SECONDS = 120`,
                `DEFAULT_ABSOLUTE_MAX_SECONDS = 1800`.
              - Read `review.external.idle_timeout_seconds` and
                `review.external.absolute_max_seconds` (positive int
                normalisation, same shape as
                `_normalize_timeout`).
              - If both are absent and the legacy
                `review.external.timeout_seconds` is set, alias it to
                `absolute_max_seconds` and emit a one-time
                deprecation note via `warnings.warn` /
                `_emit_external_warnings` with a stable text the
                smoke can grep for.
              - `ReviewRunnerConfig` and `ResolvedReviewRunner`
                gain `idle_timeout_seconds` and
                `absolute_max_seconds` fields. `timeout_seconds`
                stays for back-compat but becomes a property /
                computed alias of `absolute_max_seconds` at the
                dataclass surface — every internal consumer
                migrates to the new fields.
              - All call sites that pass
                `timeout_seconds=resolved_runner.timeout_seconds`
                to the subprocess runner change to pass both
                `idle_timeout_seconds` and `absolute_max_seconds`.
                Diagnostic body adds both values.
          - SIGINT handler interaction (phase 4 carry): the new
            transport must still escalate SIGTERM→SIGKILL on the
            same grace window when the operator cancels mid-run.
            Reader threads are daemon; they die with the main
            thread. Verify the kill path closes pipes before pump
            thread join.
      - file: "tests/test_review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `test_run_provider_subprocess_streams_stdout`: spawn a
            fake binary that prints "tick\n" every 100 ms for ~5
            iterations then exits 0. Assert the reader thread
            captures all 5 lines and `last_activity_at` advances
            monotonically. No watchdog kill.
          - `test_provider_watchdog_kills_on_idle_timeout`: spawn a
            fake binary that prints once then sleeps. With
            idle_timeout=0.5s and absolute_max=10s, watchdog kills
            within ~1s with kill_reason="idle_timeout".
          - `test_provider_watchdog_kills_on_absolute_max`: spawn a
            fake binary that streams a byte every 50 ms forever.
            With idle_timeout=10s and absolute_max=1s, watchdog
            kills within ~1.5s with kill_reason="absolute_max"
            (proves activity does NOT extend past absolute_max).
          - `test_provider_watchdog_does_not_kill_long_productive_run`:
            fake binary streams a byte every 100 ms for 2s then
            exits 0. With idle_timeout=0.5s and absolute_max=10s,
            no kill (proves activity-based liveness works).
          - `test_legacy_timeout_seconds_aliases_absolute_max`:
            config with only `timeout_seconds: 900` produces a
            ResolvedReviewRunner with absolute_max_seconds=900 and
            idle_timeout_seconds=DEFAULT_IDLE_TIMEOUT_SECONDS. A
            deprecation note is emitted (captured via
            `_emit_external_warnings` or the warnings module).
          - `test_new_config_keys_take_precedence`: config with
            idle_timeout_seconds=60 + absolute_max_seconds=300 +
            legacy timeout_seconds=900 → idle=60, abs_max=300,
            legacy ignored.
    acceptance_criteria:
      - id: "ac5_1"
        type: "compile"
