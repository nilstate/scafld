        command: "sh -c 'grep -q \"class _StreamPump\" scafld/review_runner.py && grep -q \"kill_state\\[.reason.\\] = .idle_timeout.\" scafld/review_runner.py && grep -q \"kill_state\\[.reason.\\] = .absolute_max.\" scafld/review_runner.py'"
