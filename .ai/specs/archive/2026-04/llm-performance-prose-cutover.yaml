phases:
  - id: "phase1"
    name: "Roadmap and mission line"
    objective: "Rewrite the roadmap and README around the locked runtime model."
    changes:
      - file: "plans/llm-performance-cutover.md"
        action: "update"
        content_spec: |
          Replace the broader primitive set with the clean `spec / handoff /
          session` model. Add hard rules, prompt-template hierarchy,
          phase-boundary compaction, and the honest agent-agnostic boundary.
      - file: "README.md"
        action: "update"
        content_spec: |
          Lock the mission line, keep the lifecycle untouched, name the one new
          handoff command, explain report as the quality-lift surface, and name
          the canonical metrics first_attempt_pass_rate and
          recovery_convergence_rate.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Roadmap and README carry the new mission line."
        command: >
          bash -lc 'rg -qi "control plane that gets the most out of your LLM during governed execution" plans/llm-performance-cutover.md README.md'
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:50:34Z"
    status: "pending"

  - id: "phase2"
    name: "Docs and operator model"
    objective: "Propagate the model and attribution rules through docs and operator guidance."
    dependencies: ["phase1"]
    changes:
      - file: "docs/introduction.md"
        action: "update"
        content_spec: |
          Reframe scafld as a brownfield governed-execution control plane rather
          than a one-shot builder.
      - file: "docs/execution.md"
        action: "update"
        content_spec: |
          Explain handoff generation, session writes, phase summaries, and
          report metrics, including `failed_exhausted` and the
          `human_required` boundary at the recovery cap.
      - file: "docs/review.md"
        action: "update"
        content_spec: |
          Explain review handoffs and the fact that review works from spec +
          diff + session summary, not full executor history.
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Describe only the minimal v1 llm block and no extra premature knobs.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document only one new public command, `scafld handoff`, including its
          default selectors and sibling JSON artifact.
      - file: "docs/run-artifacts.md"
        action: "create"
        content_spec: |
          Add a concise contract doc for handoffs, session, diagnostics, schema
          versions, the `.md/.json` pairing, and the `.ai/runs/` layout and
          archive retention rules.
      - file: ".ai/README.md"
        action: "update"
        content_spec: |
          Mirror the new runtime model and explain where operators should look
          for handoffs and session state.
      - file: ".ai/OPERATORS.md"
        action: "update"
        content_spec: |
          Explain when to ask for a handoff, what session means, and how report
          metrics should be interpreted.
    acceptance_criteria:
      - id: "ac2_1"
        type: "documentation"
        description: "Docs and operator docs describe session as the only durable run ledger."
        command: >
          bash -lc 'rg -qi "only durable run ledger" docs .ai/README.md .ai/OPERATORS.md'
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:52:02Z"
    status: "pending"

  - id: "phase3"
    name: "Prompt docs as templates"
    objective: "Subordinate prompt docs to handoff rendering and name harden as a future kind."
    dependencies: ["phase2"]
    changes:
      - file: "AGENTS.md"
        action: "update"
        content_spec: |
          Explain prompt templates, handoff generation, session summaries, and
          the honest boundary that external agents may ignore the handoff.
      - file: "CLAUDE.md"
        action: "update"
        content_spec: |
          Update Claude-specific guidance to use handoffs rather than raw prompt
          files.
      - file: ".ai/prompts/plan.md"
        action: "update"
        content_spec: |
          Describe this file as the planning template rendered into a handoff.
      - file: ".ai/prompts/exec.md"
        action: "update"
        content_spec: |
          Describe this file as the phase template rendered into a handoff.
      - file: ".ai/prompts/review.md"
        action: "update"
        content_spec: |
          Describe this file as the review template rendered into a handoff.
      - file: ".ai/prompts/recovery.md"
        action: "create"
        content_spec: |
          Add the recovery template used for recovery handoffs.
      - file: ".ai/prompts/harden.md"
        action: "update"
        content_spec: |
          Keep harden unchanged in v1, but note that it is the obvious next
          handoff kind.
    acceptance_criteria:
      - id: "ac3_1"
        type: "documentation"
        description: "Prompt files are documented as templates and harden is named as a future handoff kind."
        command: >
          bash -lc 'rg -qi "template" .ai/prompts/plan.md .ai/prompts/exec.md .ai/prompts/review.md && rg -qi "next handoff kind|future handoff kind" .ai/prompts/harden.md'
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:52:36Z"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- README.md plans/llm-performance-cutover.md"
    phase2: "git checkout HEAD -- docs/introduction.md docs/execution.md docs/review.md docs/configuration.md docs/cli-reference.md .ai/README.md .ai/OPERATORS.md && rm -f docs/run-artifacts.md"
    phase3: "git checkout HEAD -- AGENTS.md CLAUDE.md .ai/prompts/plan.md .ai/prompts/exec.md .ai/prompts/review.md .ai/prompts/harden.md && rm -f .ai/prompts/recovery.md"

