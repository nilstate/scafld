phases:
- id: phase1
  name: External runner diagnostics and invocation status
  objective: Persist raw failed/malformed external outputs and record provider attempts
    consistently regardless of outcome.
  changes:
  - file: scafld/review_runner.py
    action: update
    content_spec: Add diagnostics persistence, spawn-time/final status telemetry,
      warning propagation for auto Claude fallback, long Codex output flag, and clearer
      provenance hashes.
  - file: scafld/commands/review.py
    action: update
    content_spec: Record successful external provider invocations after the candidate
      review artifact is accepted, and record invalid artifact failures with diagnostics.
  - file: scafld/review_workflow.py
    action: update
    content_spec: Persist the raw external output plus candidate review artifact when
      downstream artifact parsing rejects a normalized external response.
  - file: scafld/session_store.py
    action: update
    content_spec: Allow provider invocation entries to carry status, timing, exit
      code, timeout, warning, and diagnostic path fields without breaking existing
      report summaries.
  - file: scafld/adapter_runtime.py
    action: update
    content_spec: Record adapter provider invocation status and exit code after
      subprocess completion so adapter telemetry uses the same status vocabulary.
  - file: tests/review_gate_smoke.sh
    action: update
    content_spec: Add focused smoke coverage for nonzero/malformed external output
      diagnostics, session telemetry, and fallback warning visibility.
  acceptance_criteria:
  - id: ac1_1
    type: integration
    description: External-runner observability smoke passes.
    command: bash tests/review_gate_smoke.sh external-runner-observability
    expected: exit code 0
    result: "pass"
    executed_at: "2026-04-26T11:23:10Z"
  status: "completed"
- id: phase2
  name: Honest report language and denominators
  objective: Make human and JSON reporting labels match what parser and telemetry
    data can actually prove.
  changes:
  - file: scafld/review_signal.py
    action: update
    content_spec: Add format-compliant clean-review fields while preserving legacy
      clean_review_with_evidence keys as aliases.
  - file: scafld/commands/reporting.py
    action: update
    content_spec: Print isolation downgrade denominators and use format-compliant
      clean-review wording.
  - file: tests/report_metrics_smoke.sh
    action: update
    content_spec: Prove report denominator output and JSON compatibility for the
      renamed clean-review metric.
  - file: docs/review.md
    action: update
    content_spec: Document failed external diagnostics and clarify that clean-review
      metrics are parser-format compliance signals.
  - file: scripts/real_standard.py
    action: update
    content_spec: Use format-compliant clean-review wording in cohort markdown while
      reading the legacy JSON key as a fallback.
  - file: tests/real_standard_cohort_smoke.sh
    action: update
    content_spec: Assert the cohort markdown label no longer overclaims evidence.
  acceptance_criteria:
  - id: ac2_1
    type: integration
    description: Report metrics smoke passes with denominator and metric wording.
    command: bash tests/report_metrics_smoke.sh
    expected: exit code 0
    result: "pass"
    executed_at: "2026-04-26T11:23:21Z"
