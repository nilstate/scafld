task:
  title: External review observability truth
  summary: 'The external review runner now has a stricter prose contract, but its
    observability still overstates what scafld actually knows: failed provider calls
    can vanish without raw artifacts, challenger invocations are recorded only after
    successful validation, `fallback_policy: warn` does not warn at provider resolution
    time, human reports omit useful denominators, and review-signal labels call
    parser-compliant clean notes "evidence" even though the parser can only verify
    format. Tighten those truth surfaces without changing review verdict semantics.

    '
  size: small
  risk_level: medium
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/review_runner.py
      lines: task-selected
      reason: External runner invocation, diagnostics, warning, and provenance behavior
        live here.
    - path: scafld/commands/review.py
      lines: task-selected
      reason: The review command should record successful provider telemetry only
        after the completed review artifact is accepted.
    - path: scafld/review_workflow.py
      lines: task-selected
      reason: Candidate review artifact validation failures need diagnostics before
        the invalid artifact is discarded.
    - path: scafld/session_store.py
      lines: task-selected
      reason: Provider invocation entries need status/timing fields and report summaries
        need to count them.
    - path: scafld/adapter_runtime.py
      lines: task-selected
      reason: Optional provider adapters should record provider invocation status
        consistently with external review runs.
    - path: scafld/commands/reporting.py
      lines: task-selected
      reason: Human and JSON reports expose isolation downgrade and clean-review signal
        wording.
    - path: scafld/review_signal.py
      lines: task-selected
      reason: The "clean review" metric should describe format compliance, not proven
        evidence.
    - path: scripts/real_standard.py
      lines: task-selected
      reason: Cohort markdown is another human-facing review-signal report and must
        use the same honest clean-review wording.
    - path: tests/review_gate_smoke.sh
      lines: task-selected
      reason: External runner failure and fallback behavior should be covered by smoke
        cases.
    - path: tests/report_metrics_smoke.sh
      lines: task-selected
      reason: Provider telemetry report output should prove denominator and renamed
        clean-review fields.
    - path: tests/real_standard_cohort_smoke.sh
      lines: task-selected
      reason: Cohort smoke should protect the renamed human-facing clean-review label.
    - path: docs/review.md
      lines: task-selected
      reason: Operator-facing docs should state what diagnostics and review-signal
        metrics mean.
    invariants:
    - review_artifact_stays_scafld_owned
    - provider_telemetry_must_not_overclaim
    - failed_external_runs_leave_debuggable_artifacts
    - packaged_cli_is_the_truth_surface
  objectives:
  - Persist raw external-runner output and error context under run diagnostics before
    validating or discarding the response.
  - Record challenger provider invocations for success, nonzero exit, timeout, and
    validation failure with status/timing fields.
  - '`fallback_policy: warn` is visible when provider auto-resolution falls back to
    Claude.'
  - Make report wording and denominators accurately reflect what scafld can verify.
  - Keep review verdict parsing and completion gates unchanged.
  touchpoints:
  - area: external review runner
    description: Failed subprocesses and malformed model responses should be observable
      after the command exits.
  - area: provider telemetry
    description: Session entries should report attempted invocations, not only successful
      completed review rounds.
  - area: reporting language
    description: Human and JSON report labels should not imply stronger evidence than
      parser checks can prove.
  acceptance:
    definition_of_done:
    - id: dod1
      description: Failed, timed-out, and malformed external review attempts leave a
        diagnostics file path in the command error details and session provider telemetry.
      status: pending
    - id: dod2
      description: Provider invocation session entries include status, started_at,
        completed_at, exit_code, timed_out, timeout_seconds, and diagnostic_path.
      status: pending
    - id: dod3
      description: 'Auto fallback to Claude with `fallback_policy: warn` prints a visible
        warning and report output includes downgrade denominators.'
      status: pending
    - id: dod4
      description: Review-signal output uses "format-compliant clean reviews" wording
        while preserving backward-compatible JSON fields for existing consumers.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after telemetry changes.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Review gate smoke proves external-runner diagnostics and fallback
        warning behavior.
      command: bash tests/review_gate_smoke.sh external-runner-observability
      expected: exit code 0
    - id: v3
      type: integration
      description: Report metrics smoke proves provider telemetry denominators and
        clean-review label compatibility.
      command: bash tests/report_metrics_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not implement provider-specific observed model parsing in this slice.
    - Do not loosen the external review prose validator or completion gate.
    - Do not change provider CLI isolation settings.
  notes: 'The feedback about model_observed parsing is valid, but that is a larger
    provider-specific extraction task. This slice keeps model_source honest and makes
    failed attempts visible first.

    '
