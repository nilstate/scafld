task:
  title: Make completed task progress truthful
  summary: 'Fix the progress-truth gap where archived completed specs can still render
    as `[0/x]` in `scafld list` because their per-phase status fields were never finalized.
    The clean model is: completing a spec stamps truthful terminal phase and definition-of-done
    state into the archived document, and read surfaces count older completed archives
    truthfully even before they are rewritten.

    '
  size: small
  risk_level: medium
  context:
    packages:
    - scafld
    - tests
    files_impacted:
    - path: scafld/commands/review.py
      lines: task-selected
      reason: Completion is the right lifecycle boundary to stamp terminal truth into
        the archived spec.
    - path: scafld/spec_parsing.py
      lines: task-selected
      reason: Phase counting currently trusts stale archived phase statuses and drives
        `scafld list`.
    - path: tests/completed_progress_truth_smoke.sh
      lines: all
      reason: A raw CLI smoke should prove both legacy archive projection and new
        completion behavior.
    invariants:
    - completed_specs_must_not_render_partial_progress
    - archived_specs_should_store_terminal_truth
    - packaged_cli_is_the_truth_surface
  objectives:
  - Make `scafld list` show truthful completed progress for both legacy and newly
    completed specs.
  - Stamp completed archives with terminal phase and DoD truth at completion time.
  - Prove the behavior through the raw packaged CLI instead of helper internals.
  touchpoints:
  - area: completion lifecycle
    description: Completing a spec should normalize terminal truth into the archived
      file.
  - area: phase counting
    description: Read surfaces should not trust stale archived phase statuses for
      completed specs.
  - area: archive UX
    description: '"scafld list" should never show "completed ... [0/x]".'
  acceptance:
    definition_of_done:
    - id: dod1
      description: Newly completed specs archive with all phases marked completed
        and all DoD entries marked done.
      status: pending
    - id: dod2
      description: Legacy completed archives with stale phase statuses still render
        truthful completed progress in "scafld list".
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the completion-truth fix.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Raw CLI smoke proves both legacy archive projection and new completion
        stamping are truthful.
      command: bash tests/completed_progress_truth_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not rewrite the whole archive tree just to repair old specs.
    - Do not invent a second progress model separate from phase and DoD state.
  notes: 'The product surface is the problem here. If the main list view says `completed
    [0/1]`, users cannot trust the lifecycle at a glance.

    '
