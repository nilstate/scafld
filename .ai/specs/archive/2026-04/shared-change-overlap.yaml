task:
  title: "Classify shared coordination changes"
  summary: >
    Make active-spec overlap less brittle by letting specs declare intentionally
    shared coordination surfaces without suppressing real ownership conflicts.
    Today `scafld audit` fails any time two active specs declare the same file,
    even when the file is an expected shared plan or workflow surface. This
    round adds an explicit per-change ownership contract, teaches audit to
    distinguish shared coordination files from exclusive conflicts, and exposes
    that classification in the native JSON payload so wrappers do not need to
    infer it.
  size: "small"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "tests"
      - "docs"
      - "schemas"
    invariants:
      - "domain_boundaries"
      - "machine_callers_never_need_terminal_scraping"
      - "json_mode_uses_stable_envelopes"
  objectives:
    - "Allow overlapping active specs only when every overlapping declaration is explicitly shared."
    - "Keep exclusive or mixed-ownership overlaps as hard audit failures."
    - "Return file-level structured audit data so callers can consume overlap state directly."
  touchpoints:
    - area: "cli/scafld"
      description: "Classify declared changes by ownership and report shared versus conflicting overlaps."
    - area: ".ai/schemas/spec.json"
      description: "Add the optional per-change ownership field to the schema."
    - area: "tests/json_contract_smoke.sh"
      description: "Prove file-level audit payloads and shared overlap behavior in the packaged CLI."
    - area: "docs"
      description: "Document ownership semantics and audit output categories."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Specs can mark a declared change as shared without weakening exclusive ownership by default."
        status: "done"
      - id: "dod2"
        description: "Audit distinguishes shared active overlap from conflicting active overlap."
        status: "done"
      - id: "dod3"
        description: "audit --json exposes file-level statuses and shared overlap details."
        status: "done"
    validation:
      - id: "v1"
        type: "integration"
        description: "JSON contract smoke covers shared and conflicting overlap states."
        command: "./tests/json_contract_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240

