phases:
  - id: "phase1"
    name: "Teach Audit Shared Ownership"
    objective: "Add explicit shared ownership semantics for declared changes and surface them in audit output."
    changes:
      - file: "cli/scafld"
        action: "update"
        content_spec: |
          Parse declared changes with optional ownership metadata, classify shared
          versus conflicting active overlap, and include file-level audit payloads
          in both human and JSON output.
      - file: ".ai/schemas/spec.json"
        action: "update"
        content_spec: |
          Add an optional change ownership field so specs can explicitly declare
          shared coordination surfaces.
      - file: "docs/spec-schema.md"
        action: "update"
        content_spec: |
          Document the new change ownership field and when to use shared overlap.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document the new audit output categories and file-level JSON payload.
      - file: "docs/scope-auditing.md"
        action: "update"
        content_spec: |
          Explain how shared coordination files differ from conflicting overlap.
      - file: "tests/json_contract_smoke.sh"
        action: "update"
        content_spec: |
          Add overlap fixtures that prove shared overlap passes and exclusive or
          mixed overlap still fail with structured file-level audit records.
    acceptance_criteria:
