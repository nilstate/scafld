      command: python3 -c "import json; s=json.load(open('.ai/schemas/spec.json')); req=set(s.get('required',[]));
        assert not (req & {'harden_status','harden_rounds'}), 'harden fields must be optional'"
      expected: exit code 0
    - id: v4
      type: boundary
      description: cmd_approve does not reference harden_status (no gate was added).
      command: python3 -c "import re; src=open('cli/scafld').read(); m=re.search(r'def cmd_approve\(.*?(?=\ndef
        )', src, re.DOTALL); assert m and 'harden' not in m.group(0).lower(), 'cmd_approve must not reference
        harden'"
      expected: exit code 0
    - id: v5
      type: documentation
      description: All nine doc surfaces mention harden.
      command: grep -l harden README.md AGENTS.md .ai/README.md .ai/OPERATORS.md docs/cli-reference.md
        docs/lifecycle.md docs/planning.md docs/spec-schema.md ../0state/src/content/code/scafld.md |
        wc -l
      expected: '9'
  constraints:
    approvals_required:
    - public_api_stable
    non_goals:
    - Do NOT add an approval gate that consults `harden_status`.
    - Do NOT add a `--human-reviewed --reason` override to `scafld approve`.
    - Do NOT add an `enabled` flag, `mandatory_for_risk` config, or any other on/off switch for harden.
    - Do NOT add a `harden_required` field on the spec.
    - Do NOT add `--mark-skipped` or any in-prompt skip keyword; if the operator does not want to harden,
      they simply do not run the command.
    - Do NOT migrate existing specs (drafts/, approved/, active/, archive/, examples/); the new fields
      are optional.
    - Do NOT add a `hardened` lifecycle directory; the spec stays in `drafts/`.
    - Do NOT scaffold a separate prompt file (the way `cmd_review` writes a review prompt to disk); the
      harden prompt is printed to stdout, mirroring plan-mode behaviour.
    - Do NOT introduce competitor names or marketing language in any doc surface.
  info_sources:
  - .ai/prompts/plan.md
  - .ai/prompts/review.md
  - .ai/specs/examples/add-error-codes.yaml
  - .ai/specs/archive/2026-03/configurable-review-pipeline.yaml
  - /home/kam/dev/0state/src/content/code/scafld.md
  notes: 'Naming: chose `harden` over `grill`, `interrogate`, or `vet` because it matches scafld''s clinical
    voice (plan, exec, audit, review, approve) and describes the output (a hardened spec) rather than
    the act. Hard cutover scope: applies to implementation cleanliness only. The phase is OPTIONAL and
    operator-driven; `scafld approve` is unchanged. The grounding rules are the load-bearing part of the
    feature; without them the phase produces hallucinated confidence rather than verified clarity.

    '
