harden_status: not_run
task:
  title: Add optional harden phase between draft and approval
  summary: 'Introduce an optional `harden` phase that interrogates a draft spec until it is in top condition.
    The CLI command `scafld harden <task-id>` scaffolds a grounded interrogation prompt and records each
    round inside the spec under `harden_rounds`. The phase is operator-driven: `scafld approve` does not
    gate on harden status, and there is no enable/disable flag - the command always exists and is invoked
    when the operator wants to stress-test a draft. Hard cutover applies to the implementation, not the
    workflow: no opt-in config, no backwards-compat shims, no per-spec required flag, and no migration
    of in-tree specs (the schema fields are optional). Anti-hallucination is the load-bearing design:
    every question must be grounded in an explicit gap in the spec, a verified codebase symbol, or a precedent
    from an archived spec, and every recommended answer must cite its source.

    '
  size: medium
  risk_level: low
  context:
    packages:
    - cli
    - .ai
    - docs
    - tests
    files_impacted:
    - path: cli/scafld
      lines: cmd_new template literal (963-1023), new cmd_harden after cmd_validate (~2009), cmd_report
        (2550), main() subparser registration (~2683)
      reason: 'Adds the `cmd_harden` function, its subparser, a one-line addition to the spec template
        literal so newly created drafts carry `harden_status: "not_run"`, and a Harden adoption section
        in `cmd_report`.

        '
    - path: .ai/schemas/spec.json
      lines: properties section
      reason: 'Adds two top-level OPTIONAL properties: `harden_status` (enum) and `harden_rounds` (array
        of round objects). Neither field is added to the schema''s `required` list.

        '
    - path: .ai/prompts/harden.md
      lines: all (new file)
      reason: 'New prompt defining HARDEN MODE with the three-pattern grounding contract that prevents
        hallucinated questions.

        '
    - path: .ai/prompts/plan.md
      lines: closing/next-steps section
      reason: 'Single-sentence addition pointing to `scafld harden` as the optional next step after planning.

        '
    - path: .ai/config.yaml
      lines: top level, alongside `modes:` and `validation:`
      reason: 'Adds a non-gating `harden:` block with two knobs: `max_questions_per_round` and `grounding_required`.
        No `enabled` field, no risk-gating, no approval-gate flags.

        '
    - path: .ai/README.md
      lines: workflow section
      reason: Framework docs describe the optional harden phase.
    - path: .ai/OPERATORS.md
      lines: workflow section
      reason: Operator cheat sheet entry for `scafld harden`.
    - path: README.md
      lines: lifecycle ASCII diagram + CLI list + 'What It Actually Does' bullets
      reason: 'Public README shows the optional harden step in the lifecycle, adds the CLI entry, and
        adds a one-line capability bullet.

        '
    - path: AGENTS.md
      lines: modes section
      reason: 'Agents need a HARDEN MODE description with the same grounding rules as the prompt file,
        plus guidance on when to suggest running it (high risk, ambiguous specs).

        '
    - path: docs/cli-reference.md
      lines: after `scafld validate`, before `scafld approve`
      reason: New `scafld harden` reference entry.
    - path: docs/lifecycle.md
      lines: states table + transitions diagram + new 'Harden status' subsection
      reason: 'Document `harden_status` as a parallel field to the lifecycle status, explicitly note that
        approve does NOT gate on it, and show the round-loop semantics.

        '
    - path: docs/planning.md
      lines: end of file
      reason: Add a `Hardening` subsection pointing to the harden docs.
    - path: docs/spec-schema.md
      lines: all
      reason: Document the two new optional fields with one minimal example.
    - path: tests/harden_smoke.sh
      lines: all (new file)
      reason: 'Smoke test covering: spec template carries `harden_status: not_run`, `scafld harden` updates
        the spec to `in_progress` and appends a round, `--mark-passed` refuses on empty rounds and succeeds
        otherwise, re-run on a passed spec resets to `in_progress` and appends, `scafld approve` works
        regardless of harden status, and a spec missing both harden fields still validates and approves
        cleanly.

        '
    - path: .github/workflows/review-gate-smoke.yml
      lines: jobs.review-gate-smoke.steps (after the existing matrix step)
      reason: 'Wire the new smoke test as an additional step. Do not rename the workflow or job; the harden
        smoke is an extra step in the existing job.

        '
    - path: ../0state/src/content/code/scafld.md
      lines: lifecycle diagram + CLI list + new short subsection between Planning and Validation
      reason: 'The public 0state product page is the canonical narrative description of scafld. It must
        reference harden naturally without breaking the existing voice. Cross-repo edit (separate git
        repo); commit/PR lands separately in the 0state repo AFTER the scafld changes merge.

        '
    invariants:
    - no_legacy_code
    - public_api_stable
    - config_from_env
    related_docs:
    - README.md
    - AGENTS.md
    - .ai/config.yaml
    - .ai/prompts/plan.md
