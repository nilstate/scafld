- id: phase6
  name: Smoke test and CI wiring
  objective: 'Add a smoke test that exercises the harden command, the prompt scaffolding, the round semantics,
    and confirms approve is unchanged. Wire it into the existing CI workflow.

    '
  dependencies:
  - phase5
  changes:
  - file: tests/harden_smoke.sh
    action: create
    lines: all
    content_spec: "Bash smoke test using `mktemp -d` for an isolated workspace\nand `trap` to clean up\
      \ on exit. Mirror the structure of\n`tests/review_gate_smoke.sh` for shell idioms (set -e, color\n\
      helpers, exit codes). Test cases (each must pass):\n\n1. `scafld init` succeeds in the temp workspace.\n\
      2. `scafld new t1 -s small -r low` creates a spec containing\n   the literal `harden_status: \"\
      not_run\"`.\n3. `scafld harden t1` exits 0, prints `HARDEN MODE` to stdout,\n   and updates the\
      \ spec to `harden_status: in_progress` with\n   exactly one round in `harden_rounds`.\n4. `scafld\
      \ harden t1 --mark-passed` exits 0 and sets\n   `harden_status: passed`; the latest round has\n\
      \   `outcome: passed` and an `ended_at` timestamp.\n5. `scafld harden t1` again resets to `in_progress`\
      \ and\n   appends a second round; prior rounds are preserved.\n6. `scafld approve t1` exits 0 (approve\
      \ does not gate on\n   harden_status).\n7. Create a second spec, manually remove the `harden_status`\n\
      \   field, run `scafld approve t2`; exits 0 (legacy shape).\n8. Create a third spec, run `scafld\
      \ harden t3 --mark-passed`\n   without first running a round; must exit non-zero.\n9. `grep -q harden_status`\
      \ against the cmd_approve function\n   in cli/scafld must return non-zero (no gate added).\n\nOn\
      \ any failure, print which case failed and exit 1.\n"
  - file: .github/workflows/review-gate-smoke.yml
    action: update
    lines: jobs.review-gate-smoke.steps (insert after the existing 'Run review gate smoke matrix' step)
    content_spec: "Insert two new steps:\n  - name: Validate harden smoke harness syntax\n    run: bash\
      \ -n tests/harden_smoke.sh\n  - name: Run harden smoke\n    run: ./tests/harden_smoke.sh\nDo NOT\
      \ rename the workflow, the job, or the existing steps.\n"
  acceptance_criteria:
  - id: ac6_1
    type: test
    description: Harden smoke passes.
    command: bash tests/harden_smoke.sh
    expected: exit code 0
    validation: automated
  - id: ac6_2
    type: test
    description: Existing review gate smoke still passes (no regressions).
    command: bash tests/review_gate_smoke.sh all
    expected: exit code 0
    validation: automated
  - id: ac6_3
    type: boundary
