- id: phase2
  name: HARDEN MODE prompt and CLI command
  objective: 'Implement `scafld harden <task-id>` with `--mark-passed`, the HARDEN MODE prompt with the
    grounding contract, and a closing pointer in the planning prompt.

    '
  dependencies:
  - phase1
  changes:
  - file: .ai/prompts/harden.md
    action: create
    lines: all
    content_spec: "New prompt declaring HARDEN MODE. Required sections:\n\n- **Mission**: interrogate\
      \ the spec relentlessly until the\n  operator and agent reach shared understanding. Walk down\n\
      \  each branch of the design tree, resolving dependencies\n  between decisions one-by-one - upstream\
      \ choices first, so\n  downstream questions are not wasted on premises that may\n  shift. Stop when\
      \ the operator says so or the agent runs\n  out of grounded questions.\n\n- **Grounding contract**\
      \ (load-bearing - state in bold):\n  every question MUST carry a `grounded_in` value matching\n\
      \  ONE of these three patterns exactly:\n    * `spec_gap:<field>` - a TODO, ?, empty array, vague\n\
      \      clause, or contradiction in the spec at the named field.\n    * `code:<file>:<line>` - a\
      \ symbol or location verified by\n      Read or Grep in the current session before the question\n\
      \      is emitted.\n    * `archive:<task_id>` - a precedent from\n      `.ai/specs/archive/` that\
      \ bears on the current decision.\n  Forbidden: questions about behaviour the spec already\n  answers,\
      \ citations to files not verified in this session,\n  or recommended answers without a citation.\n\
      \n- **Question loop**: one question at a time. Each question\n  includes a recommended answer (with\
      \ its own grounded_in\n  citation) and an `if_unanswered` default so the loop can\n  terminate on\
      \ a single side. Cap at `max_questions_per_round`\n  from `.ai/config.yaml`.\n\n- **Termination**:\
      \ operator types `done` or `stop`, or the\n  agent runs out of grounded questions. There is no in-prompt\n\
      \  `skip`; the operator can simply not run `scafld harden` if\n  they do not want to harden the\
      \ spec.\n\n- **Output**: append a new entry to the spec's `harden_rounds`\n  using the schema in\
      \ `.ai/schemas/spec.json`. Set\n  `harden_status: in_progress` while the loop runs. The\n  operator\
      \ finalises by running `scafld harden <task-id>\n  --mark-passed` once the round is satisfactory.\n\
      \nDo NOT instruct the agent to call `scafld approve` or to\ntreat harden as a gate; it is operator-driven\
      \ and optional.\n"
  - file: .ai/prompts/plan.md
    action: update
    lines: closing or 'next steps' section near the end of the file
    content_spec: 'Append a single sentence: "When planning is complete, the operator may run `scafld
      harden <task-id>` to interrogate the draft against grounded questions before approval. This step
      is optional and can be skipped by approving directly."

      '
  - file: cli/scafld
    action: update
    lines: new cmd_harden function inserted after cmd_validate (~line 2009); subparser registration in
      main() near the other p_* declarations
    content_spec: "Add `cmd_harden(args)`:\n- Loads the spec via `require_spec`.\n- Refuses with a clear\
      \ error if the spec is not in `drafts/`.\n- Reads `.ai/prompts/harden.md` and prints it verbatim\
      \ with\n  the spec path appended at the bottom (mirroring how plan\n  mode surfaces the spec context).\
      \ Does NOT write a separate\n  prompt file.\n- Loads the spec YAML, ensures `harden_rounds` is a\
      \ list\n  (creates empty list if missing), appends a new round dict\n  with: `round` = len(existing)\
      \ + 1, `started_at` = now_iso(),\n  `questions: []`, `outcome: in_progress`. Sets top-level\n  `harden_status:\
      \ \"in_progress\"`. Writes the spec back.\n  Re-running on a `passed` spec resets `harden_status`\
      \ to\n  `in_progress` and appends a new round; prior rounds are\n  preserved.\n- When `args.mark_passed`\
      \ is true: do NOT print the prompt or\n  append a round. Instead: refuse with a clear error if\n\
      \  `harden_rounds` is empty (must run the loop at least once\n  before marking passed). Otherwise\
      \ set `harden_status:\n  \"passed\"`, set the latest round's `ended_at` and `outcome:\n  \"passed\"\
      `, write back.\nSubparser `p_harden = sub.add_parser(\"harden\", help=\"Run\nHARDEN MODE prompt\
      \ or mark a hardening round passed\")`. Add\npositional `task_id` and a single flag `--mark-passed`\n\
      (action=\"store_true\"). Wire into the dispatcher dict alongside\nthe other commands.\n"
  - file: cli/scafld
    action: update
    lines: cmd_report (line ~2550)
    content_spec: "Extend the report output with a `Harden adoption` section\nAFTER the existing review/self-eval\
      \ sections. Show:\n- Total specs scanned.\n- Count by `harden_status`: not_run / in_progress / passed\
      \ /\n  absent (treat missing field as `absent`).\n- Count of specs with at least one entry in `harden_rounds`.\n\
      Do NOT colour absent/not_run as warnings; non-usage is\nlegitimate (the phase is optional).\n"
  acceptance_criteria:
  - id: ac2_1
    type: test
    description: '`scafld harden` on a draft prints HARDEN MODE and updates spec to in_progress with one
      round.'
    command: scafld new harden-fixture -t 'fixture' -s small -r low > /dev/null && scafld harden harden-fixture
      | grep -q 'HARDEN MODE' && python3 -c "import yaml; d=yaml.safe_load(open('.ai/specs/drafts/harden-fixture.yaml'));
      assert d['harden_status']=='in_progress' and len(d['harden_rounds'])==1"
    expected: exit code 0
    validation: automated
  - id: ac2_2
    type: boundary
    description: '`--mark-passed` refuses on empty harden_rounds.'
    command: scafld new empty-fixture -t 'er' -s small -r low > /dev/null && (scafld harden empty-fixture
      --mark-passed; test $? -ne 0) && rm .ai/specs/drafts/empty-fixture.yaml
    expected: exit code 0
    validation: automated
  - id: ac2_3
    type: test
    description: '`--mark-passed` succeeds after a round exists; harden_status becomes passed.'
    command: scafld harden harden-fixture --mark-passed && python3 -c "import yaml; d=yaml.safe_load(open('.ai/specs/drafts/harden-fixture.yaml'));
      assert d['harden_status']=='passed' and d['harden_rounds'][0]['outcome']=='passed'"
    expected: exit code 0
    validation: automated
  - id: ac2_4
    type: test
    description: Re-running harden on a passed spec resets to in_progress and appends a round.
    command: scafld harden harden-fixture > /dev/null && python3 -c "import yaml; d=yaml.safe_load(open('.ai/specs/drafts/harden-fixture.yaml'));
      assert d['harden_status']=='in_progress' and len(d['harden_rounds'])==2" && rm .ai/specs/drafts/harden-fixture.yaml
    expected: exit code 0
    validation: automated
  - id: ac2_5
    type: boundary
    description: Harden prompt enumerates all three grounding patterns.
    command: test $(grep -E 'spec_gap:|code:|archive:' .ai/prompts/harden.md | wc -l) -ge 3
    expected: exit code 0
    validation: automated
  - id: ac2_6
    type: boundary
    description: Plan prompt mentions the optional harden step.
    command: grep -q 'scafld harden' .ai/prompts/plan.md
    expected: exit code 0
    validation: automated
  - id: ac2_7
    type: test
    description: '`scafld report` output contains a Harden adoption section.'
    command: scafld report | grep -qi 'harden'
    expected: exit code 0
    validation: automated
  status: completed
- id: phase3
  name: Anti-drift verification on cmd_approve
  objective: 'Confirm cmd_approve was not modified to consult harden_status. This is a no-change phase
    whose entire purpose is enforcing the non-goal that no approval gate was added.

    '
  dependencies:
  - phase2
  changes:
  - file: cli/scafld
    action: update
    lines: cmd_approve (line ~1152)
    content_spec: 'NO CHANGES. cmd_approve must remain identical to its state

      before this spec executed. Do NOT add a harden_status check.

      Do NOT add a `--human-reviewed` flag. Do NOT add a `--reason`

      flag. This phase exists explicitly to prevent scope drift back

      toward a gate.

      '
  acceptance_criteria:
  - id: ac3_1
    type: boundary
    description: cmd_approve does not reference harden_status.
    command: python3 -c "import re; src=open('cli/scafld').read(); m=re.search(r'def cmd_approve\(.*?(?=\ndef
      )', src, re.DOTALL); assert m and 'harden' not in m.group(0).lower()"
    expected: exit code 0
    validation: automated
  - id: ac3_2
    type: boundary
    description: p_approve subparser does not declare --human-reviewed or --reason.
    command: python3 -c "import re; src=open('cli/scafld').read(); m=re.search(r'p_approve\s*=.*?(?=\n\s*p_)',
      src, re.DOTALL); assert m and 'human-reviewed' not in m.group(0) and 'human_reviewed' not in m.group(0)"
    expected: exit code 0
    validation: automated
  - id: ac3_3
    type: test
    description: Approve succeeds on a draft regardless of harden status.
    command: scafld new gate-fixture -t 'gate' -s small -r low > /dev/null && scafld approve gate-fixture
      && rm .ai/specs/approved/gate-fixture.yaml
    expected: exit code 0
    validation: automated
  - id: ac3_4
    type: test
    description: Approve succeeds even when harden_status is missing entirely (legacy spec shape).
    command: scafld new legacy-fixture -t 'lg' -s small -r low > /dev/null && python3 -c "import yaml;
      p='.ai/specs/drafts/legacy-fixture.yaml'; d=yaml.safe_load(open(p)); d.pop('harden_status', None);
      yaml.safe_dump(d, open(p,'w'))" && scafld approve legacy-fixture && rm .ai/specs/approved/legacy-fixture.yaml
    expected: exit code 0
    validation: automated
  status: completed
