  name: Schema, config, and template
  objective: 'Add two optional schema fields, the non-gating config block, and one line in the spec template
    emitted by `scafld new`.

    '
  changes:
  - file: .ai/schemas/spec.json
    action: update
    lines: properties section
    content_spec: "Add two top-level OPTIONAL properties (do NOT add to the\nschema's `required` array):\n\
      \n- `harden_status`: object\n    type: string\n    enum: [\"not_run\", \"in_progress\", \"passed\"\
      ]\n    description: \"Optional. Tracks whether the operator has run\n    `scafld harden` against\
      \ this spec. Independent of the\n    lifecycle `status` field; not consulted by `scafld approve`.\"\
      \n\n- `harden_rounds`: object\n    type: array\n    description: \"Optional. One entry per `scafld\
      \ harden`\n    invocation.\"\n    items:\n      type: object\n      required: [\"round\", \"started_at\"\
      , \"questions\"]\n      properties:\n        round: { type: integer, minimum: 1 }\n        started_at:\
      \ { type: string, format: date-time }\n        ended_at: { type: string, format: date-time }\n \
      \       outcome: { type: string, enum: [\"passed\", \"abandoned\"] }\n        questions:\n     \
