  objectives:
  - Operators can run `scafld harden <task-id>` against any draft spec to interrogate it before approval,
    with no enable flag and no per-spec opt-in.
  - Every question produced by HARDEN MODE is grounded in either an explicit spec gap, a verified codebase
    symbol, or an archived spec precedent.
  - Every recommended answer cites its source (spec_gap:<field>, code:<file>:<line>, or archive:<task_id>)
    and never relies on prior knowledge.
  - Spec schema gains two OPTIONAL fields (`harden_status`, `harden_rounds`); existing specs validate
    unchanged with neither field present.
  - '`scafld approve` behaviour is unchanged: it does not gate on `harden_status`.'
  - '`scafld new` template emits `harden_status: "not_run"` so the option is discoverable on every freshly
    created spec.'
  - '`scafld report` shows harden adoption (counts by status, percentage of specs with rounds) without
    flagging non-usage as a problem.'
  - Public docs (README, AGENTS.md, .ai/README.md, .ai/OPERATORS.md, docs/, and the 0state scafld page)
    describe the phase consistently as optional and operator-driven.
  scope:
    in_scope:
    - New `scafld harden` CLI command with `--mark-passed` flag.
    - 'Two optional schema fields: `harden_status`, `harden_rounds`.'
    - '`scafld new` template update to include `harden_status: "not_run"`.'
    - Harden prompt with anti-hallucination grounding rules.
    - Non-gating `harden:` config block (max_questions_per_round, grounding_required).
    - '`scafld report` adoption section.'
    - Documentation across scafld and the 0state product page.
    - Smoke test wired into CI.
    out_of_scope:
    - Approval-gate integration; `scafld approve` is unchanged.
    - '`--human-reviewed` override on approve; no gate exists, so no override is needed.'
    - Per-spec `harden_required` flag.
    - Config knobs to enable/disable the command or auto-gate by risk.
    - Migration of in-tree specs; new schema fields are optional.
    - Changes to review pipeline, exec mode, or audit.
    - A new `hardened` lifecycle directory; the spec stays in `drafts/`.
    - Harden round merging across specs.
    - A non-CLI UI for harden questions.
  dependencies:
  - No new external dependencies.
  - Reuses existing schema validator, spec loader, and config loader.
  assumptions:
  - Hard cutover refers to implementation cleanliness (no enable flag, no opt-in shims), NOT to making
    the phase mandatory.
  - 'Template-emitted `harden_status: not_run` is informational only; specs without the field still validate
    and approve.'
  - Operators decide per-spec when to run harden; agents may suggest it for high-risk or ambiguous drafts
    but do not require it.
  - Cross-repo edit to the 0state page is acceptable in this spec because it is the canonical public description
    of scafld; it lands as a separate commit/PR in the 0state repo after the scafld changes merge.
  touchpoints:
  - area: cli/scafld
    description: cmd_harden, p_harden, template literal update, cmd_report addition.
    owners:
    - scafld-core
  - area: .ai/schemas/spec.json
    description: Two optional schema fields.
    owners:
    - scafld-core
  - area: .ai/prompts/harden.md
    description: HARDEN MODE prompt with grounding contract.
    owners:
    - scafld-core
  - area: docs/
    description: CLI reference, lifecycle, planning, spec-schema.
  - area: 0state/src/content/code/scafld.md
    description: Public product-page narrative.
  risks:
  - description: 'Anti-hallucination depends on prompt discipline; an agent may still invent a citation
      if the prompt is not strict enough.

      '
    impact: medium
    mitigation: 'Prompt mandates a `grounded_in` field with one of three exact verifiable forms (spec_gap:<field>,
      code:<file>:<line>, archive:<task_id>). Smoke test asserts the prompt enumerates all three patterns.
      AGENTS.md repeats the contract so it is visible outside the prompt.

      '
  - description: 'Cross-repo edit to the 0state page risks rotting if scafld changes again before 0state
      is republished.

      '
    impact: low
    mitigation: 'Keep the 0state edit narrative-level (not API-level) so it does not need to track minor
      CLI flag changes.

      '
  - description: 'Agent may attempt to commit the 0state edit alongside the scafld commit, producing a
      malformed cross-repo commit.

      '
    impact: medium
    mitigation: 'Phase 5 explicitly instructs the agent to commit the 0state change as a separate commit/PR
      in the 0state repo. The 0state edit lands last, after the scafld changes are merged.

      '
  - description: 'Scope drift: agent could re-introduce a gate or enable flag.

      '
    impact: medium
    mitigation: 'constraints.non_goals enumerates each forbidden change explicitly. Acceptance criterion
      ac3_3 asserts cmd_approve has not been modified to read harden_status.

      '
  acceptance:
    validation_profile: standard
    definition_of_done:
