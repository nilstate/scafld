  - phase3
  changes:
  - file: docs/cli-reference.md
    action: update
    lines: after `scafld validate`, before `scafld approve`
    content_spec: 'New `## scafld harden` section. One paragraph covering: what

      the command does (scaffolds HARDEN MODE prompt, records a

      round in harden_rounds), the `--mark-passed` flag, and the

      grounding contract (one sentence summary). Add an explicit

      line: "Optional. `scafld approve` does not require harden to

      have run."

      '
  - file: docs/lifecycle.md
    action: update
    lines: states table + transitions diagram + new 'Harden status' subsection at end
    content_spec: 'Do NOT add harden to the lifecycle status enum (it is a

      parallel field, not a status). Add a new subsection at the

      end titled "Harden status" describing the harden_status field

      (enum, default absent, lifecycle-independent), the round-loop

      semantics, and an explicit one-line note: "approve does not

      consult harden_status."

      '
  - file: docs/planning.md
    action: update
    lines: end of file
