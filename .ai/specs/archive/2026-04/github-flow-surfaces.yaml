task:
  title: "Polish GitHub flow surfaces"
  summary: >
    Make the git/PR/issue projection story legible to both humans and wrappers.
    Today `docs/github-flow.md` is still too thin to prove the intended
    engineering-system workflow, and human `scafld status` omits the origin
    source metadata that explains what branch binding is actually tied to. This
    round should expand the docs into a real issue-to-PR walkthrough, surface
    source/binding context in the terminal status view, and prove the new human
    output in the existing git-origin smoke.
  size: "small"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "docs"
      - "tests"
    invariants:
      - "domain_boundaries"
      - "human_output_remains_default"
      - "spec_remains_the_single_source_of_truth"
      - "wrappers_stay_thin"
  objectives:
    - "Show source and binding facts in human `scafld status` when origin metadata exists."
    - "Expand the GitHub flow documentation into a concrete issue-to-branch-to-review-to-PR walkthrough."
    - "Prove the human status surface in smoke coverage so the docs match real operator output."
  touchpoints:
    - area: "cli/scafld"
      description: "Render source, binding mode, and upstream context in the human status output."
    - area: "docs/github-flow.md"
      description: "Document the complete GitHub-facing flow with end-to-end examples."
    - area: "docs/cli-reference.md"
      description: "Document the richer human status surface."
    - area: "tests/git_origin_smoke.sh"
      description: "Assert the new human status lines in a real git workspace."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Human `scafld status` shows origin source and binding context when present."
        status: "done"
      - id: "dod2"
        description: "`docs/github-flow.md` contains a concrete issue-to-PR walkthrough rather than a thin command list."
        status: "done"
      - id: "dod3"
        description: "Smoke coverage proves the human status surface in a git-bound task fixture."
        status: "done"
    validation:
      - id: "v1"
        type: "integration"
        description: "Git origin smoke passes with the richer human status surface."
        command: "./tests/git_origin_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v2"
        type: "documentation"
        description: "GitHub flow doc includes the end-to-end workflow sections."
        command: "grep -En -- \"Issue -> Branch -> Review -> PR|scafld status|scafld checks|scafld pr-body\" docs/github-flow.md"
        expected: "exit code 0"
        timeout_seconds: 60

