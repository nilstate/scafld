        action: "update"
        content_spec: |
          Extend human `scafld status` to render origin source facts and richer
          binding context without changing the machine-facing JSON contract.
      - file: "docs/github-flow.md"
        action: "update"
        content_spec: |
          Replace the thin overview with an end-to-end issue-to-branch-to-review
          to summary/checks/pr-body walkthrough grounded in the native scafld
          commands.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
