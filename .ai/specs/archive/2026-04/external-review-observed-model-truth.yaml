phases:
- id: phase1
  name: Runner provenance and diagnostics
  objective: Make the external runner emit warnings before execution, extract observed
    model ids where provider output allows, attach prompt fingerprints to diagnostics,
    and prune duplicate response hash provenance.
  changes:
  - file: scafld/review_runner.py
    action: update
    content_spec: Add provider-output model extraction for Claude JSON envelopes and
      Codex output hints/stderr where available, switch Claude to a parseable output
      mode without loosening the review prose contract, return pre-run warnings, include
      prompt sha256/context in diagnostics, and remove the duplicate `response_sha256`
      alias from provenance.
  - file: scafld/commands/review.py
    action: update
    content_spec: Print external runner warnings before subprocess execution and
      record successful telemetry from runner-owned provenance without hiding artifact
      validation failures.
  - file: scafld/review_workflow.py
    action: update
    content_spec: Include prompt sha256 data in downstream invalid-artifact diagnostics.
  - file: tests/review_gate_smoke.sh
    action: update
    content_spec: Add focused smoke cases for Claude JSON model extraction, Codex
      model extraction hints, pre-run fallback warnings, prompt fingerprints in diagnostics,
      and absence of the duplicate response hash alias.
  acceptance_criteria:
  - id: ac1_1
    type: integration
    description: External-runner observed-model smoke passes.
    command: bash tests/review_gate_smoke.sh external-runner-observed-model-truth
    expected: exit code 0
    result: "pass"
    executed_at: "2026-04-26T12:34:19Z"
  status: "completed"
- id: phase2
  name: Session validation and reporting
  objective: Normalize provider telemetry values before aggregation and show weaker
    isolation separately from auto fallback downgrade count.
  changes:
  - file: scafld/session_store.py
    action: update
    content_spec: Validate provider invocation status and confidence against explicit
      vocabularies while preserving existing default behavior.
  - file: scafld/adapter_runtime.py
    action: update
    content_spec: Route adapter provider invocation statuses through the same validated
      vocabulary and keep requested-only model semantics honest.
  - file: scafld/commands/reporting.py
    action: update
    content_spec: Aggregate weaker isolation counts separately from auto fallback
      downgrades and keep provider status reporting stable.
  - file: tests/report_metrics_smoke.sh
    action: update
    content_spec: Assert validated status behavior and the new weaker-isolation denominator
      in human and JSON report output.
  - file: docs/review.md
    action: update
    content_spec: Document observed-model provenance, prompt hashes in diagnostics,
      and isolation/downgrade report semantics.
