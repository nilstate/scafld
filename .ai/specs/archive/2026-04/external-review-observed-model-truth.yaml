task:
  title: External review observed model truth
  summary: 'External review observability now records every success and failure, but
    its highest-value attribution fields remain mostly theoretical. `model_observed`
    is still empty, fallback warnings arrive after a successful downgraded run has
    already spent provider work, diagnostics preserve outputs without tying them to
    the exact prompt, provider invocation status is an unconstrained string, and
    provenance keeps a duplicate response hash alias.

    This task closes those truth gaps without weakening the review gate: keep external
    prose validation strict, keep failed-run diagnostics, and make the telemetry say
    only what scafld can actually observe.

    '
  size: small
  risk_level: medium
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/review_runner.py
      lines: task-selected
      reason: External provider execution, observed model extraction, warnings, prompt
        diagnostics, isolation flags, and provenance hashes live here.
    - path: scafld/commands/review.py
      lines: task-selected
      reason: The review command currently owns successful provider telemetry and
        prints fallback warnings only after success.
    - path: scafld/review_workflow.py
      lines: task-selected
      reason: Downstream artifact diagnostics need prompt hash/context so discarded
        artifacts can be reproduced.
    - path: scafld/session_store.py
      lines: task-selected
      reason: Provider invocation status and confidence fields should be normalized
        before being aggregated by reports.
    - path: scafld/adapter_runtime.py
      lines: task-selected
      reason: Provider adapters should use the same validated status vocabulary and
        observed/requested model semantics where possible.
    - path: scafld/commands/reporting.py
      lines: task-selected
      reason: Report output should distinguish fallback downgrades from explicitly
        weaker provider isolation.
    - path: tests/review_gate_smoke.sh
      lines: task-selected
      reason: External runner stubs should prove model extraction, warning timing,
        prompt diagnostics, and provenance fields.
    - path: tests/report_metrics_smoke.sh
      lines: task-selected
      reason: Provider telemetry aggregation should prove validated statuses and the
        new isolation breakdown.
    - path: docs/review.md
      lines: task-selected
      reason: Operator docs should describe observed-model and diagnostic semantics.
    invariants:
    - provider_telemetry_must_not_overclaim
    - failed_external_runs_leave_debuggable_artifacts
    - review_gate_verdict_semantics_do_not_change
    - packaged_cli_is_the_truth_surface
  objectives:
  - Populate `model_observed` when provider output exposes an actual model id, while
    keeping `model_source` honest when it does not.
  - Emit auto-to-Claude fallback warnings before the subprocess starts, not only
    after successful completion.
  - Persist prompt hashes and useful prompt context in external-runner diagnostics
    and artifact diagnostics.
  - Validate provider invocation status/confidence strings before they enter the
    session ledger.
  - Clarify isolation telemetry so reports can distinguish auto fallback downgrades
    from explicitly configured weaker provider isolation.
  - Remove the duplicate `response_sha256` provenance alias while preserving raw and
    canonical hashes.
  touchpoints:
  - area: external review runner
    description: Provider subprocess execution should surface pre-run warnings, observed
      model data, prompt fingerprints, and precise provenance without adding a looser
      review result contract.
  - area: provider telemetry
    description: Session provider invocation entries should use a small validated
      vocabulary and separate requested, observed, fallback, and isolation facts.
  - area: report and docs
    description: Human-facing reports and docs should explain what telemetry does
      and does not prove.
  acceptance:
    definition_of_done:
    - id: dod1
      description: External Claude and Codex stub outputs can populate `model_observed`
        and mark confidence/model_source as observed.
      status: pending
    - id: dod2
      description: Auto fallback warnings are visible before provider subprocess execution,
        including on failed Claude fallback attempts.
      status: pending
    - id: dod3
      description: External-runner diagnostics include prompt sha256 data and artifact
        diagnostics include the same prompt fingerprint.
      status: pending
    - id: dod4
      description: Provider invocation status/confidence are validated and report output
        separates fallback downgrades from weaker isolation invocations.
      status: pending
    - id: dod5
      description: External review provenance keeps raw and canonical response hashes
        and no longer emits a duplicate `response_sha256` alias.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile Python sources after runner/session/report changes.
      command: python3 -m compileall scafld cli scripts
      expected: exit code 0
    - id: v2
      type: integration
      description: Review gate smoke proves observed model, pre-run warning, prompt
        diagnostics, and provenance fields.
      command: bash tests/review_gate_smoke.sh external-runner-observed-model-truth
      expected: exit code 0
    - id: v3
      type: integration
      description: Report metrics smoke proves provider telemetry aggregation remains
        stable with validated statuses and isolation breakdowns.
      command: bash tests/report_metrics_smoke.sh
      expected: exit code 0
