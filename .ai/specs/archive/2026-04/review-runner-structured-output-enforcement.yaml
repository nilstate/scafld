spec_version: "1.1"
task_id: "review-runner-structured-output-enforcement"
created: "2026-04-27T13:57:09Z"
updated: "2026-04-27T15:42:58Z"
status: "completed"
harden_status: "in_progress"

task:
  title: "Enforce ReviewPacket structure via provider CLI flags"
  summary: >
    External review verdicts come back as the `result` field of a
    provider wrapper JSON. Today scafld leans on prompt engineering to
    coax claude and codex into emitting one ReviewPacket JSON object
    and nothing else. In practice both providers preface JSON with
    prose ~50% of the time, breaking `_strip_json_fence` (which uses
    `re.fullmatch`) and producing the cryptic
    "external reviewer returned invalid ReviewPacket JSON: Expecting
    value: line 1 column 1 (char 0)" failure. Operators see the
    failure, retry, and hope the model behaves on the next attempt.

    Both provider CLIs expose generation-time structured-output
    enforcement: claude has `--json-schema <inline>` and codex has
    `--output-schema <path>`. These constrain the model at the
    generation step — no prose preface possible. That's structural
    enforcement, not best-effort compliance.

    This spec adds a JSON Schema for the ReviewPacket, follows
    scafld's existing `.ai/schemas/` file convention, and wires both
    provider CLIs to enforce the schema. Python-side
    `normalize_review_packet` stays as defense-in-depth (and as
    insurance against the known codex bug where `--output-schema` is
    silently dropped when `--json` is combined with MCP servers).
    The prompt's "JSON only, no markdown" language is dropped because
    the CLI now enforces it.
  size: "small"
  risk_level: "medium"
  context:
    packages:
      - "scafld"
      - "tests"
      - ".ai/schemas"
    files_impacted:
      - path: ".ai/schemas/review_packet.json"
        lines: "task-selected"
        reason: "New static JSON Schema describing the ReviewPacket shape; lives next to spec.json; bundled by scafld init/update."
      - path: "scafld/runtime_bundle.py"
        lines: "task-selected"
        reason: "Add `resolve_review_packet_schema_path(root)` mirroring `resolve_schema_path`; declare the new asset in the bundle list."
      - path: "scafld/review_runner.py"
        lines: "task-selected"
        reason: "Load the schema at prompt-build time, parameterize pass_ids per topology, pass to claude via `--json-schema` (inline) and codex via `--output-schema` (temp file)."
      - path: "scafld/review_packet.py"
        lines: "task-selected"
        reason: "No behavior change required; review_packet_from_text stays as the runtime contract checker (defense-in-depth against codex CLI bug 15451)."
      - path: "scafld/reviewing.py"
        lines: "task-selected"
        reason: "Drop re.IGNORECASE from FINDING_TARGET_RE so Python and the JSON Schema target pattern stay in lockstep (JSON Schema Draft-07 ECMA-262 regex does not support inline (?i))."
      - path: "tests/test_review_runner.py"
        lines: "task-selected"
        reason: "Unit coverage for schema loading, pass_id parameterization, and per-provider arg shape."
      - path: "tests/review_gate_smoke.sh"
        lines: "task-selected"
        reason: "Smoke that proves the schema is passed to the provider arg list (assertable via stub provider that captures argv)."
      - path: "docs/configuration.md"
        lines: "task-selected"
        reason: "Document the new schema file and the per-provider enforcement flags."
    invariants:
      - "review_packet_shape_must_remain_in_lockstep_with_normalize_review_packet"
      - "python_side_validation_must_remain_authoritative_at_runtime"
      - "schema_must_be_parameterized_with_topology_pass_ids_per_spec"
      - "provider_cli_flag_shape_differences_must_be_invisible_to_callers"
    related_docs:
      - ".ai/schemas/spec.json"
      - "scafld/review_packet.py"
      - "https://github.com/openai/codex/issues/15451"
      - "https://github.com/openai/codex/issues/4181"
    cwd: "."
  objectives:
    - "Make the model's output structurally valid by construction, not by prompt persuasion."
    - "Reuse scafld's existing `.ai/schemas/` file convention rather than introducing a new schema engine."
    - "Keep `normalize_review_packet` authoritative at runtime so a CLI bug or a future model regression cannot silently demote the contract."
  scope:
    in_scope:
      - "JSON Schema file `.ai/schemas/review_packet.json` describing the ReviewPacket shape."
      - "`resolve_review_packet_schema_path` in `runtime_bundle.py` and inclusion in the bundled assets list."
      - "Runtime composition of the topology-parameterized schema (substituting pass_ids into `pass_results.properties` enums)."
      - "Pass schema to claude via inline `--json-schema` arg."
      - "Pass schema to codex via `--output-schema <temp-file>`; tmp file managed and cleaned alongside the existing `--output-last-message` temp file."
      - "Drop the redundant 'Return JSON only, no markdown' language from `build_external_review_prompt`."
      - "Unit + smoke coverage for schema load, parameterization, and per-provider arg shape."
      - "Operator docs entry."
    out_of_scope:
      - "Replacing `normalize_review_packet` with a generic JSON Schema validator (no `jsonschema` Python dep)."
      - "MCP-server-based tool-use enforcement (separate, larger design)."
      - "Auto-generating the schema from Python types (no pydantic/dataclasses migration)."
      - "Codex bug 4181 workaround for non-gpt-5 models (we pin gpt-5.5; out-of-band override is operator-acknowledged risk)."
      - "Removing `_strip_json_fence` — it stays as a fallback for `--runner local` and `--runner manual` paths where the schema is not enforced."
  assumptions:
    - "claude `--json-schema` accepts an inline JSON string and constrains the response content to match."
    - "codex `--output-schema` accepts a file path and constrains the response content for the gpt-5.x family (we default to gpt-5.5)."
    - "Hand-writing the schema is one-time work; it's bounded in size and changes rarely."
    - "Topology adversarial pass_ids are stable within a single review run; per-call composition is fine."
    - "Provider CLI flag may silently no-op on edge cases (codex#15451, codex#4181); Python-side validation catches that."
  touchpoints:
    - area: "schema asset"
      description: "New static schema file alongside existing spec.json, distributed via the bundle."
    - area: "runtime bundle resolver"
      description: "Mirror the spec.json resolver shape so operators can override locally if needed."
    - area: "external review subprocess"
      description: "Per-provider arg builders gain the schema flag; codex needs a temp file lifecycle."
  risks:
    - description: "Hand-written schema drifts from `normalize_review_packet`'s actual acceptance shape, causing the provider to refuse valid content or accept invalid content."
      impact: "high"
      mitigation: "Add a unit test that pins a ReviewPacket fixture: `normalize_review_packet(fixture)` must succeed AND the fixture must validate against the schema (using a one-shot in-test json-schema check via `python3 -m jsonschema` if available; otherwise ad-hoc field presence checks). If a future field is added to either side, the test fails."
    - description: "codex bug 15451 silently drops the schema constraint when MCP servers are loaded."
      impact: "medium"
      mitigation: "We already pass `--ignore-user-config` to codex (no MCP). Do not add MCP to the codex path. Python-side `normalize_review_packet` runs unconditionally and will catch any constraint drop."
    - description: "claude `--json-schema` may not accept very large schema strings on some platforms."
      impact: "low"
      mitigation: "The composed schema is well under 10KB. If it ever grows, swap claude path to write a temp file and pass via shell file-redirection (matching the codex shape)."
    - description: "Operator overrides `gpt-5.5` to a non-gpt-5 model; codex `--output-schema` becomes a no-op (bug 4181)."
      impact: "medium"
      mitigation: "Documented in docs/configuration.md as a known constraint; Python-side validation still catches malformed packets at the contract layer."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "`.ai/schemas/review_packet.json` exists and accepts the ReviewPacket shape that `normalize_review_packet` accepts."
        status: "done"
      - id: "dod2"
        description: "claude review subprocess includes `--json-schema <inline-json>` in its argv; codex review subprocess includes `--output-schema <path>` in its argv with a real existing file at that path."
        status: "done"
      - id: "dod3"
        description: "The composed schema's `pass_results` properties are exactly the topology's adversarial pass_ids; extra or missing pass_ids are rejected by the schema."
        status: "done"
      - id: "dod4"
        description: "`build_external_review_prompt` no longer instructs the model with 'JSON only, no markdown' style negations; runtime contract relies on the CLI flags."
        status: "done"
      - id: "dod5"
        description: "A pinned ReviewPacket fixture passes both `normalize_review_packet` and the JSON Schema check, guarding against contract drift."
        status: "done"
      - id: "dod6"
        description: "Smoke registers schema-arg presence with a stub provider that captures argv."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        description: "Python sources compile."
        command: "python3 -m compileall scafld tests"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Unit tests cover schema load, parameterization, and contract-drift fixture."
        command: "python3 -m unittest tests.test_review_runner"
        expected: "exit code 0"
      - id: "v3"
        type: "boundary"
        description: "Schema file is valid JSON."
        command: "python3 -c 'import json; json.loads(open(\".ai/schemas/review_packet.json\").read())'"
        expected: "exit code 0"
      - id: "v4"
        type: "boundary"
        description: "Smoke harness has valid bash syntax."
        command: "bash -n tests/review_gate_smoke.sh"
        expected: "exit code 0"
      - id: "v5"
        type: "boundary"
        description: "Schema-arg smoke is registered."
        command: "grep -q 'case_review_runner_schema_arg_passed_to_provider' tests/review_gate_smoke.sh"
        expected: "exit code 0"

