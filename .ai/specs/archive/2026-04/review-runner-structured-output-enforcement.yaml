phases:
  - id: "phase1"
    name: "Static schema file and resolver"
    objective: "Add `.ai/schemas/review_packet.json` and a runtime-bundle resolver mirroring the spec.json convention."
    changes:
      - file: ".ai/schemas/review_packet.json"
        action: "create"
        content_spec: |
          JSON Schema (Draft-07) describing the ReviewPacket shape that
          `normalize_review_packet` accepts:
            - `schema_version` const "review_packet.v1"
            - `review_summary` string
            - `verdict` enum ["pass", "fail", "pass_with_issues"]
            - `pass_results` object with arbitrary keys (parameterized per
              spec at runtime); every value enum
              ["pass", "fail", "pass_with_issues"]
            - `checked_surfaces` array of objects with `pass_id`, `targets`
              array of strings, `summary` string, optional `limitations`
            - `findings` array of objects with `id`, `pass_id`, `severity`,
              `blocking`, `target`, `summary`, `failure_mode`,
              `why_it_matters`, `evidence` array, `suggested_fix`,
              `tests_to_add` array, `spec_update_suggestions` array of
              objects with `kind`, optional `phase_id`, `suggested_text`,
              `reason`, optional `validation_command`
          additionalProperties false at the top level. Required fields
          match `normalize_review_packet`'s required set.
      - file: "scafld/runtime_bundle.py"
        action: "update"
        content_spec: |
          Add:
            REVIEW_PACKET_SCHEMA_PATH = f"{AI_DIR}/schemas/review_packet.json"
            FRAMEWORK_REVIEW_PACKET_SCHEMA_PATH = f"{FRAMEWORK_DIR}/schemas/review_packet.json"
          Append the new pair to BUNDLED_ASSETS so `scafld update`
          distributes the schema. Add a resolver
          `resolve_review_packet_schema_path(root)` that mirrors
          `resolve_schema_path`.
      - file: "tests/test_review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add a fixture-pinning test `ReviewPacketSchemaContractTest`:
            - Load the static schema from the framework path.
            - Build a canonical ReviewPacket fixture that
              `normalize_review_packet` accepts.
            - Hand-validate fixture against the schema: top-level required
              fields present, verdict in enum, every finding has the
              required keys.
            - If `jsonschema` is importable, also run a real Draft-07
              validation; otherwise skip that arm with a clear note.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        description: "Sources compile."
        command: "python3 -m compileall scafld tests"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T13:59:09Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac1_2"
        type: "boundary"
        description: "Schema file is valid JSON."
        command: "python3 -c 'import json; json.loads(open(\".ai/schemas/review_packet.json\").read())'"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T14:01:34Z"
      - id: "ac1_3"
        type: "test"
        description: "Schema contract test passes."
        command: "python3 -m unittest tests.test_review_runner"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T13:59:09Z"
        result_output: "........................................................................... ---------------------------------------------------------------------- Ran 75 tests in 0.003s  OK"
    status: "completed"

  - id: "phase2"
    name: "Per-provider CLI enforcement"
    objective: "Pass the topology-parameterized schema to claude via `--json-schema` and to codex via `--output-schema <temp-file>`. Drop the redundant 'JSON only' prompt language."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - New helper `_compose_review_packet_schema(topology)`:
            loads the static schema, narrows
            `properties.pass_results.properties` to exactly the
            adversarial pass_ids (each value enum
            ["pass", "fail", "pass_with_issues"]), sets
            `additionalProperties: false` on `pass_results`, returns
            the composed schema dict.
          - `_codex_args(root, output_path, model, schema_path)`:
            extends the existing arglist with
            `["--output-schema", str(schema_path)]` when schema_path
            is provided.
          - `_claude_args(model, session_id, schema_json)`:
            extends the existing arglist with
            `["--json-schema", schema_json]` when schema_json is
            provided.
          - `_run_external_review_once`:
            composes the schema once at the top, encodes a JSON
            string for claude. For codex, writes the schema to a
            sibling temp file alongside the existing
            `--output-last-message` temp file; cleans both in finally.
          - `build_external_review_prompt`:
            removes the "Return one ReviewPacket JSON object. Do not
            return markdown." line and the trailing "Return only the
            final ReviewPacket JSON object now." Keep the schema
            example as guidance for content; the CLI now owns
            structural enforcement.
      - file: "tests/test_review_runner.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add tests:
            - `_compose_review_packet_schema` for a topology with
              two adversarial passes returns a schema whose
              `pass_results.properties` is exactly those two ids.
            - `_codex_args` with a schema_path includes the
              `--output-schema` flag and the path.
            - `_claude_args` with a schema_json includes the
              `--json-schema` flag and the inline JSON.
            - The composed schema still validates the canonical
              fixture (defense against narrowing breaking the contract).
      - file: "scafld/reviewing.py"
        action: "update"
        content_spec: |
          Drop `re.IGNORECASE` from `FINDING_TARGET_RE`. JSON Schema
          Draft-07's ECMA-262 regex flavor does not support inline
          `(?i)` flags, so the static schema's target pattern must be
          case-sensitive. Aligning the runtime regex keeps prompt /
          schema / normalize in lockstep. File extensions in citations
          are conventionally lowercase; no operator-visible behavior
          change in practice.
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        description: "Sources compile after CLI wiring."
        command: "python3 -m compileall scafld tests"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T14:04:09Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac2_2"
        type: "test"
        description: "Provider arg and composition tests pass."
        command: "python3 -m unittest tests.test_review_runner"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T14:04:09Z"
        result_output: "...........................................................................s.ss.......... ---------------------------------------------------------------------- Ran 89 tests in 0.003s  OK (skipped=3)"
    status: "completed"

  - id: "phase3"
    name: "Smoke and operator docs"
    objective: "Smoke-prove the per-provider arg passing with a stub that captures argv; document the schema and flags."
    dependencies:
      - "phase2"
    changes:
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add `case_review_runner_schema_arg_passed_to_provider`:
            - Stub codex script that writes its `argv` to a capture
              file, then emits a valid review packet to the
              `--output-last-message` path.
            - Run `scafld review`; assert the capture file contains
              `--output-schema` and a path to a file that exists and
              is valid JSON matching the static schema's $id.
            - Confirm `scafld review` completes (verdict pass).
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Add a "Structured output enforcement" subsection under
          "Review Runner":
            - The reviewer's response shape is enforced at generation
              time by the provider CLI via claude
              `--json-schema` and codex `--output-schema`.
            - Schema lives at `.ai/schemas/review_packet.json` and is
              bundled by `scafld init`/`scafld update`.
            - Operator override: place a custom schema in the same
              path; `scafld update` will not overwrite a modified
              workspace schema (matches existing spec.json behavior).
            - Known constraints: codex `--output-schema` is silent for
              non-gpt-5 models (codex#4181); the `--json` + MCP combo
              may drop the constraint (codex#15451). Python-side
              `normalize_review_packet` is the authoritative validator
              regardless.
    acceptance_criteria:
      - id: "ac3_1"
        type: "boundary"
        description: "Smoke harness has valid bash syntax."
        command: "bash -n tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T14:05:27Z"
      - id: "ac3_2"
        type: "boundary"
        description: "Schema-arg smoke is registered."
        command: "grep -q 'case_review_runner_schema_arg_passed_to_provider' tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T14:05:27Z"
      - id: "ac3_3"
        type: "boundary"
        description: "Operator docs mention the new enforcement subsection."
        command: "grep -qiE 'json-schema|output-schema|structured output enforcement' docs/configuration.md"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-27T14:05:28Z"
    status: "completed"

