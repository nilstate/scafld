        content_spec: "Add stable error codes and details fields that lifecycle commands can return in JSON mode."
      - file: "scafld/command_runtime.py"
        action: "update"
        content_spec: "Add stable shared error codes for missing workspace discovery so JSON callers get parseable failures."
      - file: "scafld/spec_store.py"
        action: "update"
        content_spec: "Add stable shared error codes for missing specs, ambiguous task IDs, and invalid lifecycle transitions."
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: "Document the shared JSON envelope, error shape, and per-command payload conventions."
