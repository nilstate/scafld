task:
  title: "Make scafld lifecycle commands natively machine-readable"
  summary: >
    Turn scafld into a machine-first kernel for automation by adding native
    `--json` contracts to every automation-relevant command and documenting the
    result shapes. Today runx still reconstructs or normalizes parts of scafld
    output. That means scafld does not yet feel like the engineering system
    itself. This work makes lifecycle state, review state, audit findings, and
    failure reasons available as stable structured contracts instead of terminal
    heuristics.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "cli"
      - "scafld"
      - "tests"
      - "docs"
    files_impacted:
      - path: "cli/scafld"
        lines: "all"
        reason: "Lifecycle commands need shared `--json` handling and stable structured payloads."
      - path: "scafld/reviewing.py"
        lines: "all"
        reason: "Review data already contains the machine-safe details that should become native CLI output."
      - path: "scafld/command_runtime.py"
        lines: "all"
        reason: "Structured workspace-not-found errors now flow through the shared machine envelope."
      - path: "scafld/spec_store.py"
        lines: "all"
        reason: "Structured spec lookup and transition errors now need stable machine-readable codes."
      - path: "scafld/output.py"
        lines: "all"
        reason: "The shared output layer should own JSON envelopes and error serialization."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "The CLI reference must document each command's structured contract."
      - path: "docs/lifecycle.md"
        lines: "all"
        reason: "Lifecycle docs should explain the machine-facing state model and transition payloads."
      - path: "docs/review.md"
        lines: "all"
        reason: "Review docs should explain native structured review-open and complete outputs."
      - path: "tests/review_gate_smoke.sh"
        lines: "all"
        reason: "Review smoke should assert the native JSON contract instead of relying on wrapper behavior."
      - path: "tests/harden_smoke.sh"
        lines: "all"
        reason: "Harden smoke should assert JSON output for harden and mark-passed flows."
      - path: "tests/json_contract_smoke.sh"
        lines: "all"
        reason: "A new smoke test should cover the full command matrix in JSON mode."
    invariants:
      - "human_output_remains_default"
      - "json_mode_uses_stable_envelopes"
      - "error_conditions_have_parseable_codes"
      - "machine_callers_never_need_terminal_scraping"
      - "documented_contracts_match_real_output"
    related_docs:
      - "README.md"
      - "docs/cli-reference.md"
      - "docs/lifecycle.md"
      - "docs/review.md"
      - "docs/validation.md"
    cwd: "/home/kam/dev/scafld"
  objectives:
    - "Add native `--json` support for init, new, validate, approve, start, status, exec, audit, harden, review, complete, fail, cancel, and report."
    - "Define a shared JSON envelope with command identity, task identity, current state, warnings, and structured errors."
    - "Return command-specific payloads for review, complete, audit, exec, harden, and report rather than forcing wrappers to infer them."
    - "Emit machine-readable error codes, failure reasons, and next-action hints in JSON mode."
    - "Document the native contracts so runx and third parties can consume them directly."
    - "Prove the contracts with smoke coverage that runs the real packaged CLI."
  scope:
    in_scope:
      - "Shared JSON envelope and error schema."
      - "Native command payloads for every automation-relevant command."
      - "Docs and examples for the JSON contract."
      - "End-to-end smoke coverage for JSON mode."
    out_of_scope:
      - "Network calls to GitHub, GitLab, or other remote APIs."
      - "Changing default human-readable terminal copy except where shared logic requires minor cleanup."
      - "Hosted receipts or runx-specific orchestration behavior."
  dependencies:
    - "command-core-integrity-hardening"
  assumptions:
    - "Default CLI usage should remain human-oriented; JSON mode is opt-in."
    - "A stable envelope is more important than preserving every current ad hoc line of terminal text in JSON mode."
    - "runx should become a thin consumer of these contracts rather than continuing to normalize them."
  touchpoints:
    - area: "command output"
      description: "Add and document stable JSON envelopes and command payloads."
      owners:
        - "scafld-core"
    - area: "review and harden payloads"
      description: "Expose review-open, review-complete, and harden state as native structured data."
      owners:
        - "scafld-core"
    - area: "error model"
      description: "Define parseable error codes and failure reasons for machine callers."
      owners:
        - "scafld-core"
    - area: "smoke coverage"
      description: "Verify the command matrix in JSON mode against the real CLI."
      owners:
        - "scafld-core"
  risks:
    - description: "JSON payload drift could create a second undocumented API if contracts are not explicitly documented and tested."
      impact: "high"
      mitigation: "Publish the envelope and command-specific fields in docs and protect them with smoke assertions."
    - description: "Interactive users could see degraded terminal UX if JSON support leaks into default output paths."
      impact: "medium"
      mitigation: "Keep human output as the default and route JSON mode through the shared output layer explicitly."
    - description: "Error payloads could stay inconsistent if command failures keep raising ad hoc exceptions."
      impact: "high"
      mitigation: "Move command failures onto a shared structured error taxonomy before backfilling JSON mode."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "Every automation-relevant command supports native `--json`."
        status: "done"
      - id: "dod2"
        description: "JSON mode emits one stable envelope shape plus command-specific result fields."
        status: "done"
      - id: "dod3"
        description: "Machine-readable error codes and reasons are returned in JSON mode."
        status: "done"
      - id: "dod4"
        description: "Review, complete, audit, exec, and harden no longer require wrapper-side reconstruction."
        status: "done"
      - id: "dod5"
        description: "Docs and smoke tests prove the native JSON contracts."
        status: "done"
    validation:
      - id: "v1"
        type: "integration"
        description: "Lifecycle JSON contract smoke passes."
        command: "./tests/json_contract_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v2"
        type: "integration"
        description: "Review gate smoke passes in JSON mode."
        command: "./tests/review_gate_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240
      - id: "v3"
        type: "integration"
        description: "Harden smoke passes in JSON mode."
        command: "./tests/harden_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240

