  objective: >
    Update `review_binding_excluded_rels` to include the same
    control-plane prefixes already used by `git_sync_excluded_paths`,
    so scafld's own archive moves do not invalidate review anchors.
  changes:
  - file: scafld/review_workflow.py
    action: update
    content_spec: |
      In `review_binding_excluded_rels`, after appending the
      task-specific review file and runs path, also append every
      prefix returned by `audit_scope.git_sync_excluded_paths()`.
      Avoid duplicates. Keep the function pure and deterministic.
  - file: tests/test_review_anchor_exclusion.py
    action: create
    content_spec: |
      Use a temp git work-tree. Initialize a scafld workspace, create
      two specs A and B, approve and review both. Verify that
      completing A (which moves A's archive files) does not change
      the captured review-anchor diff for B. Verify that touching a
      file outside .ai/ between review and complete DOES change the
      anchor.
