task:
  title: "Make new templates repo-aware"
  summary: >
    Make `scafld new` generate a materially better first draft by reusing the
    repo-shape knowledge that `scafld init` already has. Right now `new`
    ignores detected toolchain context and emits a wall of generic TODOs,
    including placeholder commands, even in repos where scafld can already
    suggest concrete validation commands. This round should keep drafts
    intentionally incomplete, but replace the most generic placeholders with
    repo-aware prompts and effective validation commands.
  size: "small"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "tests"
      - "docs"
    invariants:
      - "domain_boundaries"
      - "human_output_remains_default"
      - "json_mode_uses_stable_envelopes"
      - "drafts_stay_fail_closed_until_humans_edit_them"
  objectives:
    - "Make `scafld new` reuse detected repo context and validation commands."
    - "Keep generated drafts intentionally invalid until the operator fills in the task-specific details."
    - "Prove the new template behavior in existing smoke coverage."
  touchpoints:
    - area: "cli/scafld"
      description: "Generate repo-aware template text and concrete validation commands in `scafld new`."
    - area: "tests/update_smoke.sh"
      description: "Assert that generated drafts inherit concrete commands and contextual prompts."
    - area: "docs/cli-reference.md"
      description: "Document that `new` reuses repo-aware defaults when available."
    - area: "docs/quickstart.md"
      description: "Show that the first draft now includes repo-aware validation commands."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Generated drafts include concrete validation commands when repo detection can suggest them."
        status: "done"
      - id: "dod2"
        description: "Generated drafts still contain contextual TODO prompts for human-owned task details."
        status: "done"
      - id: "dod3"
        description: "Smoke coverage proves both repo-aware and fallback draft generation."
        status: "done"
    validation:
      - id: "v1"
        type: "integration"
        description: "Update smoke covers repo-aware `scafld new` defaults."
        command: "bash tests/update_smoke.sh"
        expected: "exit code 0"
        timeout_seconds: 240

