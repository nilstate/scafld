phases:
  - id: "phase1"
    name: "Acceptance kinds and strict-only evaluator"
    objective: "Add three structured kinds. Reject undeclared kinds before running the command. Preserve legacy `expected:` string mapping for the three documented forms only."
    changes:
      - file: "scafld/acceptance.py"
        action: "update"
        content_spec: |
          - `EXPECTED_KINDS = ("exit_code_zero", "exit_code_nonzero", "no_matches")`.
          - `_match_<kind>(returncode, output, criterion)` per kind,
            returning `(passed, reason)`.
          - `_legacy_expected_to_kind(expected)` maps:
              - "exit code 0" → ("exit_code_zero", {})
              - "exit code N" (N != 0) → ("exit_code_nonzero",
                {"expected_exit_code": N})
              - "no matches" → ("no_matches", {})
              - empty/whitespace → ("unset", {})
              - other → ("legacy_substring", {"expected_substring": <verbatim>})
          - `resolve_kind(criterion)` reads explicit `expected_kind`
            else falls through to the legacy mapping.
          - `evaluate_acceptance_criterion`: when kind is `unset` or
            `legacy_substring`, return fail with a one-line reason
            naming the criterion id and the fix. Subprocess never runs
            for these cases (avoids side effects).
      - file: "scafld/spec_parsing.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          parse_acceptance_criteria allowlist gains `expected_kind`,
          `expected_exit_code`, `evidence_required`. Both YAML-load and
          regex-fallback paths.
      - file: ".ai/schemas/spec.json"
        action: "update"
        content_spec: |
          Acceptance criterion gains `expected_kind` (enum:
          exit_code_zero, exit_code_nonzero, no_matches),
          `expected_exit_code` (integer), `evidence_required` (boolean).
          Same shape on phase-level criteria and task.acceptance.validation
          items.
      - file: "tests/test_acceptance.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `_legacy_expected_to_kind` mapping coverage for each
            documented form + unmapped forms.
          - `resolve_kind` explicit-wins-over-legacy.
          - Per-kind matcher pass + fail cases.
          - Strict reject-before-run integration test on
            `evaluate_acceptance_criterion`: command with side effect
            (writes a sentinel file) — sentinel must NOT exist after
            criterion fails for unset kind.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:08Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac1_2"
        type: "test"
        command: "python3 -m unittest tests.test_acceptance"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:08Z"
        result_output: "......................... ---------------------------------------------------------------------- Ran 25 tests in 0.021s  OK"
      - id: "ac1_3"
        type: "boundary"
        description: "Schema declares three kinds only."
        command: "sh -c 'grep -q exit_code_zero .ai/schemas/spec.json'"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:08Z"
    status: "completed"

  - id: "phase2"
    name: "Evidence required gate"
    objective: "Reject criteria whose command exits 0 with empty stdout when `evidence_required: true`. Stops the 'unittest passes with no real work' pattern."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/acceptance.py"
        action: "update"
        content_spec: |
          After kind-routed pass result, if criterion has
          `evidence_required: true` and stdout is empty, override
          status to fail with reason "evidence_required: command
          stdout is empty". No evidence_path field — stdout is the
          single signal.
      - file: "tests/test_acceptance.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          Integration tests on evaluate_acceptance_criterion:
            - evidence_required + non-empty stdout → pass.
            - evidence_required + empty stdout → fail with reason.
            - evidence not required + empty stdout → pass (kind alone gates).
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:11Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac2_2"
        type: "test"
        command: "python3 -m unittest tests.test_acceptance"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:11Z"
        result_output: "......................... ---------------------------------------------------------------------- Ran 25 tests in 0.023s  OK"
    status: "completed"

  - id: "phase3"
    name: "Smoke and operator docs"
    objective: "Smoke-prove the strict-rejection path end-to-end and document the hard cutover."
    dependencies:
      - "phase2"
    changes:
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        ownership: "shared"
        content_spec: |
          Add `case_acceptance_strict_rejects_undeclared_kind`: a
          spec criterion with only `expected: "all tests pass"` (a
          legacy substring that doesn't auto-resolve) is rejected by
          `scafld build` with the named reason. No --json-required;
          assert via the recorded spec output.
      - file: "docs/configuration.md"
        action: "update"
        ownership: "shared"
        content_spec: |
          New "Acceptance kinds" subsection:
            - Each criterion declares `expected_kind`
              (exit_code_zero | exit_code_nonzero | no_matches).
            - Optional `expected_exit_code` pins a specific non-zero
              code.
            - Optional `evidence_required: true` requires non-empty
              stdout.
            - Legacy `expected:` strings auto-resolve when they match
              "exit code N" or "no matches"; anything else fails.
            - Hard cutover: no lenient mode opt-out. Operators with
              specs that fail upgrade add `expected_kind` to each
              criterion (one-line edit).
      - file: "CLAUDE.md"
        action: "update"
        ownership: "shared"
        content_spec: |
          Diminishing-returns stopping rule paired with the strict
          acceptance gate. Documents agent discipline; promoted into
          CLI behavior by `runtime-rigor-severity-gates`.
    acceptance_criteria:
      - id: "ac3_1"
        type: "boundary"
        command: "bash -n tests/review_gate_smoke.sh"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:13Z"
      - id: "ac3_2"
        type: "boundary"
        description: "Strict-rejection smoke is registered."
        command: "grep -q 'case_acceptance_strict_rejects_undeclared_kind' tests/review_gate_smoke.sh"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:13Z"
      - id: "ac3_3"
        type: "boundary"
        description: "Docs cover the new kinds."
        command: "grep -qiE 'expected_kind|exit_code_zero' docs/configuration.md"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T02:07:13Z"
    status: "completed"

