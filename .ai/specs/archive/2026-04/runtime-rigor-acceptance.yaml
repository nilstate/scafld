task:
  title: "Acceptance kinds and evidence requirement (strict-only, hard cutover)"
  summary: >
    `scafld build` advances phases when acceptance criteria pass via
    lenient substring matching in `acceptance.check_expected` — observed
    repeatedly during 1.7.0 cutover dogfooding where "compile +
    unittest both pass" marked phases complete despite missing
    implementation work. 1.7.0 replaces this with a structured
    contract.

    Two changes ship together:

      1. `expected_kind` enum on each criterion: `exit_code_zero`,
         `exit_code_nonzero`, `no_matches`. Strict-only — undeclared
         `expected_kind` fails the criterion loudly without running
         the command. Legacy `expected:` strings (`"exit code 0"`,
         `"exit code N"`, `"no matches"`) auto-resolve to the new
         kinds at parse time so existing specs that use the documented
         strings continue to work; anything else fails with a
         one-line guidance error.

      2. `evidence_required` boolean per criterion. When true,
         criterion-pass requires non-empty stdout. Stops the "compile
         + unittest pass with no real work" pattern.

    Hard cutover: no `lenient` mode opt-out. No `evidence_path`
    escape hatch (stdout-only). No `regex` / `json_path` matchers
    (deferred to a 1.7.x patch if pain shows up).
  size: "small"
  risk_level: "medium"
  context:
    files_impacted:
      - path: "scafld/acceptance.py"
        reason: "Core evaluator. Replaces check_expected with kind-routed matchers + strict gate + evidence-required check."
      - path: "scafld/spec_parsing.py"
        reason: "parse_acceptance_criteria allowlist gains expected_kind, expected_exit_code, evidence_required."
      - path: ".ai/schemas/spec.json"
        reason: "Adds expected_kind enum, expected_exit_code, evidence_required to criterion schema."
      - path: "tests/test_acceptance.py"
        reason: "Unit coverage for each kind, the strict reject-before-run path, and the evidence_required gate."
      - path: "tests/review_gate_smoke.sh"
        reason: "Strict-rejection smoke (legacy substring expected fails loudly)."
      - path: "docs/configuration.md"
        reason: "Document the new criterion fields and the hard cutover."
      - path: "CLAUDE.md"
        reason: "Diminishing-returns stopping rule paired with the strict acceptance gate."
    cwd: "."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Each `expected_kind` (`exit_code_zero`, `exit_code_nonzero`, `no_matches`) has a matcher in acceptance.py with pass + fail unit tests."
        status: "done"
      - id: "dod2"
        description: "Legacy `expected: \"exit code 0\"` / `\"exit code N\"` / `\"no matches\"` auto-resolve at parse time without spec edits; tests pin each form."
        status: "done"
      - id: "dod3"
        description: "Criteria with neither `expected_kind` nor a mappable legacy `expected:` string fail loudly without running the command (strict reject-before-run)."
        status: "done"
      - id: "dod4"
        description: "`evidence_required: true` rejects criteria whose command exits 0 with empty stdout."
        status: "done"
      - id: "dod5"
        description: "Operator docs cover the new fields; the hard cutover (no lenient mode) is documented in plans/1.7.0-cutover.md."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
      - id: "v2"
        type: "test"
        command: "python3 -m unittest tests.test_acceptance"
        expected_kind: "exit_code_zero"
      - id: "v3"
        type: "test"
        command: "python3 -m unittest tests.test_review_runner"
        expected_kind: "exit_code_zero"
      - id: "v4"
        type: "boundary"
        description: "Schema declares the three kinds (no regex/json_path)."
        command: "sh -c 'grep -q exit_code_zero .ai/schemas/spec.json && ! grep -q expected_pattern .ai/schemas/spec.json && ! grep -q expected_json_path .ai/schemas/spec.json'"
        expected_kind: "exit_code_zero"

