task:
  title: Make spec gates enforce real YAML integrity
  summary: 'Fix the integrity gap where scafld validates and approves specs using
    regex field reads while later runtime paths use `yaml.safe_load()`. Right now
    a spec with syntactically invalid YAML can pass `scafld validate`, pass `scafld
    approve`, and then blow up `scafld build` with a raw traceback. That is a broken
    gate and a bad operator experience. The clean model is: spec gates parse real
    YAML before approving anything, malformed specs fail with structured validation
    errors, and any remaining runtime path that loads a malformed spec returns a structured
    scafld error instead of a Python traceback.

    '
  size: medium
  risk_level: high
  context:
    packages:
    - scafld
    - tests
    files_impacted:
    - path: scafld/spec_store.py
      lines: task-selected
      reason: Central spec loading should convert YAML parser failures into structured
        ScafldError values.
    - path: scafld/lifecycle_runtime.py
      lines: task-selected
      reason: Validate and approve currently rely on regex checks instead of real
        YAML parsing.
    - path: scafld/execution_runtime.py
      lines: task-selected
      reason: Harden and execution paths still use direct yaml.safe_load calls that
        can traceback on malformed specs.
    - path: scafld/commands/execution.py
      lines: task-selected
      reason: Harden JSON error shaping should not crash while reporting malformed-spec
        failures.
    - path: tests/invalid_yaml_spec_smoke.sh
      lines: all
      reason: A disposable-repo smoke should prove validate/approve/build/harden all
        fail cleanly on malformed YAML.
    invariants:
    - validation_gates_must_be_stricter_than_runtime
    - malformed_specs_must_fail_as_scafld_errors_not_python_tracebacks
    - packaged_cli_is_the_truth_surface
    related_docs:
    - README.md
    - docs/lifecycle.md
    - docs/cli-reference.md
  objectives:
  - Make `scafld validate` reject malformed YAML before schema-style checks.
  - Make `scafld approve` refuse malformed YAML because validation already rejects
    it.
  - Convert malformed-spec runtime loads into structured scafld errors instead of
    raw tracebacks.
  - Lock the behavior with a disposable-repo smoke that exercises the packaged CLI.
  scope:
    in_scope:
    - Structured YAML error handling for validate, approve, build, and harden.
    - Shared spec-loading helpers for command/runtime paths that currently crash on
      malformed YAML.
    - A packaged-CLI smoke for malformed spec handling.
    out_of_scope:
    - Rewriting the full schema validator.
    - Semantic validation of every spec field beyond current checks.
    - Changing how well-formed specs move through the lifecycle.
  assumptions:
  - INVALID_SPEC_DOCUMENT is the right error family for malformed YAML parsing failures.
  - Regex field readers are still fine as lightweight helpers once the document has
    already been parsed successfully.
  touchpoints:
  - area: gate integrity
    description: Validate and approve must stop bad specs before execution starts.
  - area: runtime error shaping
    description: Build and harden must surface malformed specs as structured command
      failures.
  - area: operator trust
    description: "A malformed spec should never appear \u201Cvalid\u201D until a later\
      \ traceback proves otherwise."
  risks:
  - description: Tightening validation could reject malformed specs that old workflows
      accidentally depended on slipping through.
    impact: medium
    mitigation: This is the desired hard cut; cover the new behavior with a disposable-repo
      smoke and keep well-formed spec behavior unchanged.
  - description: Replacing direct yaml.safe_load calls could change non-error behavior
      in harden/execution flows.
    impact: medium
    mitigation: Route through shared helpers, preserve existing data shapes, and validate
      with focused CLI smoke.
  - description: Runtime callers outside validate/approve could still traceback if
      they bypass the structured loader.
    impact: high
    mitigation: Audit direct yaml.safe_load(spec.read_text()) call sites and pull
      them onto the shared load path within this task.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: Malformed YAML fails validate and approve with structured validation
        errors.
      status: pending
    - id: dod2
      description: Malformed YAML in build or harden fails as a structured scafld
        error, not a traceback.
      status: pending
    - id: dod3
      description: A disposable-repo smoke proves the packaged CLI behavior end to
        end.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the YAML integrity hardening.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Invalid-YAML smoke proves validate, approve, build, and harden
        all fail cleanly.
      command: bash tests/invalid_yaml_spec_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not add a compatibility mode that allows malformed YAML through validate.
    - Do not leave raw YAML parser tracebacks as an accepted operator surface.
    - Do not broaden the task into a general schema redesign.
  notes: "This is one of the few issues that directly breaks trust in the product:\
    \ the gate says \u201Cvalid\u201D, then the next command crashes on the same file.\
    \ That has to be fixed at the root.\n"
