task:
  title: Dogfood mixed repo detection through the new surface
  summary: 'Dogfood scafld on scafld itself by fixing the repo-context detector used
    by `plan` and `new`. In the current repo, the detector sees `package.json` first,
    classifies the workspace as Node-only, and emits useless placeholder commands
    in the draft even though the Python toolchain has real compile and test commands.
    The cut should make mixed Python+Node repos first-class, prefer concrete commands
    over placeholders, and prove the new behavior through the agent-facing flow and
    smoke coverage.

    '
  size: medium
  risk_level: medium
  context:
    packages:
    - scafld/config.py
    - scafld/spec_templates.py
    - tests/update_smoke.sh
    - tests/agent_surface_smoke.sh
    - README.md
    - docs/configuration.md
    invariants:
    - domain_boundaries
    - config_from_env
  objectives:
  - Detect mixed Python+Node repos instead of short-circuiting at the first stack
    marker.
  - Prefer concrete compile/test/lint/typecheck commands from the richer stack when
    the other side only has placeholders.
  - Keep node-only, python-only, and fallback detection behavior stable.
  - Prove the fix by dogfooding `plan` on a mixed fixture and by keeping the compatibility/update
    smokes green.
  touchpoints:
  - area: repo detection
    description: Stack detection and command selection in scafld/config.py.
  - area: spec scaffolding
    description: Draft generation and surfaced repo context in scafld/spec_templates.py.
  - area: dogfood tests
    description: Smoke coverage for mixed repo detection and agent-surface planning
      output.
  acceptance:
    definition_of_done:
    - id: dod1
      description: Mixed repos surface a mixed summary and concrete commands instead
        of fallback placeholders when one stack provides them.
      status: pending
    - id: dod2
      description: Node-only, Python-only, and fallback fixtures still produce stable
        suggested commands.
      status: pending
    - id: dod3
      description: The documented operator surface matches the new mixed-detection
        behavior.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the scafld package after the detection changes.
      command: python3 -m compileall scafld
      expected: exit code 0
    - id: v2
      type: test
      description: Run the mixed repo detection smoke.
      command: bash tests/mixed_repo_detection_smoke.sh
      expected: exit code 0
    - id: v3
      type: test
      description: Run the broader update smoke to protect existing detection behavior.
      command: bash tests/update_smoke.sh
      expected: exit code 0
