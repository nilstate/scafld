task:
  title: "Handoff Session Contracts And Config"
  summary: >
    Define the minimal configuration and generated-state contracts for the new
    value layer. This spec introduces versioned handoff and session contracts,
    a minimal `llm` config block, the sibling `*.md + *.json` handoff format,
    and the rule that `.ai/runs/` is generated state ignored by audit and sync
    while archived with the spec on lifecycle exit. It does not expand the spec
    schema unless a later implementation proves that necessary.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - ".ai/config.yaml"
      - "docs/"
      - "scafld/"
      - "tests/"
    files_impacted:
      - path: "scafld/runtime_contracts.py"
        lines: "all"
        reason: "Central constants and helpers for handoff/session schema versions and envelope keys."
      - path: ".ai/config.yaml"
        lines: "all"
        reason: "Add the minimal llm config surface."
      - path: "docs/configuration.md"
        lines: "all"
        reason: "Document only the v1 llm config block."
      - path: "docs/run-artifacts.md"
        lines: "all"
        reason: "Document handoff/session contracts and .ai/runs layout."
      - path: "scafld/commands/lifecycle.py"
        lines: "1-260"
        reason: "fail and cancel should archive run artifacts alongside the spec."
      - path: "scafld/commands/review.py"
        lines: "1-360"
        reason: "complete should archive run artifacts alongside the completed spec."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "Document run archive paths and runtime artifact guarantees."
      - path: "scafld/runtime_bundle.py"
        lines: "1-140"
        reason: "Managed bundle and workspace docs may need to know about runtime contracts and run state."
      - path: "scafld/audit_scope.py"
        lines: "1-120"
        reason: "Ignore generated run state during audit and sync checks."
      - path: "docs/installation.md"
        lines: "all"
        reason: "Mention .ai/runs as generated state."
      - path: "tests/run_contracts_smoke.sh"
        lines: "all"
        reason: "New smoke test for handoff/session envelope expectations."
      - path: "tests/package_smoke.sh"
        lines: "all"
        reason: "Ensure bundle assets and docs remain packaged correctly."
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "config_from_env"
    related_docs:
      - "plans/llm-performance-cutover.md"
      - "docs/configuration.md"
      - "docs/run-artifacts.md"
  objectives:
    - "Define one shared handoff contract with schema_version, kind, and sibling `.md/.json` files."
    - "Define one shared session contract with schema_version, phase_summaries, and criterion state."
    - "Add the minimal v1 llm config surface: model_profile, context.budget_tokens, recovery.max_attempts."
    - "Treat .ai/runs as generated state and keep it out of audit/sync drift."
    - "Archive run artifacts with the spec on complete, fail, or cancel."
    - "Avoid spec schema growth unless implementation proves it is necessary."
  scope:
    in_scope:
      - "Runtime contract constants and docs."
      - "Minimal llm config block."
      - "Generated-state ignore rules."
      - "Smoke tests for contracts and packaging."
    out_of_scope:
      - "Handoff rendering implementation."
      - "Execution-session implementation."
      - "Review/report metrics implementation."
      - "Top-level spec schema changes unless forced."
  dependencies:
    - "llm-performance-prose-cutover should land first so the mission and terms are stable."
  assumptions:
    - "Handoff and session live outside the spec."
    - "External agent usage and cost fields, if present later, can be optional fields on session rather than a new artifact."
  touchpoints:
    - area: "Runtime contracts"
      description: "One place defines schema versions and stable field names."
    - area: "Config"
      description: "One small llm block controls v1 runtime behavior."
    - area: "Generated state"
      description: ".ai/runs is ignored by audit and sync drift."
    - area: "Retention"
      description: "Run artifacts move to archive with the spec rather than accumulating indefinitely."
    - area: "Docs"
      description: "run-artifacts and configuration docs teach the contract without growing extra concepts."
  risks:
    - description: "Config surface can bloat before the first measured win."
      impact: "medium"
      mitigation: "Keep only model_profile, context.budget_tokens, and recovery.max_attempts in v1."
    - description: "Spec schema churn can invalidate existing specs."
      impact: "high"
      mitigation: "Avoid spec schema changes in this spec unless an implementation dependency makes them unavoidable."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "A single shared handoff contract and a single shared session contract are documented and versioned."
        status: "pending"
      - id: "dod2"
        description: ".ai/config.yaml documents only the minimal v1 llm block."
        status: "pending"
      - id: "dod3"
        description: ".ai/runs is documented as generated state, ignored by audit/sync, and archived with the spec."
        status: "pending"
      - id: "dod4"
        description: "Zero spec schema changes are stated explicitly and no unnecessary spec schema growth is introduced."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate llm-run-schema-and-config"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Run runtime contract smoke coverage."
        command: "bash tests/run_contracts_smoke.sh"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Run package smoke coverage."
        command: "bash tests/package_smoke.sh"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Run lifecycle smoke coverage for archived run retention."
        command: "bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not add a large llm config surface."
      - "Do not add provider-specific SDK or key config."
      - "Do not add telemetry artifacts."
      - "Do not add a runtime block to the spec schema in v1."
  notes: >
    Required config shape:
    llm.model_profile, llm.context.budget_tokens,
    llm.recovery.max_attempts. Required artifact shape: every handoff is a
    sibling `*.md + *.json` pair and run artifacts archive with the spec.

