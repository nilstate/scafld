phases:
  - id: "phase1"
    name: "Runtime contract constants"
    objective: "Define stable schema versions and contract fields for handoff and session."
    changes:
      - file: "scafld/runtime_contracts.py"
        action: "create"
        content_spec: |
          Define HANDOFF_SCHEMA_VERSION and SESSION_SCHEMA_VERSION plus stable
          envelope field names, sibling `.md/.json` handoff paths, archive-aware
          run paths, and helper functions for creating validated
          handoff/session metadata.
      - file: "docs/run-artifacts.md"
        action: "create"
        content_spec: |
          Document handoff and session envelopes, schema_version, the role of
          phase_summaries, the `.ai/runs/{task-id}/` layout, and archive
          retention under `.ai/runs/archive/{YYYY-MM}/{task-id}/`.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Runtime contract smoke test passes."
        command: "bash tests/run_contracts_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:07Z"
        result_output: "PASS: run contracts smoke"
    status: "pending"

  - id: "phase2"
    name: "Minimal llm config"
    objective: "Add the smallest config surface that supports v1 handoffs and recovery."
    dependencies: ["phase1"]
    changes:
      - file: ".ai/config.yaml"
        action: "update"
        content_spec: |
          Add llm.model_profile, llm.context.budget_tokens, and
          llm.recovery.max_attempts. Avoid additional knobs in v1.
      - file: "docs/configuration.md"
        action: "update"
        content_spec: |
          Document only the minimal llm block and explain why the surface is
          intentionally small.
    acceptance_criteria:
      - id: "ac2_1"
        type: "documentation"
        description: "Config docs mention only the minimal v1 llm keys."
        command: >
          bash -lc 'for term in "model_profile" "budget_tokens" "max_attempts"; do rg -q "$term" .ai/config.yaml docs/configuration.md || exit 1; done'
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:08Z"
    status: "pending"

  - id: "phase3"
    name: "Generated-state rules"
    objective: "Make `.ai/runs` an explicit generated-state area that does not pollute workflow governance."
    dependencies: ["phase2"]
    changes:
      - file: "scafld/audit_scope.py"
        action: "update"
        content_spec: |
          Exclude `.ai/runs/` from scope audit and sync drift calculations.
      - file: "scafld/runtime_bundle.py"
        action: "update"
        content_spec: |
          Keep bundled docs/config aligned and mention generated run state where
          workspace layout is documented.
      - file: "docs/installation.md"
        action: "update"
        content_spec: |
          Mention `.ai/runs/` as generated state that normally stays uncommitted.
      - file: "scafld/commands/lifecycle.py"
        action: "update"
        content_spec: |
          Archive the run dir on `fail` and `cancel`, and expose the archive
          path in human and JSON output.
      - file: "scafld/commands/review.py"
        action: "update"
        content_spec: |
          Archive the run dir on `complete` and expose the archive path in human
          and JSON output.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document archived run retention and the runtime archive path returned
          by lifecycle commands.
      - file: "tests/package_smoke.sh"
        action: "update"
        content_spec: |
          Ensure bundled config/docs still package correctly after the runtime
          contract additions.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Package and lifecycle smoke pass."
        command: "bash tests/package_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:54:27Z"
        result_output: "[1/5] canonical version is in sync [2/5] build wheel [3/5] installed wheel exposes the expected version [4/6] installed wheel can init a workspace [5/6] installed wheel init is idempotent for the mana"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "rm -f scafld/runtime_contracts.py docs/run-artifacts.md tests/run_contracts_smoke.sh"
    phase2: "git checkout HEAD -- .ai/config.yaml docs/configuration.md"
    phase3: "git checkout HEAD -- scafld/audit_scope.py scafld/runtime_bundle.py scafld/commands/lifecycle.py scafld/commands/review.py docs/installation.md docs/cli-reference.md tests/package_smoke.sh tests/lifecycle_smoke.sh"

