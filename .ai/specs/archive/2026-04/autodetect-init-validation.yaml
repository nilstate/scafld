task:
  title: "Autodetect init validation commands"
  summary: >
    Make `scafld init` produce a more useful `.ai/config.local.yaml` by
    inspecting the current repo for common Node and Python toolchains and
    pre-populating suggested build, test, lint, and typecheck commands instead
    of generic placeholders. Fall back gracefully when the repo shape is
    unknown.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "cli"
      - "tests"
      - "docs"
    invariants:
      - "domain_boundaries"
      - "no_legacy_code"
      - "public_api_stable"
  objectives:
    - "Detect common Node and Python project markers during `scafld init`."
    - "Emit better starter commands in `.ai/config.local.yaml`."
    - "Keep unknown repos on a safe placeholder fallback."
  touchpoints:
    - area: "cli/scafld"
      description: "Add repo inspection helpers and use them when writing config.local."
    - area: "tests/update_smoke.sh"
      description: "Cover generated config output for detected and fallback cases."
    - area: "README.md"
      description: "Document that init now suggests commands from common project layouts."
    - area: "docs/installation.md"
      description: "Explain repo inspection and fallback behavior during init."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "`scafld init` detects common Node/Python markers and writes concrete starter commands."
        status: "pending"
      - id: "dod2"
        description: "Unknown repos still get a safe placeholder fallback."
        status: "pending"
      - id: "dod3"
        description: "Smoke coverage and docs reflect the new init behavior."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Update smoke covers init autodetection output."
        command: "bash tests/update_smoke.sh"
        expected: "exit code 0"

