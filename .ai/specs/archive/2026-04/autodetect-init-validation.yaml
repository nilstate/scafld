phases:
  - id: "phase1"
    name: "Detect Common Repo Toolchains During Init"
    objective: "Generate a more useful `.ai/config.local.yaml` from observed repo markers."
    changes:
      - file: "cli/scafld"
        action: "update"
        content_spec: |
          Inspect the current directory for common Node and Python markers
          (`package.json`, lockfiles, pyproject, requirements, test/lint scripts)
          and render concrete starter commands into `.ai/config.local.yaml`.
      - file: "tests/update_smoke.sh"
        action: "update"
        content_spec: |
          Add init fixtures that simulate detected Node/Python repos and a
          fallback repo with no recognizable markers.
      - file: "README.md"
        action: "update"
        content_spec: |
          Mention that init suggests starter commands based on common repo
          markers rather than generic placeholders.
      - file: "docs/installation.md"
        action: "update"
        content_spec: |
          Document autodetection behavior and fallback expectations.
    acceptance_criteria:
      - id: "ac1_1"
