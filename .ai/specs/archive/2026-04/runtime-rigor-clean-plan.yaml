task:
  title: "Slim plan output, --command/--files flags, plan-time scope conflict detection"
  summary: >
    `scafld plan <id>` today produces a 50+ line scaffold filled
    with `TODO: replace with...` placeholders. The operator (or
    LLM) edits each TODO to a real value before approval. Plus
    review-time `scope_drift` is the only audit_scope check, so
    overlapping work between active specs only surfaces on first
    review.

    1.7.0 ships the slim plan path:

      `scafld plan <id> -t "<title>" --command "<cmd>" --files "a.py,b.py"`

    produces a complete ~30-line spec. No `TODO` sentinels (so
    `validate_spec` at lifecycle_runtime.py:69-134 passes cleanly
    without a manual fill round). One phase, one criterion with
    explicit `expected_kind: exit_code_zero` (so
    `evaluate_acceptance_criterion`'s strict-unset-reject at
    acceptance.py:359-379 doesn't fire).

    The verbose template path (current behavior) is preserved when
    `--command` is omitted; multi-phase complex specs stay verbose
    by default.

    Plus: after the scaffold writes the slim spec,
    `audit_scope.classify_active_overlap` (audit_scope.py:124)
    runs against other active specs:
      - Files declared `shared` by another spec: auto-tag the new
        spec's change entry with `ownership: "shared"`.
      - Files declared exclusive by another spec: refuse to plan
        with `EC.SCOPE_DRIFT` and a one-line conflict message
        naming the other task.

    Schema-required fields not enforced by `validate_spec`
    (`task.context`, `task.objectives`, `task.touchpoints`,
    `task.acceptance`) are omitted by the slim template; renderers
    in handoff_renderer.py:115, output.py:269, and projections.py:109
    use `or []` fallbacks so missing fields render as empty
    sections rather than crashes.

    Hard cutover: existing 1.6.x specs (verbose, with TODO
    sentinels) keep working because the verbose template path is
    untouched. New slim specs are produced only when `--command`
    is supplied.
  size: "small"
  risk_level: "medium"
  context:
    files_impacted:
      - path: "scafld/spec_templates.py"
        reason: "Add `build_slim_spec_scaffold` (slim template) called when --command is provided; verbose `build_new_spec_scaffold` retained for the no-flag path."
      - path: "scafld/lifecycle_runtime.py"
        reason: "`new_spec_snapshot` accepts `command`/`files` kwargs; routes to slim scaffold when set; calls `audit_scope.classify_active_overlap` after write and applies ownership tags or refuses."
      - path: "scafld/workflow_runtime.py"
        reason: "`plan_snapshot` pipes `command`/`files` through to `new_spec_snapshot`."
      - path: "scafld/commands/workflow.py"
        reason: "`cmd_plan` reads `args.command` and `args.files` and forwards to `plan_snapshot`."
      - path: "scafld/commands/surface.py"
        reason: "Add `--command` and `--files` ArgumentSpecs to the `plan` and `new` CommandSpec arg tuples."
      - path: "scafld/audit_scope.py"
        reason: "Add `apply_shared_ownership(spec_text, shared_paths)` that rewrites declared change entries to add `ownership: shared`. Existing classify_active_overlap is reused as-is."
      - path: "tests/test_clean_plan.py"
        reason: "Cover slim template line count, --command/--files insertion, default size/risk, plan-time auto-tag, plan-time exclusive refusal."
      - path: "tests/review_gate_smoke.sh"
        reason: "Smoke for slim plan output and plan-time conflict refusal."
        ownership: "shared"
      - path: "docs/configuration.md"
        reason: "Document slim plan flags and plan-time conflict detection."
    cwd: "."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "`scafld plan <id> --command \"<cmd>\"` produces a spec under 40 lines with no `TODO` placeholders that would trip `validate_spec`."
        status: "done"
      - id: "dod2"
        description: "Slim spec criterion always carries explicit `expected_kind: exit_code_zero` so `evaluate_acceptance_criterion` doesn't strict-reject."
        status: "done"
      - id: "dod3"
        description: "`--files \"a.py,b.py\"` produces one `changes[].file` entry per declared file; `phases[].changes` is non-empty."
        status: "done"
      - id: "dod4"
        description: "Verbose template path (no `--command`) is unchanged; existing 1.6.x specs continue to plan/approve/build as before."
        status: "done"
      - id: "dod5"
        description: "After scaffold, `classify_active_overlap` runs; overlapping shared files auto-tag `ownership: shared` in the new spec; exclusive conflicts refuse to plan with `EC.SCOPE_DRIFT`."
        status: "done"
      - id: "dod6"
        description: "Operator docs cover `--command`, `--files`, and plan-time conflict behavior; smoke proves both slim shape and conflict refusal end-to-end."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
      - id: "v2"
        type: "test"
        command: "python3 -m unittest tests.test_clean_plan tests.test_acceptance"
        expected_kind: "exit_code_zero"
      - id: "v3"
        type: "boundary"
        description: "--command flag wired."
        command: "sh -c 'scafld plan --help 2>&1 | grep -q -- --command'"
        expected_kind: "exit_code_zero"
      - id: "v4"
        type: "boundary"
        description: "--files flag wired."
        command: "sh -c 'scafld plan --help 2>&1 | grep -q -- --files'"
        expected_kind: "exit_code_zero"

