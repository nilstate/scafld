phases:
  - id: "phase1"
    name: "Slim spec scaffold + --command/--files flags"
    objective: "`scafld plan <id> --command \"<cmd>\" --files \"a.py,b.py\"` produces a ~30-line slim spec ready to approve."
    changes:
      - file: "scafld/spec_templates.py"
        action: "update"
        content_spec: |
          - Add `build_slim_spec_scaffold(root, task_id, *, timestamp,
            title, command, files, size="small", risk_level="low")`.
          - Returned `text` template: spec_version, task_id,
            created, updated, status="draft", harden_status="in_progress",
            task.{title, summary (= title), size, risk_level},
            planning_log (one entry: "Spec created via scafld plan
            --command"), phases (one phase: id=phase1, name=title,
            objective="Implement <title>", changes (one per file with
            action: update, content_spec: "See task summary."),
            acceptance_criteria (one entry: id=ac1_1, command=<command>,
            expected_kind: exit_code_zero), status: pending).
          - No `task.context`, `task.objectives`, `task.touchpoints`,
            `task.acceptance`, top-level `validation`, or `rollback`.
            All omitted blocks degrade gracefully in renderers.
          - Returned dict keeps the existing scaffold contract:
            `{"text", "title", "size", "risk", "repo_context"}`.
      - file: "scafld/lifecycle_runtime.py"
        action: "update"
        content_spec: |
          `new_spec_snapshot` signature gains `command=None`, `files=None`.
          When `command` is set, route to `build_slim_spec_scaffold`
          (parsing comma-separated `files` into a list); else current
          `build_new_spec_scaffold` path unchanged.
      - file: "scafld/workflow_runtime.py"
        action: "update"
        content_spec: |
          `plan_snapshot` accepts `command=None`, `files=None` and forwards
          to `new_spec_snapshot`.
      - file: "scafld/commands/workflow.py"
        action: "update"
        content_spec: |
          `cmd_plan` reads `getattr(args, "command", None)` and
          `getattr(args, "files", None)`, forwards via kwargs.
      - file: "scafld/commands/surface.py"
        action: "update"
        content_spec: |
          On the `plan` and `new` CommandSpec arg tuples, add:
            ArgumentSpec(("--command",), {"help": "Acceptance command for the default criterion (slim spec)"}),
            ArgumentSpec(("--files",), {"help": "Comma-separated list of files the slim spec touches"}).
      - file: "tests/test_clean_plan.py"
        action: "create"
        content_spec: |
          - `test_slim_scaffold_under_40_lines`: build_slim_spec_scaffold
            returns text with line count < 40 (one phase, two files).
          - `test_slim_scaffold_no_todo_sentinels`: text doesn't match
            the validate_spec TODO regexes.
          - `test_slim_scaffold_explicit_expected_kind`: criterion has
            `expected_kind: exit_code_zero` written verbatim.
          - `test_slim_scaffold_command_inserted`: criterion `command`
            field equals what was passed.
          - `test_slim_scaffold_one_change_per_file`: --files "a.py,b.py"
            yields two changes entries.
          - `test_slim_scaffold_validates`: passing the produced text
            into validate_spec returns no errors.
          - `test_verbose_path_unchanged_when_no_command`: omitting
            command falls back to build_new_spec_scaffold (verify by
            absence of slim-only marker e.g. summary one-liner).
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T04:52:47Z"
