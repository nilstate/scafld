        command: "python3 -m unittest tests.test_clean_plan"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T04:53:33Z"
        result_output: "...........s ---------------------------------------------------------------------- Ran 12 tests in 0.006s  OK (skipped=1)"
      - id: "ac1_3"
        type: "boundary"
        description: "CLI flags wired."
        command: "sh -c 'scafld plan --help 2>&1 | grep -q -- --command && scafld plan --help 2>&1 | grep -q -- --files'"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T04:52:47Z"
    status: "completed"

  - id: "phase2"
    name: "Plan-time conflict detection"
    objective: "After scaffold, run audit_scope.classify_active_overlap; auto-tag shared, refuse on exclusive conflict."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/audit_scope.py"
        action: "update"
        content_spec: |
          Add `apply_shared_ownership(spec_text, shared_paths) -> str`:
          rewrites the slim spec text to add `ownership: "shared"` on
          each `phases[].changes[]` entry whose `file` is in
          `shared_paths`. Operates on text (not parsed yaml) so
          existing comments / formatting survive. Pure function,
          unit-testable.
      - file: "scafld/lifecycle_runtime.py"
        action: "update"
        content_spec: |
          In `new_spec_snapshot`, after `dest.write_text(scaffold["text"])`
          and before returning:
            - Re-read scaffold text via `dest.read_text()`.
            - Call `collect_declared_change_map(text)` to get declared
              files with ownership.
            - Call `active_declared_changes(root, exclude_task_id=task_id)`
              + `active_changes_by_file(...)`, then
              `classify_active_overlap(declared, other_by_file)`.
            - When `active_overlap` is non-empty (exclusive conflict):
              `dest.unlink()` (so plan didn't write a half-baked spec)
              and raise `ScafldError("plan refused: file <path> is exclusively owned by <other_task>", code=EC.SCOPE_DRIFT)`.
            - When `shared_with_other_active` is non-empty: rewrite
              text via `apply_shared_ownership` and `dest.write_text`.
            - Skip the audit when `declared` is empty (verbose template
              path with TODO file entries; audit_scope already filters
              path != "TODO").
      - file: "tests/test_clean_plan.py"
        action: "update"
        content_spec: |
          - `test_plan_auto_tags_shared_overlap`: pre-create an active
            spec declaring `tests/foo.py` as shared; new slim plan
            with `--files tests/foo.py` ends up with `ownership:
            shared` on the change entry.
          - `test_plan_refuses_on_exclusive_conflict`: pre-create an
            active spec declaring `scafld/foo.py` as exclusive; new
            slim plan with `--files scafld/foo.py` raises ScafldError
            with code SCOPE_DRIFT and the spec file is NOT written.
          - `test_plan_skips_audit_when_no_declared_files`: verbose
            template (no --command) plans cleanly even with active
            overlapping work.
          - `test_apply_shared_ownership_pure`: covers the text
            rewriter independently.
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T04:56:02Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac2_2"
        type: "test"
        command: "python3 -m unittest tests.test_clean_plan"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T04:56:14Z"
        result_output: "......sss........s ---------------------------------------------------------------------- Ran 18 tests in 0.006s  OK (skipped=4)"
    status: "completed"

  - id: "phase3"
    name: "Smoke + operator docs"
    objective: "End-to-end smoke for slim plan + conflict refusal. Document the new flags and behavior."
    dependencies:
      - "phase2"
    changes:
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `case_plan_produces_slim_spec`: `scafld plan slim-check
            --command "true" --files "scafld/empty.py"` writes a spec
            with line count < 40, no TODO sentinels, and approves
            without a fill round.
          - `case_plan_refuses_on_exclusive_conflict`: pre-create an
            active spec claiming `scafld/foo.py` exclusive; `scafld
            plan other --command "true" --files "scafld/foo.py"`
            exits non-zero with SCOPE_DRIFT and the new spec file is
            absent.
      - file: "docs/configuration.md"
        action: "update"
        ownership: "shared"
        content_spec: |
          New "Slim plan" subsection:
            - `scafld plan <id> -t "<title>" --command "<cmd>" --files "a.py,b.py"`
              produces a complete ~30-line spec ready to approve.
            - Slim specs always carry explicit
              `expected_kind: exit_code_zero` on the criterion.
            - Verbose template path (current behavior) is preserved
              when `--command` is omitted.
          New "Plan-time conflict detection" subsection:
            - After scaffold, scafld runs
              `audit_scope.classify_active_overlap`.
            - Files claimed `shared` by another active spec auto-tag
              the new spec's change entry with `ownership: shared`.
            - Files claimed exclusive by another active spec refuse
              the plan with `SCOPE_DRIFT` and name the other task.
    acceptance_criteria:
