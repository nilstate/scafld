task:
  title: Prove The Ceremony Pays Off On Real Repo Work
  summary: 'Dogfood scafld against a curated cohort of medium brownfield tasks until
    the real-standard question set is no longer theoretical. The real standard is
    explicit: build feels easier than a raw agent loop, review catches meaningful
    defects often enough to matter, the handoff is consumed by default, and the extra
    ceremony feels justified on real repo work. This slice defines the cohort, the
    fixed question set, the reporting script, and the smoke coverage that keeps them
    honest without introducing internal-only docs.

    '
  size: large
  risk_level: medium
  context:
    packages:
    - scripts/
    - tests/
    - .ai/specs/archive/
    - scafld/commands/reporting.py
    files_impacted:
    - path: scripts/real_standard.py
      lines: all
      reason: A cohort runner should summarize the real-standard questions from existing
        sessions and review artifacts.
    - path: tests/real_standard_cohort_smoke.sh
      lines: all
      reason: New smoke should keep the cohort script and fixed question set honest.
    - path: scafld/commands/reporting.py
      lines: all
      reason: Current report JSON should be consumable by the cohort script without
        new primitives.
    - path: .ai/specs/archive/
      lines: task-selected
      reason: Dogfood should run against real archived or newly executed medium tasks.
    invariants:
    - public_api_stable
    - config_from_env
    - no_test_logic_in_production
    related_docs:
    - README.md
    - docs/review.md
    - docs/execution.md
  objectives:
  - Define the real-standard question set as an explicit cohort contract.
  - Add a script that summarizes the real-standard signals from report/session/review
    data.
  - Keep the fixed question set encoded in the cohort script and smoke coverage rather
    than internal-only docs.
  - Make future release decisions depend on real repo work, not architecture confidence.
  scope:
    in_scope:
    - Dogfood cohort definition.
    - A thin cohort-summary script over existing report/session/review data.
    - Smoke coverage for the cohort script and fixed question set.
    out_of_scope:
    - Hosted telemetry.
    - A new report command.
    - Spec schema changes.
    - Forcing hard numeric release gates into core runtime behavior.
  dependencies:
  - build-happy-path-product-fit
  - challenger-review-signal-lift
  - default-handoff-consumption
  assumptions:
  - Some parts of the real standard remain partly qualitative and should be recorded
    honestly as operator notes.
  - The cohort script should consume existing report and session outputs rather than
    inventing a parallel telemetry layer.
  touchpoints:
  - area: dogfood cohort
    description: Medium brownfield tasks are the proving ground, not toy smoke tests.
  - area: operator notes
    description: Qualitative evidence should sit alongside the measurable signals,
      not be hand-waved away.
  - area: existing report surface
    description: The cohort script should stand on the current report/session/review
      artifacts.
  risks:
  - description: The cohort can turn into vanity reporting if the tasks are too small
      or too friendly.
    impact: high
    mitigation: Require medium brownfield tasks and record why each task is representative.
  - description: Qualitative notes can become vague and non-comparable.
    impact: medium
    mitigation: Use a fixed question set aligned to the real standard for each task.
  - description: A custom script can drift from current report/session contracts.
    impact: medium
    mitigation: Keep it thin and back it with a cohort smoke test.
  acceptance:
    validation_profile: standard
    definition_of_done:
    - id: dod1
      description: A fixed cohort question set exists in code and smoke coverage.
      status: pending
    - id: dod2
      description: A thin cohort script summarizes the real-standard signals from
        existing report/session/review data.
      status: pending
    - id: dod3
      description: The cohort summary surfaces build ease, review usefulness, default
        handoff consumption, and ceremony payoff as explicit prompts.
      status: pending
    - id: dod4
      description: A cohort smoke test proves the script and fixed question set stay
        aligned.
      status: pending
    validation:
    - id: v1
      type: custom
      description: Validate this draft spec.
      command: python3 cli/scafld validate real-work-dogfood-proof
      expected: exit code 0
    - id: v2
      type: test
      description: Run the cohort smoke and report smoke.
      command: bash tests/real_standard_cohort_smoke.sh && bash tests/report_metrics_smoke.sh
      expected: exit code 0
    - id: v3
      type: custom
      description: The cohort script can summarize an explicit task list.
      command: python3 scripts/real_standard.py --help
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not create a new telemetry artifact family.
    - Do not pretend the real standard is fully measurable from one number.
    - Do not replace existing report with a dogfood-specific subsystem.
  notes: 'This slice is the honesty check. The architecture is already strong enough.
    The remaining question is whether the product earns the ceremony on real repo
    work. Keep the implementation thin: a cohort script over existing artifacts plus
    smoke coverage for the fixed question set.

    '
