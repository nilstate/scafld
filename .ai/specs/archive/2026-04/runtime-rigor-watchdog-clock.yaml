task:
  title: Suspend-aware watchdog clock immune to laptop sleep
  summary: 'The provider watchdog (added in `review-runner-watchdog-and-retry`) uses
    `time.monotonic()` for the deadline. On macOS, Python''s `time.monotonic()` calls
    `clock_gettime(CLOCK_UPTIME_RAW)`, which explicitly excludes time spent in suspend.
    Symptom: laptop sleeps mid-review for two hours; on resume the watchdog''s elapsed
    counter has barely moved, the deadline is never reached, and the provider process
    keeps running until manually killed. Observed during cutover when a review hung
    2h10m through a sleep+resume cycle.

    `time.time()` (wall clock) has the opposite failure mode: NTP backward adjustments
    or manual clock changes can rewind it, silently extending a deadline.

    Neither clock alone is correct for "real time elapsed since I started." Together
    they are. A small `WallClockMonotonic` helper holds both starting timestamps and
    exposes one method, `elapsed()`, returning `max(wall_elapsed, monotonic_elapsed)`.
    Wall-clock catches suspend; monotonic catches NTP regression. The max() resolves
    any disagreement in favor of "more time has passed", which is exactly what a deadline
    cares about.

    Single helper, single method, single comparison. Replaces every direct `time.monotonic()`
    call in `_provider_watchdog` and the transient-retry exponential backoff path.

    '
  size: small
  risk_level: low
  context:
    packages:
    - scafld
    - tests
    files_impacted:
    - path: scafld/review_runner.py
      lines: task-selected
      reason: Adds the WallClockMonotonic helper class and rewires _provider_watchdog
        plus the transient-retry backoff to use it.
    - path: tests/test_review_runner.py
      lines: task-selected
      reason: Unit coverage for the helper under the suspend (wall jumps forward)
        and NTP-rewind (wall rewinds) failure modes.
    - path: docs/review.md
      lines: task-selected
      reason: Operator-facing note that the watchdog deadline is suspend-aware so
        a laptop sleep counts toward the deadline.
    invariants:
    - deadline_must_fire_after_wall_clock_elapses_even_if_monotonic_did_not
    - deadline_must_fire_after_monotonic_elapses_even_if_wall_clock_rewound
    - elapsed_must_only_move_forward_under_all_clock_conditions
    - watchdog_thread_remains_the_only_authoritative_force_kill_path
    related_docs:
    - plans/1.7.0-cutover.md
    - .ai/specs/archive/2026-04/review-runner-watchdog-and-retry.yaml
    - scafld/review_runner.py
    cwd: .
  objectives:
  - Make the configured timeout the real upper bound on a provider run regardless
    of laptop sleep or wall-clock adjustments.
  - Replace direct time.monotonic() reads in the watchdog with a single helper whose
    docstring explains the two-clock failure modes.
  - Keep the watchdog thread as the only authoritative force-kill path; no new signal
    handlers, no new processes.
  scope:
    in_scope:
    - WallClockMonotonic helper class with start_wall, start_mono, elapsed().
    - _provider_watchdog rewired to use the helper.
    - Transient-retry backoff sleep replaced with a helper-aware bounded wait so it
      also respects suspend.
    - Unit tests for the suspend and NTP-rewind cases via mocked time functions.
    - Operator docs entry.
    out_of_scope:
    - Replacing `subprocess.communicate(timeout=N)`'s internal timer (out of our control;
      the watchdog is the safety net).
    - Adding SIGALRM-based fallback (not thread-safe; conflicts with SIGINT cancel
      handler; out of scope).
    - External watcher process (heavy; not justified).
    - Changing the watchdog's terminate-then-kill grace logic (already correct).
  assumptions:
  - Python's `time.time()` and `time.monotonic()` are both monotonic-relative-to-themselves
    except for the documented failure modes; the max() across them gives a strictly
    forward-moving elapsed counter.
  - NTP backward steps are rare (typically slewed) and small (seconds, not hours);
    the wall-clock arm of the helper handles the more common suspend case.
  - A single helper instance per provider call is enough; no shared global clock needed.
  touchpoints:
  - area: watchdog timing
    description: WallClockMonotonic is the canonical 'time elapsed since this provider
      run started' source.
  - area: transient retry backoff
    description: Same helper bounds the inter-attempt sleep so a laptop sleep doesn't
      deceive the retry loop into running indefinitely.
  risks:
  - description: max() of wall and monotonic produces unexpectedly large jumps after
      sleep, firing the watchdog earlier than the operator expects.
    impact: low
    mitigation: "That IS the desired behavior \u2014 a 2h sleep means the deadline\
      \ elapsed; firing immediately on resume is correct. Documented in the helper's\
      \ docstring and in docs/review.md."
  - description: Wall-clock at process start is recorded before monotonic; clock skew
      could make elapsed() briefly negative on first call.
    impact: low
    mitigation: Helper takes both readings in adjacent statements (no syscalls between
      them); skew is at most microseconds. elapsed() returns max(...) which is bounded
      below by monotonic's start, so even pathological wall-clock readings can't go
      negative.
  - description: Tests using mocked time leak side effects into other tests.
    impact: low
    mitigation: Tests use unittest.mock.patch as a context manager scoped to each
      method; no module-level monkey patches.
  acceptance:
    validation_profile: standard
    definition_of_done:
    - id: dod1
      description: 'WallClockMonotonic.elapsed() returns max(wall_elapsed, monotonic_elapsed)
        under all mocked clock combinations: synchronized, wall-jumps-forward (suspend),
        wall-rewinds (NTP), monotonic-stalls (suspend on macOS).'
      status: pending
    - id: dod2
      description: _provider_watchdog uses the helper exclusively; no direct time.monotonic()
        reads remain in the watchdog body.
      status: pending
    - id: dod3
      description: Transient-retry backoff in run_external_review uses the helper
        to bound the sleep, so a suspend during backoff doesn't extend it beyond the
        configured cap.
      status: pending
    - id: dod4
      description: Unit test simulating a 2-hour wall-clock jump while monotonic stays
        flat asserts the watchdog fires on resume (deadline already elapsed).
      status: pending
    - id: dod5
      description: Unit test simulating a 30-second NTP rewind asserts the watchdog
        still fires when monotonic crosses the deadline.
      status: pending
    - id: dod6
      description: Operator doc explains the two-clock model and that suspend counts
        toward the deadline.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Python sources compile.
      command: python3 -m compileall scafld tests
      expected_kind: exit_code_zero
    - id: v2
      type: test
      description: Watchdog-clock unit tests pass.
      command: python3 -m unittest tests.test_review_runner
      expected_kind: exit_code_zero
    - id: v3
      type: boundary
      description: WallClockMonotonic class exists and is importable.
      command: python3 -c 'from scafld.review_runner import WallClockMonotonic; c
        = WallClockMonotonic(); assert c.elapsed() >= 0'
      expected_kind: exit_code_zero
