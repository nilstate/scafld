phases:
- id: phase1
  name: WallClockMonotonic helper
  objective: Add the helper class with elapsed() returning max(wall_elapsed, monotonic_elapsed).
    Pure unit-testable; no callers yet.
  changes:
  - file: scafld/review_runner.py
    action: update
    ownership: shared
    content_spec: "Add at module level near the existing watchdog constants:\n```python\n\
      class WallClockMonotonic:\n    \"\"\"Elapsed-time clock immune to both macOS\
      \ suspend (which\n    freezes time.monotonic via CLOCK_UPTIME_RAW) and NTP\n\
      \    backward adjustments (which can rewind time.time).\n    elapsed() returns\
      \ the larger of the two readings, which\n    is the correct semantic for a deadline:\
      \ time only moves\n    forward.\n    \"\"\"\n\n    def __init__(self):\n   \
      \     self._start_wall = time.time()\n        self._start_mono = time.monotonic()\n\
      \n    def elapsed(self):\n        return max(\n            time.time() - self._start_wall,\n\
      \            time.monotonic() - self._start_mono,\n        )\n```\nPlace near\
      \ WATCHDOG_GRACE_SECONDS / WATCHDOG_POLL_SECONDS.\n"
  - file: tests/test_review_runner.py
    action: update
    ownership: shared
    content_spec: "New `WallClockMonotonicTest` class. Tests:\n  - Construction with\
      \ no clock skew: elapsed() near 0.\n  - Synchronized advance: both clocks advance\
      \ by 5s ->\n    elapsed() ~ 5s.\n  - Wall-jumps-forward (suspend): wall advances\
      \ by 7200s,\n    monotonic stays at 0 -> elapsed() == 7200.\n  - Monotonic-advances\
      \ (normal active session): monotonic\n    advances by 5s, wall stays at 0 ->\
      \ elapsed() == 5.\n  - Wall-rewinds (NTP): wall rewinds by 30s, monotonic\n\
      \    advances by 5s -> elapsed() == 5 (monotonic arm wins).\n  - Combined: wall\
      \ advances 5s, monotonic advances 3s ->\n    elapsed() == 5 (max).\nAll tests\
      \ use `unittest.mock.patch.object(scafld.review_runner.time,\n...)` scoped to\
      \ the test method.\n"
