- id: phase3
  name: Transient-retry backoff respects suspend
  objective: The exponential backoff sleep in `run_external_review` between transient
    retries also uses the helper, so a suspend during backoff doesn't silently extend
    the wait.
  dependencies:
  - phase2
  changes:
  - file: scafld/review_runner.py
    action: update
    ownership: shared
    content_spec: "Inside `run_external_review` where the transient retry\nbackoff\
      \ lives:\n  - Replace the bare `time.sleep(min(2 ** transient_attempt, 8))`\n\
      \    with a helper-bounded wait: spin the configured backoff\n    window using\
      \ a `WallClockMonotonic` and `time.sleep(0.1)`\n    ticks, exiting early if\
      \ elapsed() exceeds the backoff\n    window. So a suspend during backoff finishes\
      \ the wait\n    \"immediately\" on resume rather than continuing to sleep\n\
      \    for the remaining budget.\n  - Preserve the KeyboardInterrupt path (existing\
      \ typed\n    cancel marker) inside the new wait loop.\n"
  - file: docs/review.md
    action: update
    content_spec: "New \"Watchdog deadlines and laptop sleep\" subsection:\n  - The\
      \ watchdog deadline is suspend-aware: time spent with\n    the laptop asleep\
      \ counts toward the deadline.\n  - On resume after a long sleep, an in-flight\
      \ review may\n    be force-killed immediately if the deadline already\n    elapsed.\
      \ This is correct: the operator-configured\n    timeout is wall-clock based.\n\
      \  - To run a review across a long expected sleep, set\n    `review.external.timeout_seconds`\
      \ higher than the sleep\n    window OR run review on a non-suspending host.\n"
  - file: tests/test_review_runner.py
    action: update
    ownership: shared
    content_spec: "New `RunExternalReviewBackoffSuspendTest` class. Tests:\n  - Mock\
