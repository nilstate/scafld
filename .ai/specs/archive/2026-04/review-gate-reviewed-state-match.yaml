task:
  title: Make review binding honest and review reopen idempotent
  summary: 'Fix the review lifecycle so scafld can close real work without tripping
    over its own control-plane artifacts. Today `review` fingerprints workspace state
    before it emits review handoffs and session files, so `complete` can fail even
    when the reviewer followed the documented flow. Re-running `review` while the
    latest round is still in progress also appends a second round instead of refreshing
    the active one, which makes dogfood noisy and breaks the one-open-review mental
    model. This slice should make review binding track the actual reviewed engineering
    state, ignore scafld-generated review control-plane files, refresh incomplete
    rounds in place, and prove the flow with smoke coverage that exercises the real
    CLI.

    '
  size: medium
  risk_level: medium
  context:
    packages:
    - scafld
    - tests
    - docs
    files_impacted:
    - path: scafld/review_workflow.py
      lines: task-selected
      reason: Review-open should bind reviewed state at the right moment and refresh
        incomplete rounds instead of appending duplicates.
    - path: scafld/git_state.py
      lines: task-selected
      reason: Reviewed-state capture must support excluding review control-plane paths
        cleanly.
    - path: scafld/review_runtime.py
      lines: task-selected
      reason: Review JSON output should reflect whether a round was opened or refreshed.
    - path: scafld/commands/reporting.py
      lines: task-selected
      reason: Report should use the same reviewed-state semantics as complete when
        checking drift.
    - path: tests/review_gate_smoke.sh
      lines: task-selected
      reason: The real CLI smoke should prove review-open to complete works without
        false drift and that rerunning review refreshes the active round.
    - path: docs/review.md
      lines: task-selected
      reason: The operator docs should describe the honest review binding model and
        idempotent reopen behavior.
    invariants:
    - review_gate_is_the_quality_boundary
    - control_plane_artifacts_do_not_count_as_reviewed_product_changes
    - one_open_review_round_per_task
    - human_output_remains_default
    - json_mode_uses_stable_envelopes
    related_docs:
    - AGENTS.md
    - CONVENTIONS.md
    - README.md
    - docs/review.md
    - docs/lifecycle.md
  objectives:
  - Bind review rounds to the actual reviewed engineering workspace instead of a pre-handoff
    snapshot.
  - Exclude scafld-generated review control-plane artifacts from reviewed-state drift
    checks without hiding real product-file changes.
  - Make `scafld review` refresh the latest in-progress round instead of appending
    Review 2 noise.
  - Expose the refresh/open distinction in the machine-readable review payload.
  - Prove the fixed flow with smoke coverage using the real packaged CLI.
  scope:
    in_scope:
    - Reviewed-state capture and drift checks for review/complete/report.
    - Refreshing the latest in-progress review round in place.
    - Review docs and JSON payload updates that describe the new behavior.
    - CLI smoke coverage for real review-open and complete behavior.
    out_of_scope:
    - Changing the challenger artifact schema.
    - Changing build/execution semantics outside the review gate.
    - A broader rewrite of the session store or handoff renderer.
  assumptions:
  - The task-scoped `.ai/runs/{task_id}` tree is control-plane state and should not
    block completion.
  - The review artifact itself should remain excluded from reviewed-state capture.
  - Refreshing an incomplete round should replace stale scaffold content rather than
    silently preserving stale partial findings.
  touchpoints:
  - area: review binding
    description: The reviewed-state contract should mean product files changed after
      review, not scafld's own handoff/session churn.
  - area: review reopen UX
    description: Operators should see one active round until the challenger finishes
      it.
  - area: machine output
    description: JSON review output should tell automation whether a round was opened
      or refreshed.
  risks:
  - description: Over-broad exclusions could let real engineering changes slip past
      the review gate.
    impact: high
    mitigation: Exclude only the review artifact and the task-scoped control-plane
      run tree; keep product files and the active spec in scope.
  - description: Refreshing an in-progress round could corrupt the review file if
      the replacement logic is loose.
    impact: medium
    mitigation: Operate on the latest round boundary explicitly and cover it with
      smoke assertions on round count and headings.
  - description: Report/status drift checks could diverge from complete again if they
      keep separate exclusion logic.
    impact: medium
    mitigation: Move reviewed-state exclusion rules into shared review helpers and
      reuse them everywhere.
  acceptance:
    validation_profile: strict
    definition_of_done:
    - id: dod1
      description: A freshly opened review round can be completed after the challenger
        fills it in, without false drift from scafld-generated task artifacts.
      status: pending
    - id: dod2
      description: Re-running `scafld review` while the latest round is still in progress
        refreshes that round in place.
      status: pending
    - id: dod3
      description: Review drift checks share one exclusion model across review, complete,
        and report.
      status: pending
    - id: dod4
      description: Review JSON output exposes whether the latest round was opened
        or refreshed.
      status: pending
    - id: dod5
      description: Review docs and smoke tests describe and prove the new lifecycle
        behavior.
      status: pending
    validation:
    - id: v1
      type: compile
      description: Compile the Python sources after the review lifecycle changes.
      command: python3 -m compileall scafld cli
      expected: exit code 0
    - id: v2
      type: integration
      description: Review gate smoke proves honest binding and idempotent reopen behavior.
      command: bash tests/review_gate_smoke.sh
      expected: exit code 0
    - id: v3
      type: integration
      description: Lifecycle smoke still passes with the refreshed review semantics.
      command: bash tests/lifecycle_smoke.sh
      expected: exit code 0
  constraints:
    approvals_required: []
    non_goals:
    - Do not weaken the review gate by ignoring arbitrary untracked or modified files.
    - Do not append compatibility shims around the broken flow; fix the lifecycle
      boundary directly.
    - Do not change the review markdown contract in a way that breaks existing completed
      artifacts.
  notes: 'This is the dogfood blocker. The fix needs to feel clean enough that using
    raw `scafld review` and `scafld complete` on a real repo no longer feels brittle
    or ceremonial.

    '
