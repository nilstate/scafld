    action: update
    content_spec: Centralize the review-binding exclusions, materialize review control-plane
      files before the binding snapshot is finalized, and reuse the same capture semantics
      in gate evaluation.
  - file: scafld/git_state.py
    action: update
    content_spec: Support reviewed-state capture with explicit multiple exclusions
      rather than a single review file path.
  - file: scafld/commands/reporting.py
