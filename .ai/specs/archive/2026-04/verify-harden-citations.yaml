task:
  title: "Verify harden citations"
  summary: >
    Add warning-only verification for `harden_rounds[*].questions[*].grounded_in`
    so `scafld harden --mark-passed` can catch cheap fake citations without
    turning harden into a gate. `code:<file>:<line>` entries should warn when the
    file does not exist or the line is out of bounds. `archive:<task_id>` entries
    should warn when no archived spec exists. The command should still mark the
    round passed.
  size: "small"
  risk_level: "low"
  context:
    packages:
      - "cli"
      - "tests"
      - "docs"
    invariants:
      - "domain_boundaries"
      - "no_legacy_code"
      - "public_api_stable"
  objectives:
    - "Warn when harden citations are structurally valid but unresolvable."
    - "Keep `scafld harden --mark-passed` non-blocking."
    - "Document the warning behavior and cover it in smoke tests."
  touchpoints:
    - area: "cli/scafld"
      description: "Add citation resolution helpers and emit warnings during `--mark-passed`."
    - area: "tests/harden_smoke.sh"
      description: "Add fake citation fixtures and assert warning-only behavior."
    - area: "docs/cli-reference.md"
      description: "Document that citation verification warns but does not block."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "Fake `code:` and `archive:` citations produce warnings during `--mark-passed`."
        status: "pending"
      - id: "dod2"
        description: "`--mark-passed` still succeeds and closes the round after warnings."
        status: "pending"
      - id: "dod3"
        description: "Smoke tests and docs reflect the warning-only contract."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Harden smoke covers citation verification."
        command: "bash tests/harden_smoke.sh"
        expected: "exit code 0"

