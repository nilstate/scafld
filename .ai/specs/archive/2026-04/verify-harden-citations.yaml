phases:
  - id: "phase1"
    name: "Warn On Unresolvable Harden Citations"
    objective: "Teach `scafld harden --mark-passed` to verify and warn on fake citations."
    changes:
      - file: "cli/scafld"
        action: "update"
        content_spec: |
          Add helpers that inspect the latest harden round and verify `grounded_in`
          references. Warn on missing archive specs, missing files, and out-of-range
          line numbers for `code:` citations. Keep the command successful.
      - file: "tests/harden_smoke.sh"
        action: "update"
        content_spec: |
          Add a fixture round containing resolvable and unresolvable citations and
          assert that `--mark-passed` emits warnings but still exits 0.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Mention that `--mark-passed` verifies harden citations and warns on
          unresolvable entries without blocking completion.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Harden smoke passes with citation verification enabled."
        command: "bash tests/harden_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-21T06:53:43Z"
