phases:
  - id: "phase1"
    name: "Structured severity on findings + threshold-aware gate"
    objective: "Parse severity into the review_data payload. evaluate_review_gate respects review.gate_severity. Default keeps current behavior (only Blocking-section findings gate)."
    changes:
      - file: "scafld/reviewing.py"
        action: "update"
        content_spec: |
          - Add `parse_finding_severity(line)` that runs FINDING_LINE_RE
            and returns the captured severity ("critical"|"high"|
            "medium"|"low") lowercased, or None when the line doesn't
            match the format.
          - In `parse_review_file`, after appending a bullet to
            `blocking` / `non_blocking`, attach a structured payload
            (still keep the raw bullet string for back-compat in
            renderers): `parsed["non_blocking_findings"] = [{"line":
            <bullet>, "severity": <str|None>}, ...]` and same for
            blocking. The existing `blocking` / `non_blocking` lists of
            raw strings stay intact.
      - file: "scafld/review_workflow.py"
        action: "update"
        content_spec: |
          - Add `_load_gate_severity(root)` that reads
            `review.gate_severity` from `load_config(...)` (paths
            already in scope from existing review-config readers).
            Returns one of "blocking", "medium", "low"; falls back to
            "blocking" on any other value.
          - Add `SEVERITY_RANK = {"critical": 4, "high": 3, "medium": 2,
            "low": 1, "blocking": 0}` private to this module.
          - In `evaluate_review_gate`: after the existing pass branch
            (verdict pass / pass_with_issues), if `_load_gate_severity`
            is not "blocking", scan
            `review_data.get("non_blocking_findings", [])` and collect
            those whose severity rank ≥ threshold rank. When any exist,
            set `gate_reason = f"latest review has {n} non-blocking
            finding(s) at or above severity {threshold}"` and append
            them to `gate_errors`.
          - Surface the threshold and counts on the returned dict:
            `gate_threshold`, `gate_blocking_count`,
            `gate_advisory_count` (count of non-blocking findings BELOW
            the threshold; advisory only).
      - file: "scafld/runtime_guidance.py"
        action: "update"
        content_spec: |
          `review_gate_snapshot` propagates the new fields onto the
          `review_gate` payload returned to status_snapshot and
          cmd_complete: `gate_threshold`, `gate_blocking_count`,
          `gate_advisory_count`. No semantics change for default callers.
      - file: "tests/test_review_gate_severity.py"
        action: "create"
        content_spec: |
          - `test_default_blocking_passes_pass_with_issues`: review with
            non-blocking medium finding + default gate → gate_reason is
            None.
          - `test_threshold_medium_blocks_non_blocking_medium`:
            gate_severity=medium + non-blocking medium finding →
            gate_reason names "non-blocking finding(s) at or above
            severity medium".
          - `test_threshold_medium_passes_non_blocking_low`:
            gate_severity=medium + non-blocking low only → gate_reason
            is None.
          - `test_threshold_low_blocks_any_non_blocking`: gate_severity=
            low + non-blocking low → gate_reason set.
          - `test_advisory_count_below_threshold`: gate_severity=medium
            + 2 non-blocking low → gate_advisory_count == 2.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:09:45Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Listing 'tests'..."
      - id: "ac1_2"
        type: "test"
        command: "python3 -m unittest tests.test_review_gate_severity"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:09:45Z"
        result_output: "............. ---------------------------------------------------------------------- Ran 13 tests in 0.004s  OK"
    status: "completed"

  - id: "phase2"
    name: "Advisory line on complete output"
    objective: "cmd_complete prints `advisory: N finding(s)` when non-blocking findings exist under the threshold."
    dependencies:
      - "phase1"
    changes:
      - file: "scafld/commands/review.py"
        action: "update"
        ownership: "shared"
        content_spec: |
          In `cmd_complete`, on the success path (after the gate clears
          and the spec is moved to archive), if
          `review_gate.gate_advisory_count > 0`, print:
            `  advisory: N finding(s) under threshold (use 'scafld report' for detail)`.
          When non-zero severity breakdown exists, also print one line
          per severity bucket: `    medium: 2 / low: 1` etc. JSON mode
          surfaces `advisory_findings_count` and
          `advisory_severity_breakdown` on the result payload.
      - file: "tests/test_review_gate_severity.py"
        action: "update"
        content_spec: |
          - `test_complete_payload_carries_advisory_count`: invoke
            cmd_complete (or the snapshot helper) on a fixture spec
            with a passed pass_with_issues review and verify
            `result.advisory_findings_count` and
            `advisory_severity_breakdown`.
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:11:27Z"
        result_output: "Listing 'scafld'... Listing 'scafld/commands'... Compiling 'scafld/commands/review.py'... Listing 'tests'..."
      - id: "ac2_2"
        type: "test"
        command: "python3 -m unittest tests.test_review_gate_severity"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:11:27Z"
        result_output: ".............. ---------------------------------------------------------------------- Ran 14 tests in 0.004s  OK"
    status: "completed"

  - id: "phase3"
    name: "Smoke + docs (single-round-by-default)"
    objective: "Smoke-prove threshold + advisory paths. Document single-round-by-default semantics. Trim CLAUDE.md discipline section."
    dependencies:
      - "phase2"
    changes:
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        ownership: "shared"
        content_spec: |
          - `case_complete_advisory_findings_pass`: review fixture with
            non-blocking medium findings + default gate → complete
            succeeds and stdout contains `advisory:`.
          - `case_complete_blocks_on_medium_when_threshold_set`: same
            fixture + `review.gate_severity: medium` in `.ai/config.yaml`
            → complete refuses and stdout names the gate_reason.
      - file: "docs/configuration.md"
        action: "update"
        ownership: "shared"
        content_spec: |
          New "Review gate severity" subsection:
            - `review.gate_severity` defaults to `blocking`.
            - Single-round-by-default: `pass` and `pass_with_issues`
              verdicts ship; only blocking findings drive iteration.
            - Set `gate_severity: medium` for strict iteration. Findings
              must declare severity (already enforced by review parser).
      - file: "CLAUDE.md"
        action: "update"
        ownership: "shared"
        content_spec: |
          Replace the agent-discipline section with a short pointer to
          CLI behavior: default is blocking-only iteration; opt into
          strict iteration via `gate_severity: medium` in
          `.ai/config.yaml`.
    acceptance_criteria:
      - id: "ac3_1"
        type: "boundary"
        command: "bash -n tests/review_gate_smoke.sh"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:13:27Z"
      - id: "ac3_2"
        type: "boundary"
        description: "Severity smokes registered."
        command: "sh -c 'grep -q case_complete_advisory_findings_pass tests/review_gate_smoke.sh && grep -q case_complete_blocks_on_medium_when_threshold_set tests/review_gate_smoke.sh'"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:13:27Z"
      - id: "ac3_3"
        type: "boundary"
        description: "Docs cover gate_severity."
        command: "grep -qiE 'gate_severity|Review gate severity' docs/configuration.md"
        expected_kind: "exit_code_zero"
        result: "pass"
        executed_at: "2026-04-28T03:13:27Z"
    status: "completed"

