task:
  title: "Severity-gated complete + single-round-by-default review semantics"
  summary: >
    Today `scafld review` returns verdict + findings.
    `evaluate_review_gate` (review_workflow.py:696) blocks complete
    when verdict is `fail`. `pass_with_issues` (non-blocking
    findings only) ships through. That part already works. What
    1.7.0 adds is explicit operator control over what "blocking"
    means and the documented single-round-by-default contract.

    Two changes:

      1. `review.gate_severity` config setting (default `blocking`).
         Reads via a small loader in review_workflow.py — config has
         no allowlist mechanism, just deep-merged YAML. When
         `medium`, non-blocking findings tagged `medium` or higher
         become gate-blocking. When `low`, every finding blocks
         (strict iteration). The default keeps current behavior.

      2. `scafld complete` surfaces an `advisory: N finding(s)` line
         when there are non-blocking findings under the gate
         threshold, so the operator/agent knows what was deferred
         without re-reading the review file.

    Plus: doc + smoke promote the stopping rule from CLAUDE.md
    discipline → CLI behavior. A `pass` or `pass_with_issues`
    verdict means one round is enough. Iteration is bounded by
    blocking severity, not finding count.

    Hard cutover: existing review files keep gating as today under
    the default. Operators who set `gate_severity: medium` need
    findings with severity declarations (already required by
    `FINDING_LINE_RE` in reviewing.py:14).
  size: "small"
  risk_level: "low"
  context:
    files_impacted:
      - path: "scafld/reviewing.py"
        reason: "Extract severity from FINDING_LINE_RE group 1; expose structured findings on parsed payload."
      - path: "scafld/review_workflow.py"
        reason: "Add gate_severity reader; evaluate_review_gate threshold check on non-blocking findings."
      - path: "scafld/runtime_guidance.py"
        reason: "review_gate_snapshot surfaces threshold + advisory count + severity breakdown to status/complete."
      - path: "scafld/commands/review.py"
        reason: "cmd_complete prints the `advisory: N finding(s)` line on the success path."
      - path: "tests/test_review_gate_severity.py"
        reason: "Cover default + medium + low gate thresholds + advisory output."
      - path: "tests/review_gate_smoke.sh"
        reason: "Smoke for severity-gated complete + advisory path."
        ownership: "shared"
      - path: "docs/configuration.md"
        reason: "Document review.gate_severity and the single-round-by-default contract."
      - path: "CLAUDE.md"
        reason: "Trim the discipline section; point at the CLI behavior."
        ownership: "shared"
    cwd: "."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Parsed findings carry structured severity (critical|high|medium|low) on the review_data payload."
        status: "done"
      - id: "dod2"
        description: "`review.gate_severity` defaults to `blocking`; only Blocking-section findings gate complete."
        status: "done"
      - id: "dod3"
        description: "Setting `review.gate_severity: medium` makes non-blocking medium-or-higher findings block complete with a named gate_reason."
        status: "done"
      - id: "dod4"
        description: "`scafld complete` surfaces `advisory: N finding(s)` when non-blocking findings exist under the threshold."
        status: "done"
      - id: "dod5"
        description: "Operator docs + smoke cover the threshold + advisory paths; CLAUDE.md discipline section points at CLI."
        status: "done"
    validation:
      - id: "v1"
        type: "compile"
        command: "python3 -m compileall scafld tests"
        expected_kind: "exit_code_zero"
      - id: "v2"
        type: "test"
        command: "python3 -m unittest tests.test_review_gate_severity"
        expected_kind: "exit_code_zero"
      - id: "v3"
        type: "boundary"
        description: "Docs cover gate_severity."
        command: "grep -q 'gate_severity' docs/configuration.md"
        expected_kind: "exit_code_zero"

