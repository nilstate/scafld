task:
  title: "Add lifecycle end-to-end smoke test"
  summary: >
    Add a true workflow smoke test that exercises the core lifecycle on a tiny
    fixture repo: `init -> new -> validate -> approve -> start -> exec -> review
    -> complete`. This should verify that the commands continue to compose after
    recent changes to harden, review gating, and reporting.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "tests"
      - "cli"
      - "docs"
    invariants:
      - "domain_boundaries"
      - "no_legacy_code"
      - "public_api_stable"
  objectives:
    - "Exercise the happy-path lifecycle end to end on a disposable git repo."
    - "Verify that exec, review, and complete still compose cleanly."
    - "Document the coverage so future changes treat it as a core workflow check."
  touchpoints:
    - area: "tests/lifecycle_smoke.sh"
      description: "New end-to-end lifecycle smoke coverage."
    - area: ".github/workflows/review-gate-smoke.yml"
      description: "Run the new lifecycle smoke in CI."
    - area: "docs/quickstart.md"
      description: "Reference the lifecycle smoke as an integrity check."
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "A single smoke test covers the lifecycle from init to complete."
        status: "pending"
      - id: "dod2"
        description: "CI runs the lifecycle smoke alongside existing smoke coverage."
        status: "pending"
      - id: "dod3"
        description: "Docs mention the new end-to-end workflow check."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Lifecycle smoke passes locally."
        command: "bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"

