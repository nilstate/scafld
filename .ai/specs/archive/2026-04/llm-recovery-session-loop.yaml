spec_version: "1.1"
task_id: "llm-recovery-session-loop"
created: "2026-04-23T08:49:58Z"
updated: "2026-04-23T12:56:07Z"
status: "completed"
harden_status: "not_run"

task:
  title: "Session Recovery And Phase Compaction"
  summary: >
    Add the run-time ledger beneath the existing execution flow. scafld should
    record execution attempts in session.json, write compact phase summaries at
    phase boundaries, preserve full diagnostics in .ai/runs, and surface
    recovery as a handoff kind rather than a separate subsystem. When recovery
    reaches the configured cap, exec should stop emitting new recovery
    handoffs, mark the criterion `failed_exhausted`, and require a human.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "scafld/acceptance.py"
      - "scafld/commands/execution.py"
      - "scafld/runtime_contracts.py"
      - "scafld/handoff_renderer.py"
      - "docs/"
      - "tests/"
    files_impacted:
      - path: "scafld/session_store.py"
        lines: "all"
        reason: "New module for session.json creation, append-mostly updates, and phase summaries."
      - path: "scafld/acceptance.py"
        lines: "1-260"
        reason: "Acceptance outcomes must preserve full diagnostics for session-linked artifacts while keeping spec snippets short."
      - path: "scafld/commands/execution.py"
        lines: "1-420"
        reason: "exec should initialize session state, append attempts, write phase summaries, and emit recovery handoffs."
      - path: "scafld/error_codes.py"
        lines: "1-120"
        reason: "Execution needs a distinct recovery_exhausted error code."
      - path: "scafld/handoff_renderer.py"
        lines: "1-260"
        reason: "Recovery handoffs should render from session state, failed criteria, and diagnostic references."
      - path: "scafld/commands/handoff.py"
        lines: "1-220"
        reason: "handoff should be able to regenerate the current recovery handoff from session state."
      - path: "docs/execution.md"
        lines: "all"
        reason: "Document session ledger rules, phase compaction, and diagnostics."
      - path: "docs/cli-reference.md"
        lines: "all"
        reason: "Document recovery selection through scafld handoff."
      - path: "docs/run-artifacts.md"
        lines: "all"
        reason: "Document failed_exhausted and blocked-phase session state."
      - path: "tests/session_recovery_smoke.sh"
        lines: "all"
        reason: "New smoke test for exec/session/recovery handoff flow."
      - path: "tests/recovery_cap_smoke.sh"
        lines: "all"
        reason: "Smoke test for recovery exhaustion and human-required output."
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "no_legacy_code"
      - "config_from_env"
    related_docs:
      - "plans/llm-performance-cutover.md"
      - "docs/execution.md"
      - "docs/run-artifacts.md"
  objectives:
    - "Create session.json as the only durable execution-state source."
    - "Write phase_summaries[] at phase boundaries so later handoffs read compact prior state."
    - "Persist full diagnostics under .ai/runs/{task-id}/diagnostics/ while keeping short spec snippets."
    - "Represent recovery purely as handoff.kind = recovery plus counters and limits recorded in session."
    - "At the recovery cap, record failed_exhausted, block the phase, and surface human_required instead of another handoff."
  scope:
    in_scope:
      - "Session ledger shape and update helpers."
      - "Execution attempt recording."
      - "Phase compaction."
      - "Diagnostic artifact capture."
      - "Recovery handoff generation under existing exec flow."
    out_of_scope:
      - "Automatically calling an LLM provider."
      - "Adding recover or session as new public commands."
      - "Changing lifecycle approval gates."
  dependencies:
    - "llm-run-schema-and-config should land first so session contracts and .ai/runs ownership are defined."
    - "llm-context-pack-prompt-compiler should land first so recovery reuses the handoff renderer."
  assumptions:
    - "External agents still apply repairs; scafld only compiles the recovery handoff."
    - "Spec result_output remains intentionally short for audit readability."
  touchpoints:
    - area: "Execution ledger"
      description: "session.json records attempts, recovery counts, selectors, and phase summaries."
    - area: "Phase-boundary compaction"
      description: "exec writes compact summaries when a phase completes and later handoffs read those summaries instead of raw prior output."
    - area: "Diagnostics"
      description: "Full stdout/stderr is written to run artifacts referenced from session attempts."
    - area: "Recovery"
      description: "Failures generate recovery handoffs through the same renderer used for phase and review."
    - area: "Recovery cap"
      description: "Exhausted criteria are marked in session, block the phase, and stop generating new recovery handoffs."
  risks:
    - description: "Command diagnostics can contain secrets."
      impact: "high"
      mitigation: "Document that acceptance commands should avoid printing secrets and keep raw diagnostics in run artifacts only."
    - description: "Session updates can drift if handoffs are treated as state."
      impact: "high"
      mitigation: "Keep session as the only durable source of truth and regenerate handoffs from it."
    - description: "Unbounded retries can hide broken criteria."
      impact: "medium"
      mitigation: "Use llm.recovery.max_attempts and record all attempts explicitly in session."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "scafld exec creates or updates session.json as the durable run ledger."
        status: "pending"
      - id: "dod2"
        description: "Successful phase advancement writes a phase summary and later handoffs consume it."
        status: "pending"
      - id: "dod3"
        description: "Failed criteria persist full diagnostics in .ai/runs and emit a recovery handoff until the configured cap."
        status: "pending"
      - id: "dod4"
        description: "Exhausted criteria become failed_exhausted, block the phase, and return human_required without adding new public commands."
        status: "pending"
    validation:
      - id: "v1"
        type: "custom"
        description: "Validate this draft spec."
        command: "python3 cli/scafld validate llm-recovery-session-loop"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Run session recovery smoke test."
        command: "bash tests/session_recovery_smoke.sh"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Run recovery cap smoke test."
        command: "bash tests/recovery_cap_smoke.sh"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Run lifecycle smoke to prove existing exec behavior still works."
        command: "bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
  constraints:
    approvals_required: []
    non_goals:
      - "Do not store run-state counters in handoff files."
      - "Do not introduce separate telemetry or recovery artifacts as new primitives."
      - "Do not implement unbounded self-healing."
  notes: >
    Recovery handoffs should render from the recovery template with sections for
    failed criterion, expected result, relevant spec slice, compact prior phase
    summary, prior attempts, diagnostics reference, constraints, and required
    output. session.json should have its own schema_version so renderer changes
    do not silently break older runs. At `llm.recovery.max_attempts + 1`,
    `exec` stops emitting recovery handoffs, records `failed_exhausted`,
    blocks the phase, and returns `next_action.type = human_required`.

