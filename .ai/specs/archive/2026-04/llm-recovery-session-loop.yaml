phases:
  - id: "phase1"
    name: "Session ledger"
    objective: "Create the append-mostly session store under .ai/runs/{task-id}/session.json."
    changes:
      - file: "scafld/session_store.py"
        action: "create"
        content_spec: |
          Provide helpers for creating, loading, and appending to session.json.
          Record attempts, selectors, timestamps, recovery counters, and
          phase_summaries[] without ever reading handoffs back as state.
      - file: "scafld/runtime_contracts.py"
        action: "update"
        content_spec: |
          Add session schema helpers and path helpers for .ai/runs/{task-id}/,
          including schema_version for handoff/session contracts.
      - file: "scafld/audit_scope.py"
        action: "update"
        content_spec: |
          Ensure .ai/runs/ remains ignored by scope audit and sync drift checks.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Runtime contract smoke tests cover session creation and path safety."
        command: "bash tests/run_contracts_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:08Z"
        result_output: "PASS: run contracts smoke"
    status: "pending"

  - id: "phase2"
    name: "Execution attempts and diagnostics"
    objective: "Record execution attempts and preserve full diagnostics in run artifacts."
    dependencies: ["phase1"]
    changes:
      - file: "scafld/acceptance.py"
        action: "update"
        content_spec: |
          Preserve full stdout/stderr in acceptance outcomes for callers while
          retaining the short snippet behavior written back to the spec.
      - file: "scafld/commands/execution.py"
        action: "update"
        content_spec: |
          Initialize session on first start, append an attempt for each runnable
          criterion, write diagnostic artifacts under .ai/runs/{task-id}/,
          track recovery_attempts in session, and record criterion state.
      - file: "docs/execution.md"
        action: "update"
        content_spec: |
          Document session ownership, attempt recording, diagnostic artifacts,
          and the rule that handoffs are model-facing output only.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Session recovery smoke test captures attempts and diagnostics."
        command: "bash tests/session_recovery_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:12Z"
        result_output: "[1/4] start initializes session and phase handoff [2/4] failing exec writes diagnostics and a recovery handoff [3/4] passing exec records a phase summary [4/4] session ledger reflects failure then rec"
    status: "pending"

  - id: "phase3"
    name: "Phase compaction and bounded recovery"
    objective: "Write phase summaries, render recovery handoffs from session state, and stop cleanly at the recovery cap."
    dependencies: ["phase2"]
    changes:
      - file: "scafld/commands/execution.py"
        action: "update"
        content_spec: |
          When a phase completes, write a compact phase summary into
          session.phase_summaries[]. On failure, emit the current recovery
          handoff path and next action in human and JSON output. When recovery
          exceeds the configured cap, mark the criterion `failed_exhausted`,
          block the phase, stop generating new handoffs, and return
          `human_required`.
      - file: "scafld/error_codes.py"
        action: "update"
        content_spec: |
          Add a dedicated `recovery_exhausted` error code for bounded recovery
          failures.
      - file: "scafld/handoff_renderer.py"
        action: "update"
        content_spec: |
          Enable recovery handoff rendering from the recovery template with
          failed criterion, diagnostics reference, prior attempts, current phase
          slice, and relevant prior_phase_summary.
      - file: "scafld/commands/handoff.py"
        action: "update"
        content_spec: |
          Support --recovery <criterion-id> by regenerating the latest recovery
          handoff from session state.
      - file: "docs/cli-reference.md"
        action: "update"
        content_spec: |
          Document recovery retrieval through scafld handoff and phase-boundary
          compaction behavior, including the `human_required` output at the
          recovery cap.
      - file: "docs/run-artifacts.md"
        action: "update"
        content_spec: |
          Document `failed_exhausted`, blocked phases, and the rule that
          exhausted criteria stop generating recovery handoffs.
      - file: "tests/session_recovery_smoke.sh"
        action: "create"
        content_spec: |
          Build a temporary workspace with a failing acceptance command, run
          scafld start and exec, assert session.json and diagnostics exist,
          assert a recovery handoff is generated, then confirm lifecycle smoke
          still passes.
      - file: "tests/recovery_cap_smoke.sh"
        action: "create"
        content_spec: |
          Build a temporary workspace with `llm.recovery.max_attempts: 1`, fail
          the same criterion twice, and assert the second failure returns
          `recovery_exhausted`, `human_required`, and a blocked phase with no
          new recovery handoff.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Recovery handoff, recovery cap, and lifecycle smoke tests pass."
        command: "bash tests/session_recovery_smoke.sh && bash tests/recovery_cap_smoke.sh && bash tests/lifecycle_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-23T12:53:52Z"
        result_output: "[1/4] start initializes session and phase handoff [2/4] failing exec writes diagnostics and a recovery handoff [3/4] passing exec records a phase summary [4/4] session ledger reflects failure then rec"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- scafld/runtime_contracts.py scafld/audit_scope.py tests/run_contracts_smoke.sh && rm -f scafld/session_store.py"
    phase2: "git checkout HEAD -- scafld/acceptance.py scafld/commands/execution.py docs/execution.md"
    phase3: "git checkout HEAD -- scafld/commands/execution.py scafld/error_codes.py scafld/handoff_renderer.py scafld/commands/handoff.py docs/cli-reference.md docs/run-artifacts.md tests/session_recovery_smoke.sh tests/recovery_cap_smoke.sh"

