phases:
  - id: "phase1"
    name: "Define review topology and artifact model"
    objective: "Move review pass definitions, explicit ordering, and per-pass result semantics into first-class config and metadata helpers"
    changes:
      - file: "cli/scafld"
        action: "update"
        lines: "all"
        content_spec: |
          Introduce one canonical review-topology model for built-in automated
          and adversarial passes with explicit `order` values. Refactor config
          loading and normalization helpers as needed so the final nested pass
          shape is explicitly supported. Refactor metadata helpers so review
          artifacts record per-pass results for all configured layers in the
          v3 shape.
      - file: ".ai/config.yaml"
        action: "update"
        lines: "review section"
        content_spec: |
          Replace the partially hardcoded review description with an explicit
          default topology using named built-in automated and adversarial
          passes, each carrying an explicit `order` scalar in a nested mapping
          shape compatible with the config loader and `scafld init` templates.
      - file: ".ai/schemas/spec.json"
        action: "update"
        lines: "acceptance criterion schema"
        content_spec: |
          Preserve the schema support needed by the hardened execution path so
          spec validation continues to accept per-criterion timeout metadata
          alongside the review-pipeline refactor.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        description: "CLI still compiles after review-topology helper refactor"
        command: "python3 -m py_compile cli/scafld"
        expected: "exit code 0"
        result:
          status: "pass"
          timestamp: "2026-03-30T03:23:22Z"
          output: "python3 -m py_compile cli/scafld"
      - id: "ac1_2"
        type: "test"
        description: "Smoke case verifies configurable pass topology and v3 metadata normalization"
        command: "bash tests/review_gate_smoke.sh review-pass-topology"
        expected: "exit code 0"
        result:
          status: "pass"
          timestamp: "2026-03-30T03:23:22Z"
          output: "bash tests/review_gate_smoke.sh review-pass-topology"
    status: "completed"
    summary: "Added config-driven review topology helpers, Review Artifact v3 metadata, and a topology smoke case."

  - id: "phase2"
    name: "Drive review and complete from configured passes"
    objective: "Eliminate hardcoded review headings and pass assumptions from the CLI review flow"
    changes:
      - file: "cli/scafld"
        action: "update"
        lines: "all"
        content_spec: |
          Refactor `scafld review`, `parse_review_file`, and `scafld complete`
          so they scaffold, parse, and validate adversarial sections from the
          configured pass topology. Write truthful per-pass results into the
          top-level spec review block, enforce consistency between pass states
          and overall verdict, and remove legacy v2 assumptions from the
          completion path.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Review scaffolding follows the configured pass topology"
        command: "bash tests/review_gate_smoke.sh review-scaffold-topology"
        expected: "exit code 0"
        result:
          status: "pass"
          timestamp: "2026-03-30T03:23:22Z"
          output: "bash tests/review_gate_smoke.sh review-scaffold-topology"
      - id: "ac2_2"
        type: "test"
        description: "Completion gate enforces configured pass sections and results"
        command: "bash tests/review_gate_smoke.sh review-complete-topology"
        expected: "exit code 0"
        result:
          status: "pass"
          timestamp: "2026-03-30T03:23:22Z"
          output: "bash tests/review_gate_smoke.sh review-complete-topology"
    status: "completed"
    summary: "Removed hardcoded review headings and made review/complete consume the configured pass topology end to end."

  - id: "phase3"
    name: "Propagate docs, prompts, and smoke coverage"
    objective: "Make templates, guidance, and regression tests match the new review contract"
    changes:
