status: "completed"

task:
  title: "Add smoke CI workflow and badge"
  summary: >
    Add a GitHub Actions workflow that runs the Scafld review-gate smoke
    matrix on pushes and pull requests, make the smoke harness portable outside
    the current workstation path, and surface the workflow status with a README
    badge.
  size: "small"
  risk_level: "low"
  context:
    packages:
      - ".github/workflows"
      - "tests"
      - "."
    invariants:
      - "domain_boundaries"
  objectives:
    - "Run the review-gate smoke suite in GitHub Actions"
    - "Keep the smoke harness runnable both locally and in CI"
    - "Expose workflow status in the Scafld README"
  touchpoints:
    - area: "Smoke harness portability"
      description: "The smoke script currently hardcodes a workstation-specific CLI path and must derive it from the repo layout or an override"
    - area: "GitHub Actions"
      description: "Add a workflow that runs the same local smoke matrix used during development"
    - area: "README surface"
      description: "Add a status badge near the project title so workflow health is visible"
  acceptance:
    definition_of_done:
      - id: "dod1"
        description: "The smoke harness derives the CLI path portably so it works in CI"
        status: "pending"
      - id: "dod2"
        description: "GitHub Actions runs the smoke matrix on push and pull_request"
        status: "pending"
      - id: "dod3"
        description: "README exposes the workflow status badge"
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Smoke harness shell syntax is valid"
        command: "bash -n tests/review_gate_smoke.sh"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "CLI still parses after the harness portability change"
        command: "PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile cli/scafld"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Full smoke matrix passes locally with the new harness path logic"
        command: "./tests/review_gate_smoke.sh all"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Workflow and README reference the smoke CI path"
        command: "rg -n 'review-gate-smoke|tests/review_gate_smoke\\.sh all|badge\\.svg' README.md .github/workflows/review-gate-smoke.yml"
        expected: "exit code 0"

