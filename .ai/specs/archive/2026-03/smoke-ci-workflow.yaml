phases:
  - id: "phase1"
    name: "Add smoke CI workflow"
    objective: "Make the smoke harness runnable in CI, add the workflow, and surface its status in the README."
    changes:
      - file: "tests/review_gate_smoke.sh"
        action: "update"
        content_spec: |
          Replace the workstation-specific CLI path with a repo-relative default
          and keep an env override so the same script works locally and in
          GitHub Actions.
      - file: ".github/workflows/review-gate-smoke.yml"
        action: "create"
        content_spec: |
          Add a workflow that runs on push and pull_request, checks out the
          repo, sets up Python, runs a lightweight syntax check on the smoke
          harness and CLI, then executes `./tests/review_gate_smoke.sh all`.
      - file: "README.md"
        action: "update"
        content_spec: |
          Add a GitHub Actions badge near the project title that points at the
          new review-gate smoke workflow.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Smoke harness shell syntax is valid"
        command: "bash -n tests/review_gate_smoke.sh"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-03-26T09:07:33Z"
      - id: "ac1_2"
        type: "test"
        description: "CLI still parses after the harness portability change"
        command: "PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile cli/scafld"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-03-26T09:07:34Z"
      - id: "ac1_3"
        type: "test"
        description: "Full smoke matrix passes locally"
        command: "./tests/review_gate_smoke.sh all"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-03-26T09:07:45Z"
      - id: "ac1_4"
        type: "test"
        description: "Workflow and badge are wired to the smoke CI path"
        command: "rg -n 'review-gate-smoke|tests/review_gate_smoke\\.sh all|badge\\.svg' README.md .github/workflows/review-gate-smoke.yml"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-03-26T09:07:45Z"
