name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            *[!0-9.]*|*.*.*.*|.*|*.) echo "invalid release version: $version" >&2; exit 2 ;;
          esac
          scripts/set-release-version.sh "$version"

      - name: Run release checks
        run: make check

      - name: Build release snapshot
        run: scripts/build-release-artifacts.sh "${GITHUB_REF_NAME#v}"

      - name: Smoke package launchers against release snapshot
        run: scripts/smoke-release-installers.sh "${GITHUB_REF_NAME#v}"

  github-release:
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build native release artifacts
        run: scripts/build-release-artifacts.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*

  publish-pypi:
    needs: github-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set wrapper version
        run: scripts/set-release-version.sh "${GITHUB_REF_NAME#v}"

      - name: Build PyPI wrapper
        working-directory: package/pypi
        run: |
          python3 -m pip install --upgrade pip build
          python3 -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: package/pypi/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-npm:
    needs: github-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set wrapper version
        run: scripts/set-release-version.sh "${GITHUB_REF_NAME#v}"

      - name: Validate npm wrapper
        working-directory: package/npm
        run: npm test

      - name: Publish to npm
        working-directory: package/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish to npm" >&2
            exit 1
          fi
          if npm view "scafld@$version" version >/dev/null 2>&1; then
            echo "scafld@$version already exists on npm; skipping publish"
            exit 0
          fi
          npm publish --access public

  package-managers:
    needs: github-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Render package-manager manifests
        run: OUT_DIR=.stage/package-managers/rendered scripts/render-package-managers.sh "${GITHUB_REF_NAME#v}"

      - name: Attach package-manager manifests to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -C .stage/package-managers -czf .stage/package-managers-rendered.tar.gz rendered
          gh release upload "$GITHUB_REF_NAME" .stage/package-managers-rendered.tar.gz --clobber

      - name: Upload package-manager manifests
        uses: actions/upload-artifact@v4
        with:
          name: package-managers-rendered
          path: .stage/package-managers/rendered

  publish-homebrew:
    needs: package-managers
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check Homebrew publish credentials
        id: gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          if [[ -n "${HOMEBREW_TAP_TOKEN:-}" || -n "${PACKAGES_REPO_TOKEN:-}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Homebrew publish because HOMEBREW_TAP_TOKEN or PACKAGES_REPO_TOKEN is not configured."
          fi

      - name: Check out repository
        if: steps.gate.outputs.publish == 'true'
        uses: actions/checkout@v6

      - name: Download rendered manifests
        if: steps.gate.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-managers-rendered
          path: .stage/package-managers/rendered

      - name: Check out Homebrew tap
        if: steps.gate.outputs.publish == 'true'
        uses: actions/checkout@v6
        with:
          repository: nilstate/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.PACKAGES_REPO_TOKEN }}
          path: .stage/homebrew-tap

      - name: Publish formula
        if: steps.gate.outputs.publish == 'true'
        env:
          TAP_REPO_DIR: ${{ github.workspace }}/.stage/homebrew-tap
        run: scripts/publish-homebrew.sh

      - name: Commit formula update
        if: steps.gate.outputs.publish == 'true'
        run: |
          git -C .stage/homebrew-tap config user.name "github-actions[bot]"
          git -C .stage/homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .stage/homebrew-tap add Formula/scafld.rb
          if git -C .stage/homebrew-tap diff --cached --quiet; then
            exit 0
          fi
          git -C .stage/homebrew-tap commit -m "scafld ${GITHUB_REF_NAME#v}"
          git -C .stage/homebrew-tap push

  publish-scoop:
    needs: package-managers
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check Scoop publish credentials
        id: gate
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
        run: |
          if [[ -n "${SCOOP_BUCKET_TOKEN:-}" || -n "${PACKAGES_REPO_TOKEN:-}" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Scoop publish because SCOOP_BUCKET_TOKEN or PACKAGES_REPO_TOKEN is not configured."
          fi

      - name: Check out repository
        if: steps.gate.outputs.publish == 'true'
        uses: actions/checkout@v6

      - name: Download rendered manifests
        if: steps.gate.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-managers-rendered
          path: .stage/package-managers/rendered

      - name: Check out Scoop bucket
        if: steps.gate.outputs.publish == 'true'
        uses: actions/checkout@v6
        with:
          repository: nilstate/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN || secrets.PACKAGES_REPO_TOKEN }}
          path: .stage/scoop-bucket

      - name: Publish Scoop manifest
        if: steps.gate.outputs.publish == 'true'
        env:
          SCOOP_BUCKET_DIR: ${{ github.workspace }}/.stage/scoop-bucket
        run: scripts/publish-scoop.sh

      - name: Commit Scoop update
        if: steps.gate.outputs.publish == 'true'
        run: |
          git -C .stage/scoop-bucket config user.name "github-actions[bot]"
          git -C .stage/scoop-bucket config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .stage/scoop-bucket add bucket/scafld.json
          if git -C .stage/scoop-bucket diff --cached --quiet; then
            exit 0
          fi
          git -C .stage/scoop-bucket commit -m "scafld ${GITHUB_REF_NAME#v}"
          git -C .stage/scoop-bucket push

  publish-oci:
    needs: github-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: package/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/nilstate/scafld:v${{ steps.version.outputs.version }}
            ghcr.io/nilstate/scafld:latest
