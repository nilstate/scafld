name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            *[!0-9.]*|*.*.*.*|.*|*.) echo "invalid release version: $version" >&2; exit 2 ;;
          esac
          scripts/set-release-version.sh "$version"

      - name: Run release checks
        run: make check

      - name: Build release snapshot
        run: scripts/build-release-artifacts.sh "${GITHUB_REF_NAME#v}"

  github-release:
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build native release artifacts
        run: scripts/build-release-artifacts.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*

  publish-pypi:
    needs: github-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set wrapper version
        run: scripts/set-release-version.sh "${GITHUB_REF_NAME#v}"

      - name: Build PyPI wrapper
        working-directory: package/pypi
        run: |
          python3 -m pip install --upgrade pip build
          python3 -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: package/pypi/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-npm:
    needs: github-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set wrapper version
        run: scripts/set-release-version.sh "${GITHUB_REF_NAME#v}"

      - name: Validate npm wrapper
        working-directory: package/npm
        run: npm test

      - name: Publish to npm
        working-directory: package/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish to npm" >&2
            exit 1
          fi
          if npm view "scafld@$version" version >/dev/null 2>&1; then
            echo "scafld@$version already exists on npm; skipping publish"
            exit 0
          fi
          npm publish --access public
