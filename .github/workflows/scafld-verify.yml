name: scafld verify

on:
  pull_request_target:
  push:
    branches: [main]

jobs:
  verify-receipt:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Build scafld from source
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/scafld-bin"
          go build -o "$RUNNER_TEMP/scafld-bin/scafld" ./cmd/scafld
          echo "$RUNNER_TEMP/scafld-bin" >> "$GITHUB_PATH"

      - name: Run scafld verify
        env:
          SCAFLD_VERSION: v2.4.8
          SCAFLD_RECEIPT_PATH: ${{ vars.SCAFLD_RECEIPT_PATH || '' }}
          SCAFLD_VERIFY_TARGET: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            if ! git show "$SCAFLD_VERIFY_TARGET:scripts/scafld-verify.sh" > "$RUNNER_TEMP/scafld-verify.sh"; then
              echo "error: protected target does not contain scripts/scafld-verify.sh" >&2
              echo "bootstrap scafld init wiring on the protected branch before enforcing PR verification" >&2
              exit 2
            fi
            chmod +x "$RUNNER_TEMP/scafld-verify.sh"
            "$RUNNER_TEMP/scafld-verify.sh"
          else
            scripts/scafld-verify.sh
          fi
