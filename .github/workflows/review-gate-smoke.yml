name: Review Gate Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  review-gate-smoke:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate CLI syntax
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile cli/scafld setup.py $(find scafld scripts -name '*.py' -print)

      - name: Validate version sync
        run: python3 scripts/sync_version.py --check

      - name: Validate smoke harness syntax
        run: |
          bash -n tests/review_gate_smoke.sh
          bash -n tests/harden_smoke.sh
          bash -n tests/update_smoke.sh
          bash -n tests/lifecycle_smoke.sh
          bash -n tests/projection_surface_smoke.sh
          bash -n tests/package_smoke.sh
          bash -n tests/challenge_override_smoke.sh

      - name: Run review gate smoke matrix
        run: bash -x tests/review_gate_smoke.sh all

      - name: Run harden smoke
        run: bash tests/harden_smoke.sh

      - name: Run update smoke
        run: bash tests/update_smoke.sh

      - name: Run lifecycle smoke
        run: bash tests/lifecycle_smoke.sh

      - name: Run projection surface smoke
        run: bash tests/projection_surface_smoke.sh

      - name: Run package smoke
        run: bash tests/package_smoke.sh

      - name: Run challenge override smoke
        run: bash tests/challenge_override_smoke.sh
